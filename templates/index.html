<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720 NEET</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --pw-blue: #1b10b1; 
            --pw-gradient: linear-gradient(135deg, #1b10b1 0%, #4a3aff 100%);
            --pw-light: #f0f2ff; 
            --white: #ffffff;
            --text-dark: #2d3436;
        }
        /* Background GitHub static folder se load hoga */
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; 
            background: url('/static/bg.jpg') no-repeat center center fixed; 
            background-size: cover; color: var(--text-dark); 
        }
        
        .page-section { display: none; min-height: 100vh; width: 100%; animation: fadeIn 0.3s ease; background: rgba(248, 250, 255, 0.9); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-page { display: block !important; }
        
        .container { max-width: 850px; margin: auto; padding: 20px; }

        /* Centered Branding */
        .branding { text-align: center; padding: 15px; background: white; border-radius: 0 0 25px 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .branding img { max-width: 160px; height: auto; display: block; margin: auto; }
        
        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .main-card { background: var(--white); padding: 30px 15px; border-radius: 24px; text-align: center; box-shadow: 0 10px 20px rgba(27, 16, 177, 0.05); border: 1px solid rgba(27, 16, 177, 0.1); cursor: pointer; }
        .rect-card { background: var(--pw-gradient); color: white; padding: 20px 25px; border-radius: 18px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .item-row { display: flex; justify-content: space-between; padding: 18px; background: white; margin: 12px 0; border-radius: 15px; cursor: pointer; font-weight: 600; border: 1px solid #edf2f7; }
        .nav-header { display: flex; align-items: center; padding: 15px 0; gap: 15px; }
        .back-link { background: white; padding: 8px 15px; border-radius: 50px; font-weight: bold; color: var(--pw-blue); cursor: pointer; }
        
        /* Analysis styles */
        .analysis-row { display: flex; justify-content: space-between; padding: 12px; margin: 8px 0; border-radius: 10px; background: white; border-left: 5px solid #ccc; font-size: 0.9rem; font-weight: bold; }
        .correct-row { border-left-color: #28a745; background: #f0fff4; }
        .wrong-row { border-left-color: #dc3545; background: #fff5f5; }
        .skipped-row { border-left-color: #ffc107; background: #fffdf0; }

        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #eee; display: flex; gap: 15px; box-sizing: border-box; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="branding">
        <img src="/static/logo.png" onerror="this.outerHTML='<h1 style=color:var(--pw-blue)>Target720 NEET</h1>'">
    </div>
    <div class="container">
        <div class="main-grid" id="main-subjects"></div>
        <div class="custom-section" id="custom-subjects-area" style="display:none;">
            <span class="section-title">Special Exams & Tests</span>
            <div id="custom-list"></div>
        </div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="container">
        <div class="nav-header"><div class="back-link" onclick="goBack()"><i class="fas fa-arrow-left"></i></div> <h3 id="sub-title" style="margin:0">Subject</h3></div>
        <div id="chapter-list-content"></div>
    </div>
</div>

<div id="page-dpps" class="page-section">
    <div class="container">
        <div class="nav-header"><div class="back-link" onclick="goBack()"><i class="fas fa-arrow-left"></i></div> <h3 id="chapter-title-display" style="margin:0">Chapter</h3></div>
        <div id="dpp-list-content"></div>
    </div>
</div>

<div id="page-instructions" class="page-section">
    <div class="container">
        <div class="info-box" style="margin-top: 50px;">
            <h2 style="color: var(--pw-blue); text-align: center;">Ready for Test?</h2>
            <div style="background: #f8faff; padding: 20px; border-radius: 15px; margin: 20px 0;">
                <p><b>Total Questions:</b> <span id="ins-q-count">0</span></p>
            </div>
            <button class="btn" onclick="actuallyStartTest()" style="background:var(--pw-gradient); color:white; width:100%;">START TEST NOW</button>
        </div>
    </div>
</div>

<div id="page-test" class="page-section">
    <div class="test-header" style="background:var(--pw-gradient); color:white; padding:20px; display:flex; justify-content:space-between;">
        <span id="t-name">Test Name</span>
        <span id="timer" style="font-weight:bold;">00:00</span>
    </div>
    <div class="container">
        <div class="q-area">
            <h4 id="q-idx" style="color: var(--pw-blue);">Question 1</h4>
            <div id="q-txt" style="font-size:1.2rem; margin: 15px 0;"></div>
            <div id="q-img-box"></div>
            <div id="opts"></div>
        </div>
    </div>
    <div class="footer">
        <button class="btn" onclick="submitTest()" style="background:#eee;">SUBMIT</button>
        <button class="btn" onclick="nextQ()" style="background:var(--pw-gradient); color:white;">NEXT QUESTION</button>
    </div>
</div>

<div id="page-res" class="page-section">
    <div class="container" style="text-align: center; padding-top: 30px;">
        <h2 style="color:var(--pw-blue)">Test Completed!</h2>
        <div style="max-width: 200px; margin: auto; position: relative;">
            <canvas id="resultChart"></canvas>
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
                <h1 id="score-marks" style="margin: 0; font-size: 2rem;">0</h1>
                <small>/ <span id="max-marks">0</span></small>
            </div>
        </div>
        
        <div style="display: flex; justify-content: space-around; margin: 20px 0; background: white; padding: 15px; border-radius: 15px;">
            <div style="color:#28a745"><b>Right:</b> <span id="right-count">0</span></div>
            <div style="color:#dc3545"><b>Wrong:</b> <span id="wrong-count">0</span></div>
        </div>

        <h3 style="text-align: left; border-bottom: 2px solid #ddd; padding-bottom: 5px;">Question-wise Analysis</h3>
        <div id="analysis-list" style="text-align: left; margin-bottom: 80px;"></div>

        <div class="footer"><button onclick="location.reload()" class="btn" style="background:var(--pw-gradient); color:white; width:100%;">BACK TO HOME</button></div>
    </div>
</div>

<script>
    let config = {}, questions = [], cur = 0, answers = [], curSub = "", timeLeft = 0, tInt, pageStack = ['page-home'], backPressCount = 0;
    
    // Double Back Logic
    window.onload = async () => {
        const res = await fetch('/get_config?v=' + Date.now());
        config = await res.json();
        renderHome();

        history.pushState(null, '', '');
        window.onpopstate = () => {
            if(pageStack.length > 1) { goBack(); history.pushState(null, '', ''); }
            else {
                backPressCount++;
                if(backPressCount === 2) window.close();
                else { alert("Exit ke liye ek baar fir back dabayein"); setTimeout(()=>backPressCount=0, 2000); history.pushState(null, '', ''); }
            }
        };
    };

    function renderHome() {
        const mainSubs = ['physics', 'chemistry', 'botany', 'zoology'];
        let mHtml = '', cHtml = '', hasCustom = false;
        for (let s in config) {
            if (mainSubs.includes(s)) {
                let icon = s === 'physics' ? 'atom' : s === 'chemistry' ? 'flask' : s === 'botany' ? 'leaf' : 'dna';
                mHtml += `<div class="main-card" onclick="openSubject('${s}')"><i class="fas fa-${icon}"></i><h3>${s.toUpperCase()}</h3></div>`;
            } else {
                hasCustom = true;
                cHtml += `<div class="rect-card" onclick="openSubject('${s}')"><h3>${s.toUpperCase()}</h3><i class="fas fa-arrow-right"></i></div>`;
            }
        }
        document.getElementById('main-subjects').innerHTML = mHtml;
        if(hasCustom) { document.getElementById('custom-subjects-area').style.display = 'block'; document.getElementById('custom-list').innerHTML = cHtml; }
    }

    function showPage(id, push = true) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(push && pageStack[pageStack.length-1] !== id) pageStack.push(id);
    }
    function goBack() { if (pageStack.length > 1) { pageStack.pop(); showPage(pageStack[pageStack.length - 1], false); } }

    function openSubject(s) {
        curSub = s; const chaps = Object.keys(config[s]);
        if (chaps.length === 1 && chaps[0] === "Direct_Tests") { openDPPs("Direct_Tests"); return; }
        document.getElementById('sub-title').innerText = s.toUpperCase();
        let html = '';
        for (const ch in config[s]) {
            html += `<div class="item-row" onclick="openDPPs('${ch}')"><span>${ch==='Direct_Tests'?'Mixed Tests':ch}</span><i class="fas fa-chevron-right"></i></div>`;
        }
        document.getElementById('chapter-list-content').innerHTML = html;
        showPage('page-chapters');
    }

    function openDPPs(ch) {
        document.getElementById('chapter-title-display').innerText = ch === "Direct_Tests" ? "Tests" : ch;
        const tests = config[curSub][ch];
        let html = '';
        tests.forEach((t) => {
            html += `<div class="item-row" onclick="loadInstructions('${t.file}', '${t.name}')"><span>${t.name}</span><i class="fas fa-play-circle" style="color:var(--pw-blue)"></i></div>`;
        });
        document.getElementById('dpp-list-content').innerHTML = html;
        showPage('page-dpps');
    }

    async function loadInstructions(path, name) {
        const res = await fetch(`/get_test/${path}?v=${Date.now()}`);
        questions = await res.json();
        document.getElementById('ins-q-count').innerText = questions.length;
        pendingFile = path; pendingName = name;
        showPage('page-instructions');
    }

    function actuallyStartTest() {
        answers = new Array(questions.length).fill(null);
        document.getElementById('t-name').innerText = pendingName;
        timeLeft = questions.length * 60;
        tInt = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(timeLeft <= 0) submitTest();
        }, 1000);
        showPage('page-test'); render(0);
    }

    function render(i) {
        cur = i; const q = questions[i];
        document.getElementById('q-idx').innerText = `Question ${i+1}`;
        document.getElementById('q-txt').innerText = q.q;
        document.getElementById('q-img-box').innerHTML = q.img ? `<img src="${q.img}" style="width:100%; border-radius:15px; margin:15px 0;">` : "";
        let h = '';
        q.options.forEach((o, idx) => h += `<div class="opt ${answers[i]===idx?'active':''}" onclick="answers[${i}]=${idx};render(${i})">${o}</div>`);
        document.getElementById('opts').innerHTML = h;
    }

    function nextQ() { if(cur < questions.length - 1) render(cur + 1); }

    // NEET Score Analysis (+4, -1)
    function submitTest() {
        clearInterval(tInt);
        let correct = 0, wrong = 0, skipped = 0, aHtml = '';
        questions.forEach((q, i) => {
            let status = '';
            if (answers[i] === null) { skipped++; status = 'skipped-row'; }
            else if (answers[i] === q.correct_ans) { correct++; status = 'correct-row'; }
            else { wrong++; status = 'wrong-row'; }
            aHtml += `<div class="analysis-row ${status}"><span>Q${i+1}: ${q.q.substring(0,30)}..</span><b>${status==='correct-row'?'+4':status==='wrong-row'?'-1':'0'}</b></div>`;
        });
        document.getElementById('score-marks').innerText = (correct*4)-wrong;
        document.getElementById('max-marks').innerText = questions.length * 4;
        document.getElementById('right-count').innerText = correct;
        document.getElementById('wrong-count').innerText = wrong;
        document.getElementById('analysis-list').innerHTML = aHtml;
        showPage('page-res');
        new Chart(document.getElementById('resultChart'), { type:'doughnut', data: { datasets:[{data:[correct, wrong, skipped], backgroundColor:['#28a745','#dc3545','#ffc107']}]}, options:{cutout:'80%'} });
    }
</script>
</body>
</html>
