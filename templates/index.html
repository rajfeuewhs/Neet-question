<style>
    /* 2. Continue Learning Box */
    .continue-box {
        background: var(--card); padding: 15px; border-radius: 20px;
        border: 1px solid var(--border); margin-bottom: 25px;
        display: flex; align-items: center; justify-content: space-between;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer;
    }
    .continue-info { display: flex; align-items: center; gap: 12px; }
    .continue-icon { width: 40px; height: 40px; border-radius: 12px; background: #e0e7ff; color: var(--pw-blue); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

    /* 3. Progress Bar inside Subject Cards */
    .progress-container { width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; margin-top: 15px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--pw-gradient); border-radius: 10px; transition: 0.5s; }

    /* 5. Share Button */
    .share-btn {
        background: #25d366; color: white; padding: 10px 20px; border-radius: 50px;
        font-weight: bold; border: none; font-size: 0.8rem; display: flex; align-items: center; gap: 8px;
        margin: 20px auto; cursor: pointer; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
    }
</style>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <div id="continue-section" class="continue-box" onclick="resumeLastTest()" style="display: none;">
            <div class="continue-info">
                <div class="continue-icon"><i class="fas fa-play"></i></div>
                <div>
                    <small style="font-weight: 800; color: #64748b; font-size: 0.7rem; text-transform: uppercase;">Continue Learning</small>
                    <div id="last-test-name" style="font-weight: 700; font-size: 0.9rem;">Physics: Units & Dimensions</div>
                </div>
            </div>
            <i class="fas fa-chevron-right" style="color: #cbd5e1;"></i>
        </div>

        <div class="main-grid" id="main-subjects"></div>

        <button class="share-btn" onclick="shareApp()">
            <i class="fab fa-whatsapp"></i> CHALLENGE YOUR FRIENDS
        </button>

        <div id="custom-subjects-area" style="display:none; margin-top:30px;">
            <span style="font-weight:800; color:#64748b; text-transform:uppercase; font-size:0.8rem;">Specials</span>
            <div class="main-grid" id="custom-list" style="margin-top:10px;"></div>
        </div>
    </div>
</div>

<script>
    // Point 2 & 3 Logic
    function renderHome() {
        const main = ['physics','chemistry','botany','zoology'];
        let mH = '', sH = '', hasS = false;
        
        // Mock Progress (Ye bache ke save data se aayega)
        const progressData = { 'physics': 45, 'chemistry': 20, 'botany': 0, 'zoology': 80 };

        for (let s in config) {
            let prog = progressData[s.toLowerCase()] || 0;
            let icon = s==='physics'?'atom':s==='chemistry'?'flask':s==='botany'?'leaf':'dna';
            let card = `
                <div class="subject-card" onclick="handleSubjectClick('${s}', ${!main.includes(s)})">
                    <i class="fas fa-${icon}" style="font-size:2.5rem; color:var(--pw-blue); margin-bottom:12px;"></i>
                    <h3 style="margin:0; font-size:0.9rem;">${s.toUpperCase()}</h3>
                    <div class="progress-container">
                        <div class="progress-fill" style="width: ${prog}%"></div>
                    </div>
                    <small style="font-size: 0.65rem; color: #64748b; font-weight: bold; margin-top: 5px; display: block;">${prog}% COMPLETED</small>
                </div>`;
            
            if (main.includes(s)) mH += card; 
            else { sH += card; hasS = true; }
        }
        document.getElementById('main-subjects').innerHTML = mH;
        if(hasS) { document.getElementById('custom-subjects-area').style.display = 'block'; document.getElementById('custom-list').innerHTML = sH; }
        
        // Last Attempted Check
        const last = localStorage.getItem('last_test');
        if(last) {
            document.getElementById('continue-section').style.display = 'flex';
            document.getElementById('last-test-name').innerText = last;
        }
    }

    // POINT 5: WhatsApp Share
    function shareApp() {
        const text = "Bhai, Target720 par mera score dekh! Kya tu mujhe hara sakta hai? 🔥\nLink: https://neet-question.onrender.com";
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    }

    function resumeLastTest() {
        const lastFile = localStorage.getItem('last_test_file');
        if(lastFile) alert("Resuming: " + lastFile); // Yahan test start logic aayega
    }
</script>
