<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720 NEET</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pw-blue: #1b10b1; --pw-gradient: linear-gradient(135deg, #1b10b1 0%, #4a3aff 100%); --pw-light: #f0f2ff; }
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; 
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .page-section { display: none; min-height: 100vh; background: rgba(248, 250, 255, 0.85); animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .active-page { display: block !important; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        /* Branding Header */
        .branding-header { text-align: center; padding: 15px; background: white; border-radius: 0 0 25px 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .branding-header img { max-width: 180px; height: auto; }

        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .main-card { background: white; padding: 25px 10px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }
        .rect-card { background: var(--pw-gradient); color: white; padding: 20px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .item-row { display: flex; justify-content: space-between; padding: 18px; background: white; margin: 10px 0; border-radius: 15px; cursor: pointer; font-weight: bold; border: 1px solid #eee; }
        .nav-header { display: flex; align-items: center; padding: 15px 0; gap: 15px; }
        .back-link { background: white; padding: 8px 15px; border-radius: 50px; color: var(--pw-blue); cursor: pointer; }
        
        /* Result Styles */
        .analysis-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; margin: 8px 0; border-radius: 10px; background: white; border-left: 5px solid #ccc; font-size: 0.9rem; }
        .correct-row { border-left-color: #28a745; background: #f0fff4; }
        .wrong-row { border-left-color: #dc3545; background: #fff5f5; }
        .skipped-row { border-left-color: #ffc107; background: #fffdf0; }

        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; display: flex; gap: 10px; box-sizing: border-box; border-top: 1px solid #eee; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .opt { padding: 16px; border: 2px solid #edf2f7; margin: 10px 0; border-radius: 12px; cursor: pointer; background: #fff; }
        .opt.active { border-color: var(--pw-blue); background: var(--pw-light); }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="branding-header">
        <img src="https://i.postimg.cc/mD7tBwJg/ChatGPT-Image-Apr-2-2026-12-43-35-AM.jpg" alt="Target720">
    </div>
    <div class="container">
        <div class="main-grid" id="main-subjects"></div>
        <div id="custom-subjects-area" style="display:none; margin-top:30px;">
            <div id="custom-list"></div>
        </div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="container">
        <div class="nav-header"><div class="back-link" onclick="goBack()"><i class="fas fa-arrow-left"></i></div><h3 id="sub-title" style="margin:0"></h3></div>
        <div id="chapter-list-content"></div>
    </div>
</div>

<div id="page-dpps" class="page-section">
    <div class="container">
        <div class="nav-header"><div class="back-link" onclick="goBack()"><i class="fas fa-arrow-left"></i></div><h3 id="chapter-title-display" style="margin:0"></h3></div>
        <div id="dpp-list-content"></div>
    </div>
</div>

<div id="page-test" class="page-section">
    <div style="background:var(--pw-gradient); color:white; padding:20px; display:flex; justify-content:space-between;">
        <span id="t-name">Test</span><span id="timer" style="font-weight:bold; font-size:1.2rem;">00:00</span>
    </div>
    <div class="container">
        <h4 id="q-idx" style="color:var(--pw-blue);">Question 1</h4>
        <div id="q-txt" style="font-size:1.2rem; margin:15px 0;"></div>
        <div id="q-img-box"></div>
        <div id="opts"></div>
    </div>
    <div class="footer">
        <button class="btn" onclick="submitTest()" style="background:#eee;">SUBMIT</button>
        <button class="btn" onclick="nextQ()" style="background:var(--pw-gradient); color:white;">NEXT</button>
    </div>
</div>

<div id="page-res" class="page-section">
    <div class="container" style="text-align: center;">
        <h2 style="color:var(--pw-blue)">Test Analysis</h2>
        <div style="max-width: 250px; margin: auto; position: relative;">
            <canvas id="resultChart"></canvas>
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
                <h1 id="score-marks" style="margin:0; font-size:2.5rem;">0</h1>
                <span style="color:#666">out of <span id="max-marks">0</span></span>
            </div>
        </div>
        
        <div style="display:flex; justify-content:space-around; margin:20px 0; background:white; padding:15px; border-radius:15px;">
            <div style="color:#28a745"><b>Right</b><br><span id="right-count">0</span></div>
            <div style="color:#dc3545"><b>Wrong</b><br><span id="wrong-count">0</span></div>
            <div style="color:#666"><b>Total Q</b><br><span id="total-q">0</span></div>
        </div>

        <h3 style="text-align:left; border-bottom:2px solid #ddd; padding-bottom:5px;">Detailed Analysis</h3>
        <div id="analysis-list" style="text-align:left; margin-bottom:100px;"></div>

        <div class="footer"><button onclick="location.reload()" class="btn" style="background:var(--pw-gradient); color:white;">BACK TO HOME</button></div>
    </div>
</div>

<script>
    let config = {}, questions = [], cur = 0, answers = [], curSub = "", timeLeft = 0, tInt, pageStack = ['page-home'];
    let backPressCount = 0;

    // Double Back Logic
    window.onload = async () => {
        const bgRes = await fetch('/get_bg_config?v=' + Date.now());
        const bgData = await bgRes.json();
        if(bgData.bg_url) document.body.style.backgroundImage = `url('${bgData.bg_url}')`;

        const res = await fetch('/get_config?v=' + Date.now());
        config = await res.json();
        
        renderHome();
        
        history.pushState({page: 'home'}, '', '');
        window.onpopstate = () => {
            if(pageStack.length > 1) { goBack(false); history.pushState(null, '', ''); }
            else {
                backPressCount++;
                if(backPressCount === 2) { window.close(); }
                else { 
                    alert("Exit karne ke liye ek baar fir back dabayein"); 
                    setTimeout(() => backPressCount = 0, 2000); 
                    history.pushState(null, '', '');
                }
            }
        };
    };

    function renderHome() {
        const mainSubs = ['physics', 'chemistry', 'botany', 'zoology'];
        let mH = '', cH = '', hasC = false;
        for (let s in config) {
            if (mainSubs.includes(s)) {
                let icon = s=='physics'?'atom':s=='chemistry'?'flask':s=='botany'?'leaf':'dna';
                mH += `<div class="main-card" onclick="openSubject('${s}')"><i class="fas fa-${icon}" style="font-size:2rem;color:var(--pw-blue)"></i><h3>${s}</h3></div>`;
            } else {
                hasC = true;
                cH += `<div class="rect-card" onclick="openSubject('${s}')"><h3>${s.toUpperCase()}</h3><i class="fas fa-arrow-right"></i></div>`;
            }
        }
        document.getElementById('main-subjects').innerHTML = mH;
        if(hasC) { document.getElementById('custom-subjects-area').style.display='block'; document.getElementById('custom-list').innerHTML=cH; }
    }

    function showPage(id, push = true) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(push && pageStack[pageStack.length-1] !== id) pageStack.push(id);
    }
    function goBack() { if(pageStack.length > 1) { pageStack.pop(); showPage(pageStack[pageStack.length-1], false); } }

    function openSubject(s) {
        curSub = s; const chaps = Object.keys(config[s]);
        if(chaps.length === 1 && chaps[0] === "Direct_Tests") { openDPPs("Direct_Tests"); return; }
        document.getElementById('sub-title').innerText = s.toUpperCase();
        let h = '';
        for(let c in config[s]) h += `<div class="item-row" onclick="openDPPs('${c}')"><span>${c=='Direct_Tests'?'Mixed Tests':c}</span><i class="fas fa-chevron-right"></i></div>`;
        document.getElementById('chapter-list-content').innerHTML = h;
        showPage('page-chapters');
    }

    function openDPPs(c) {
        document.getElementById('chapter-title-display').innerText = c=='Direct_Tests'?'Tests':c;
        const tests = config[curSub][c];
        let h = '';
        tests.forEach(t => h += `<div class="item-row" onclick="startLoading('${t.file}', '${t.name}')"><span>${t.name}</span><i class="fas fa-play-circle" style="color:var(--pw-blue)"></i></div>`);
        document.getElementById('dpp-list-content').innerHTML = h;
        showPage('page-dpps');
    }

    async function startLoading(p, n) {
        const r = await fetch(`/get_test/${p}?v=${Date.now()}`);
        questions = await r.json();
        answers = new Array(questions.length).fill(null);
        document.getElementById('t-name').innerText = n;
        timeLeft = questions.length * 60;
        if(tInt) clearInterval(tInt);
        tInt = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(timeLeft<=0) submitTest();
        }, 1000);
        showPage('page-test'); render(0);
    }

    function render(i) {
        cur = i; const q = questions[i];
        document.getElementById('q-idx').innerText = `Question ${i+1} of ${questions.length}`;
        document.getElementById('q-txt').innerText = q.q;
        document.getElementById('q-img-box').innerHTML = q.img ? `<img src="${q.img}" style="max-width:100%; border-radius:15px; margin:15px 0;">` : "";
        let h = '';
        q.options.forEach((o, idx) => h += `<div class="opt ${answers[i]===idx?'active':''}" onclick="answers[${i}]=${idx};render(${i})">${o}</div>`);
        document.getElementById('opts').innerHTML = h;
    }

    function nextQ() { if(cur < questions.length - 1) render(cur + 1); }

    // NEET Result Analysis Logic
    function submitTest() {
        clearInterval(tInt);
        let correct = 0, wrong = 0, skipped = 0;
        let analysisHtml = '';

        questions.forEach((q, i) => {
            let status = '';
            if(answers[i] === null) { skipped++; status = 'skipped-row'; }
            else if(answers[i] === q.correct_ans) { correct++; status = 'correct-row'; }
            else { wrong++; status = 'wrong-row'; }
            
            analysisHtml += `<div class="analysis-row ${status}">
                <span>Q${i+1}: ${q.q.substring(0,30)}...</span>
                <b>${status=='correct-row'?'+4':status=='wrong-row'?'-1':'0'}</b>
            </div>`;
        });

        document.getElementById('score-marks').innerText = (correct*4) - wrong;
        document.getElementById('max-marks').innerText = questions.length * 4;
        document.getElementById('right-count').innerText = correct;
        document.getElementById('wrong-count').innerText = wrong;
        document.getElementById('total-q').innerText = questions.length;
        document.getElementById('analysis-list').innerHTML = analysisHtml;

        showPage('page-res');
        new Chart(document.getElementById('resultChart'), { type: 'doughnut', data: { datasets: [{ data: [correct, wrong, skipped], backgroundColor: ['#28a745', '#dc3545', '#ffc107'] }] }, options: { cutout: '80%' } });
    }
</script>
</body>
</html>
