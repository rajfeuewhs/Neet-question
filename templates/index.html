<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>AI NEET Analyzer</title>
    <script id="MathJax-script" async src="[https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js](https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js)"></script>
    <style>
        :root { --pw: #5a4bda; --green: #28a745; --red: #dc3545; }
        body { font-family: sans-serif; background: #f4f7fe; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .upload-zone { background: var(--pw); color: white; padding: 15px; text-align: center; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .q-box { flex: 3; padding: 40px; background: white; margin: 15px; border-radius: 12px; overflow-y: auto; }
        .sidebar { flex: 1; background: white; padding: 20px; border-left: 1px solid #ddd; }
        .option { padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin: 10px 0; cursor: pointer; }
        .option.selected { border: 2px solid var(--pw); background: #f0f0ff; }
        .q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .q-btn { width: 40px; height: 40px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 5px; }
        .q-btn.green { background: var(--green); color: white; border: none; }
        .footer { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="upload-zone" id="up">
    Upload DPP PDF: <input type="file" id="pdf">
    <button onclick="start()" style="padding: 5px 15px; cursor: pointer;">Generate Test</button>
</div>

<div class="main">
    <div class="q-box" id="test-view">
        <h2 id="q-no">Question 1</h2>
        <div id="q-txt" style="font-size: 1.2rem;">Please upload PDF...</div>
        <div id="opts" style="margin-top: 20px;"></div>
    </div>
    <div class="sidebar">
        <h4>Palette</h4>
        <div class="q-grid" id="grid"></div>
        <button onclick="submit()" style="width:100%; margin-top:20px; background:orange; color:white; padding:10px; border:none; border-radius:5px;">Submit</button>
    </div>
</div>

<div class="footer">
    <button onclick="save()" style="background:var(--pw); color:white; padding:10px 30px; border:none; border-radius:5px;">Save & Next</button>
</div>

<script>
    let questions = [];
    let current = 0;
    let userAns = [];
    let status = [];

    async function start() {
        const file = document.getElementById('pdf').files[0];
        if(!file) return alert("Select File");
        
        document.getElementById('q-txt').innerText = "AI is thinking... Processing PDF Layout.";
        
        const fd = new FormData();
        fd.append('file', file);
        
        const res = await fetch('/upload', { method: 'POST', body: fd });
        questions = await res.json();
        
        userAns = new Array(questions.length).fill(null);
        status = new Array(questions.length).fill('off');
        document.getElementById('up').style.display = 'none';
        load(0);
    }

    function load(i) {
        current = i;
        const q = questions[i];
        document.getElementById('q-no').innerText = `Question ${i+1}`;
        document.getElementById('q-txt').innerText = q.q;
        
        let h = '';
        q.options.forEach((o, idx) => {
            let sel = userAns[i] === idx ? 'selected' : '';
            h += `<div class="option ${sel}" onclick="pick(${idx})">${o}</div>`;
        });
        document.getElementById('opts').innerHTML = h;
        if(window.MathJax) MathJax.typeset();
        renderGrid();
    }

    function pick(idx) {
        userAns[current] = idx;
        load(current);
    }

    function save() {
        status[current] = userAns[current] !== null ? 'green' : 'off';
        if(current < questions.length -1) load(current + 1);
        else renderGrid();
    }

    function renderGrid() {
        let h = '';
        questions.forEach((_, i) => {
            h += `<div class="q-btn ${status[i]}" onclick="load(${i})">${i+1}</div>`;
        });
        document.getElementById('grid').innerHTML = h;
    }

    function submit() {
        let score = 0;
        questions.forEach((q, i) => {
            if(userAns[i] === q.correct_ans) score += 4;
            else if(userAns[i] !== null) score -= 1;
        });
        alert(`Final Score: ${score}`);
    }
</script>
</body>
</html>
