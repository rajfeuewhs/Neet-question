<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>NEET Ultimate Test Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pw-blue: #1b10b1; --pw-light: #f0f2ff; --green: #28a745; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f8f9fa; color: #333; }
        
        /* Dashboard Styling */
        .dashboard { max-width: 1000px; margin: 50px auto; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
                cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        .card:hover { transform: translateY(-10px); border-color: var(--pw-blue); box-shadow: 0 15px 30px rgba(27,16,177,0.1); }
        .card i { font-size: 3rem; color: var(--pw-blue); margin-bottom: 15px; }
        .card h3 { margin: 10px 0; color: #222; }

        /* Test Interface (Hidden by Default) */
        #test-container { display: none; height: 100vh; flex-direction: column; background: white; }
        .test-header { background: white; padding: 15px 30px; border-bottom: 2px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .test-body { display: flex; flex: 1; overflow: hidden; }
        .q-area { flex: 3; padding: 50px; overflow-y: auto; }
        .sidebar { flex: 1; background: #fff; border-left: 1px solid #ddd; padding: 20px; }
        
        .option { padding: 15px; border: 1px solid #ddd; margin: 10px 0; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: var(--pw-light); }
        .option.selected { border: 2px solid var(--pw-blue); background: var(--pw-light); font-weight: bold; }

        .palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .q-circle { width: 35px; height: 35px; border: 1px solid #ccc; border-radius: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .q-circle.saved { background: var(--green); color: white; border: none; }
    </style>
</head>
<body>

<div class="dashboard" id="main-dashboard">
    <h1 style="color: var(--pw-blue);">Physics Wallah Style - NEET Portal</h1>
    <p>Apna subject chunein aur test shuru karein</p>
    
    <div class="grid">
        <div class="card" onclick="loadTest('physics')"><i class="fas fa-atom"></i><h3>Physics</h3></div>
        <div class="card" onclick="loadTest('chemistry')"><i class="fas fa-flask"></i><h3>Chemistry</h3></div>
        <div class="card" onclick="loadTest('botany')"><i class="fas fa-leaf"></i><h3>Botany</h3></div>
        <div class="card" onclick="loadTest('zoology')"><i class="fas fa-dog"></i><h3>Zoology</h3></div>
    </div>

    <h2 style="margin-top: 50px;">Mega Mock Tests</h2>
    <div class="grid">
        <div class="card" onclick="loadTest('test_180')" style="background: #eef0ff;"><i class="fas fa-file-alt"></i><h3>180 Qs Test</h3></div>
        <div class="card" onclick="loadTest('test_720')" style="background: #eef0ff;"><i class="fas fa-trophy"></i><h3>720 Qs (Full NEET)</h3></div>
    </div>
</div>

<div id="test-container">
    <div class="test-header">
        <h2 id="test-title" style="margin:0; color:var(--pw-blue);">NEET Test</h2>
        <div id="timer" style="font-size: 1.5rem; font-weight: bold;">03:00:00</div>
    </div>
    <div class="test-body">
        <div class="q-area">
            <h3 id="q-no">Question 1</h3>
            <p id="q-text" style="font-size: 1.3rem;"></p>
            <div id="options-box"></div>
            <div style="margin-top: 40px;">
                <button onclick="saveAndNext()" style="background: var(--pw-blue); color: white; padding: 12px 40px; border: none; border-radius: 5px; cursor: pointer;">Save & Next</button>
            </div>
        </div>
        <div class="sidebar">
            <h4>Question Palette</h4>
            <div class="palette" id="palette-grid"></div>
            <button onclick="finalSubmit()" style="width:100%; margin-top: auto; padding: 15px; background: orange; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer;">Submit Test</button>
        </div>
    </div>
</div>

<script>
    let questions = [];
    let currentIdx = 0;
    let answers = [];

    async function loadTest(type) {
        const res = await fetch(`/get_test/${type}`);
        questions = await res.json();
        answers = new Array(questions.length).fill(null);
        
        document.getElementById('main-dashboard').style.display = 'none';
        document.getElementById('test-container').style.display = 'flex';
        document.getElementById('test-title').innerText = type.toUpperCase() + " Test";
        
        renderQuestion(0);
    }

    function renderQuestion(idx) {
        currentIdx = idx;
        const q = questions[idx];
        document.getElementById('q-no').innerText = `Question ${idx + 1}`;
        document.getElementById('q-text').innerText = q.q;
        
        let html = '';
        q.options.forEach((opt, i) => {
            let selected = (answers[idx] === i) ? 'selected' : '';
            html += `<div class="option ${selected}" onclick="selectOpt(${i})">${opt}</div>`;
        });
        document.getElementById('options-box').innerHTML = html;
        renderPalette();
    }

    function selectOpt(i) {
        answers[currentIdx] = i;
        renderQuestion(currentIdx);
    }

    function saveAndNext() {
        if(currentIdx < questions.length - 1) renderQuestion(currentIdx + 1);
        else alert("Aap aakhri sawal par hain!");
    }

    function renderPalette() {
        let html = '';
        questions.forEach((_, i) => {
            let cls = (answers[i] !== null) ? 'saved' : '';
            html += `<div class="q-circle ${cls}" onclick="renderQuestion(${i})">${i+1}</div>`;
        });
        document.getElementById('palette-grid').innerHTML = html;
    }

    function finalSubmit() {
        alert("Test Submitted! Scored Logic Yahan Add Hogi.");
        location.reload();
    }
</script>
</body>
</html>
