<style>
    /* --- INSTRUCTION PAGE DESIGN --- */
    .ins-card { 
        background: var(--card); padding: 25px; border-radius: 20px; 
        color: var(--text); line-height: 1.6; border: 1px solid var(--border);
    }
    .start-btn { 
        width: 100%; padding: 18px; background: #c7d2fe; color: #1e1b4b; 
        border: none; border-radius: 15px; font-weight: 800; font-size: 1.1rem; 
        cursor: pointer; margin-top: 30px; transition: 0.3s;
    }

    /* --- TEST PAGE LAYOUT --- */
    #page-test { background: #000 !important; color: white !important; }
    
    .test-header { 
        display: flex; justify-content: space-between; align-items: center; 
        padding: 15px; background: #111; border-bottom: 1px solid #334155; 
    }
    
    .test-timer { font-weight: bold; font-size: 1.1rem; color: #fff; }

    .ques-nav { 
        display: flex; gap: 8px; overflow-x: auto; padding: 15px; 
        scrollbar-width: none; background: #000;
    }
    .ques-nav::-webkit-scrollbar { display: none; }

    .nav-dot { 
        min-width: 40px; height: 40px; border-radius: 8px; 
        background: #1e293b; color: white; display: flex; 
        align-items: center; justify-content: center; font-weight: bold; 
        cursor: pointer; border: 1px solid #334155;
    }
    .nav-dot.active { background: #7f1d1d; color: #fca5a5; border: 1px solid #fca5a5; }

    /* --- QUESTION & OPTIONS --- */
    .option-box { 
        background: #1e293b; border: 1px solid #334155; padding: 18px; 
        border-radius: 15px; margin-bottom: 12px; display: flex; 
        align-items: center; justify-content: space-between; 
        cursor: pointer; transition: 0.2s; color: #fff;
    }
    .option-box:active { transform: scale(0.98); }
    
    .option-box.wrong { background: #7f1d1d !important; border-color: #ef4444 !important; }
    .option-box.correct { background: #064e3b !important; border-color: #10b981 !important; }

    .footer-nav { 
        position: fixed; bottom: 0; width: 100%; max-width: 1200px; 
        background: #111; padding: 15px; display: flex; gap: 10px; 
        border-top: 1px solid #334155; box-sizing: border-box; 
    }
    .footer-nav button { flex: 1; padding: 15px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; }
</style>

<div id="page-instructions" class="page-section">
    <div class="header-sticky" style="background:var(--card);"><i class="fas fa-chevron-left" onclick="goBack()"></i><h3 style="margin:0;">Practice Test</h3></div>
    <div class="container">
        <div style="background:#1e40af; color:white; padding:12px; border-radius:10px; font-size:0.75rem; margin-bottom:20px; display:flex; align-items:center; gap:10px;">
            <i class="fas fa-info-circle"></i>
            <span>Don't worry if there's a small error, missing XP points will be added soon!</span>
        </div>
        <div class="ins-card">
            <h4 style="margin-top:0;">General Instructions</h4>
            <ol style="padding-left: 20px;">
                <li>Total Questions: <b id="ins-qcount">0</b></li>
                <li>Duration: <b id="ins-time">0</b> Minutes (1 min/q)</li>
                <li>Marking Scheme: <span style="color:#10b981;">+4 Correct</span> | <span style="color:#ef4444;">-1 Wrong</span></li>
                <li>Maximum Marks: <b id="ins-marks">0</b></li>
            </ol>
        </div>
        <button class="start-btn" onclick="startActualTest()">Start Test</button>
    </div>
</div>

<div id="page-test" class="page-section">
    <div class="test-header">
        <div class="test-timer"><i class="far fa-clock"></i> <span id="test-timer-val">00:00</span></div>
        <button onclick="submitTest()" style="background:#c7d2fe; color:#1e1b4b; border:none; padding:8px 18px; border-radius:10px; font-weight:900; cursor:pointer;">Submit</button>
    </div>
    
    <div class="ques-nav" id="test-nav-dots"></div>
    
    <div class="container">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <span style="background:#1e293b; padding:4px 10px; border-radius:8px; font-size:0.75rem; color:#94a3b8; font-weight:bold;">Marks: +4 -1</span>
            <span style="background:#1e293b; padding:4px 10px; border-radius:8px; font-size:0.75rem; color:#94a3b8; font-weight:bold;">Type: Single</span>
        </div>
        
        <div id="question-area" style="font-size:1.15rem; margin-bottom:25px; line-height:1.6; font-weight:500;"></div>
        <div id="options-area"></div>
    </div>

    <div class="footer-nav">
        <button onclick="prevQ()" style="background:#1e293b; color:white;">Previous</button>
        <button onclick="nextQ()" style="background:#c7d2fe; color:#1e1b4b;">Save & Next</button>
    </div>
</div>

<script>
    // --- UPDATED LOGIC ---
    function renderQuestion() {
        const q = currentTest[qIdx];
        document.getElementById('question-area').innerText = q.question;
        
        let h = '';
        q.options.forEach((opt, i) => {
            h += `<div class="option-box" onclick="checkAnswer(this, ${i}, ${q.correct})">
                    <div style="display:flex; align-items:center;">
                        <span style="color:#64748b; font-weight:bold; margin-right:15px;">${i+1}</span>
                        <span>${opt}</span>
                    </div>
                    <i class="far fa-circle" style="color:#334155;"></i>
                  </div>`;
        });
        document.getElementById('options-area').innerHTML = h;
        setupNav(); // Dots update karne ke liye
    }

    function checkAnswer(el, chosen, correct) {
        const mainSubs = ['physics','chemistry','botany','zoology'];
        const boxes = document.querySelectorAll('.option-box');
        
        if (mainSubs.includes(curSub.toLowerCase())) {
            boxes.forEach(box => box.style.pointerEvents = 'none'); // Stop multiple clicks
            
            if (chosen === correct) {
                el.classList.add('correct');
                el.querySelector('i').className = "fas fa-check-circle";
            } else {
                el.classList.add('wrong');
                el.querySelector('i').className = "fas fa-times-circle";
                boxes[correct].classList.add('correct');
                boxes[correct].querySelector('i').className = "fas fa-check-circle";
            }
        } else {
            // Non-main subjects: Simple Selection
            boxes.forEach(b => b.style.borderColor = '#334155');
            el.style.borderColor = '#c7d2fe';
        }
    }

    function setupNav() {
        let h = '';
        currentTest.forEach((_, i) => {
            h += `<div class="nav-dot ${i===qIdx?'active':''}" onclick="qIdx=${i};renderQuestion()">${i+1}</div>`;
        });
        document.getElementById('test-nav-dots').innerHTML = h;
    }
</script>
