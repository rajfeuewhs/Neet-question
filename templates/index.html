<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720 | NEET Exam Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --pw-blue: #1b10b1; --pw-gradient: linear-gradient(135deg, #1b10b1 0%, #4a3aff 100%);
            --bg: #f4f7fe; --text: #2d3436; --card: #ffffff; --border: rgba(27, 16, 177, 0.08);
        }
        body.dark-mode { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        .container { width: 100%; max-width: 600px; margin: auto; padding: 15px; box-sizing: border-box; }
        .page-section { display: none; min-height: 100vh; }
        .active-page { display: block !important; }

        /* 1. INFINITE AUTO-SLIDER */
        .banner-wrapper { width: 100%; overflow: hidden; border-radius: 25px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); touch-action: pan-y; cursor: grab; }
        .banner-container { display: flex; transition: transform 0.5s ease-out; }
        .banner-card { min-width: 100%; height: 130px; color: white; padding: 25px; display: flex; flex-direction: column; justify-content: center; position: relative; box-sizing: border-box; }
        
        /* 2. PULSING COUNTDOWN */
        @keyframes pulse-red { 0%, 100% { background: #ef4444; color: white; } 50% { background: white; color: #ef4444; } }
        .countdown-badge { display: inline-block; padding: 6px 15px; border-radius: 50px; font-weight: 900; font-size: 0.8rem; border: 2px solid #ef4444; animation: pulse-red 2s infinite; margin-top: 10px; }

        /* 3. DPP LIST (AS PER SCREENSHOT) */
        .dpp-card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); margin-bottom: 15px; padding: 15px; display: flex; gap: 15px; position: relative; }
        .dpp-thumb { width: 80px; height: 80px; background: #fed7aa; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .dpp-thumb small { font-size: 0.6rem; font-weight: 900; position: absolute; top: 5px; left: 8px; }
        .dpp-thumb .dpp-icon { background: white; padding: 5px 8px; border-radius: 8px; font-weight: 900; font-size: 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .dpp-content { flex: 1; }
        .dpp-date { font-size: 0.75rem; color: #64748b; font-weight: bold; }
        .dpp-title { font-size: 0.95rem; font-weight: 700; margin: 4px 0; display: block; line-height: 1.3; }
        .dpp-meta { font-size: 0.8rem; color: #64748b; font-weight: 600; display: flex; gap: 8px; align-items: center; }
        
        .attempt-bar { background: #1e293b; color: white; padding: 10px; border-radius: 12px; margin-top: 12px; text-align: center; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* General Grids */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .subject-card { background: var(--card); padding: 30px 10px; border-radius: 25px; text-align: center; border: 1px solid var(--border); position: relative; transition: 0.3s; }
        .header-sticky { background: var(--card); padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div onclick="toggleDarkMode()"><i class="fas fa-adjust"></i></div>
            <div id="auth-ui">
                <div id="g_id_onload" data-client_id="614180387554-801p5epi2emvn7mt5tkn3pf3sth0imga.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
                <div id="user-badge" style="display:none; align-items:center; gap:10px;">
                    <div style="text-align: right;"><div id="un-name" style="font-weight:800; font-size:0.8rem;">GUEST</div><div style="background:gold; color:#000; font-size:0.6rem; font-weight:900; padding:2px 6px; border-radius:8px;">RANK: #0</div></div>
                    <img id="un-pic" src="" style="width:35px; height:35px; border-radius:50%; border:2px solid var(--pw-blue);">
                </div>
            </div>
        </div>

        <div class="banner-wrapper" id="banner-wrapper">
            <div class="banner-container" id="banner-slide">
                <div class="banner-card" style="background: #1b10b1;"><h3>Don't Stress</h3><p>Success is closer than you think!</p></div>
                <div class="banner-card" style="background: #ea580c;"><h3>Daily Practice</h3><p>The only way to master NEET 2026.</p></div>
                <div class="banner-card" style="background: #059669;"><h3>Consistency</h3><p>Every single Apple 🍎 matters!</p></div>
            </div>
        </div>

        <h1 style="margin:0; font-size:2.2rem; font-weight:900; color:var(--pw-blue);">Target720</h1>
        <div id="live-clock" style="font-weight:bold; color:#64748b; font-size:0.85rem;"></div>
        <div id="neet-timer" class="countdown-badge">NEET 2026: 00d 00h 00m</div>

        <div style="background: var(--card); padding: 18px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); margin: 25px 0; cursor: pointer; position: relative;">
            <div style="display:flex; align-items:center; gap:12px;"><i class="fas fa-chart-line" style="color:#10b981; font-size:1.4rem;"></i>
                <div><span style="font-weight:800; font-size:0.9rem;">Analytics</span><small id="login-msg" style="color:#be123c; font-size:0.65rem; display:block;">To unlock this rank log in please</small></div>
            </div>
            <div style="color:#ef4444; font-weight:900; font-size:1.2rem;">0 🍎</div>
            <div id="lock-layer" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.1); backdrop-filter:blur(4px); border-radius:22px; display:flex; align-items:center; justify-content:center;"><i class="fas fa-lock" style="background:white; padding:8px; border-radius:50%; color:var(--pw-blue); box-shadow:0 4px 10px rgba(0,0,0,0.1);"></i></div>
        </div>

        <div class="main-grid" id="main-subjects"></div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="header-sticky"><i class="fas fa-chevron-left" onclick="goBack()"></i><h3 id="sub-title" style="margin:0;">Subject</h3></div>
    <div class="container" id="chapter-list"></div>
</div>

<div id="page-dpp" class="page-section">
    <div class="header-sticky"><i class="fas fa-chevron-left" onclick="goBack()"></i><h3 id="ch-title-dpp" style="margin:0; font-size:1rem;">Chapter Name</h3></div>
    <div class="container" id="dpp-items"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    let config = {}, bIdx = 0, pageStack = ['page-home'];

    window.onload = async () => {
        const res = await fetch('/get_config?v='+Date.now()); config = await res.json();
        renderHome(); updateTime(); setInterval(updateTime, 1000);
        setupInfiniteBanner();
        if(localStorage.getItem('un')) updateUI();
    };

    // 1. INFINITE BANNER LOGIC (Swipe + Auto)
    function setupInfiniteBanner() {
        const slider = document.getElementById('banner-slide');
        const wrapper = document.getElementById('banner-wrapper');
        let startX, moveX;

        setInterval(() => { bIdx = (bIdx + 1) % 3; slider.style.transform = `translateX(-${bIdx * 100}%)`; }, 4000);

        wrapper.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        wrapper.addEventListener('touchmove', e => moveX = e.touches[0].clientX);
        wrapper.addEventListener('touchend', () => {
            if (startX - moveX > 50) bIdx = (bIdx + 1) % 3;
            else if (moveX - startX > 50) bIdx = (bIdx - 1 + 3) % 3;
            slider.style.transform = `translateX(-${bIdx * 100}%)`;
        });
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleString('en-IN', { weekday:'short', day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }).toUpperCase();
        const diff = new Date("May 3, 2026") - now;
        const d = Math.floor(diff/864e5), h = Math.floor((diff%864e5)/36e5), m = Math.floor((diff%36e5)/6e4);
        document.getElementById('neet-timer').innerText = `NEET 2026: ${d}d ${h}h ${m}m`;
    }

    function renderHome() {
        const main = ['physics','chemistry','botany','zoology'];
        let h = '';
        for (let s in config) {
            if(main.includes(s)) {
                let icon = s==='physics'?'atom':s==='chemistry'?'flask':s==='botany'?'leaf':'dna';
                h += `<div class="subject-card" onclick="openSubject('${s}')"><i class="fas fa-${icon}" style="font-size:2.5rem; color:var(--pw-blue); margin-bottom:12px;"></i><h3 style="margin:0; font-size:0.9rem;">${s.toUpperCase()}</h3></div>`;
            }
        }
        document.getElementById('main-subjects').innerHTML = h;
    }

    function openSubject(s) {
        curSub = s; document.getElementById('sub-title').innerText = s.toUpperCase();
        let h = '', i = 1;
        for (let ch in config[s]) {
            h += `<div class="subject-card" style="text-align:left; padding:20px; margin-bottom:12px;" onclick="openDPPList('${ch}')">
                    <span style="background:#2d3436; color:white; font-size:0.6rem; padding:3px 8px; border-radius:5px; font-weight:900;">CH - ${i<10?'0'+i:i}</span>
                    <h3 style="margin:8px 0;">${ch}</h3>
                    <div style="font-size:0.8rem; color:#64748b; font-weight:bold;">DPP: 0/${config[s][ch].length}</div>
                  </div>`;
            i++;
        }
        document.getElementById('chapter-list').innerHTML = h;
        showPage('page-chapters');
    }

    // 3. DPP LIST LOGIC (As per Screenshot)
    function openDPPList(ch) {
        document.getElementById('ch-title-dpp').innerText = ch;
        let h = '', dpps = config[curSub][ch];
        dpps.forEach((d, i) => {
            let qCount = 20; // Mock count, aapke JSON se aayega
            h += `
            <div class="dpp-card">
                <div class="dpp-thumb"><small>OBJ</small><div class="dpp-icon">DPP</div><div style="position:absolute; bottom:-5px; right:-5px; background:white; border-radius:50%; padding:3px; font-size:0.8rem; color:#f59e0b;"><i class="fas fa-search-plus"></i></div></div>
                <div class="dpp-content">
                    <div class="dpp-date">DPP • 02 APR 2026</div>
                    <span class="dpp-title">${d.name} MCQ QUIZ</span>
                    <div class="dpp-meta">${qCount} Qs. • ${qCount * 4} Marks • Earn ${qCount * 2} 🍎</div>
                    <div class="attempt-bar" onclick="startTest('${d.file}')"><i class="fas fa-arrow-circle-right"></i> Attempt</div>
                </div>
            </div>`;
        });
        document.getElementById('dpp-items').innerHTML = h;
        showPage('page-dpp');
    }

    function handleCredentialResponse(r) {
        const u = JSON.parse(atob(r.credential.split('.')[1]));
        localStorage.setItem('un', u.name); localStorage.setItem('gpic', u.picture);
        updateUI();
    }

    function updateUI() {
        document.querySelector('.g_id_signin').style.display = 'none';
        document.getElementById('user-badge').style.display = 'flex';
        document.getElementById('lock-layer').style.display = 'none';
        document.getElementById('un-pic').src = localStorage.getItem('gpic');
        document.getElementById('un-name').innerText = localStorage.getItem('un').toUpperCase();
    }

    function showPage(id) { document.querySelectorAll('.page-section').forEach(p=>p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); pageStack.push(id); }
    function goBack() { pageStack.pop(); showPage(pageStack[pageStack.length-1]); }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
</script>
</body>
</html>
