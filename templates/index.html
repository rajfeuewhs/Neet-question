<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET Prep Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pw-blue: #1b10b1; --pw-light: #f0f2ff; --green: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7fe; }
        .page-section { display: none; min-height: 100vh; }
        .active-page { display: block !important; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .dashboard { text-align: center; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .item-row { display: flex; justify-content: space-between; padding: 15px; background: white; margin: 8px 0; border-radius: 10px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: bold; }
        .header { padding: 15px 20px; border-bottom: 2px solid #ddd; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; z-index: 100; }
        .layout { display: flex; flex-direction: row; }
        .q-area { flex: 3; padding: 25px; padding-bottom: 120px; }
        .sidebar { flex: 1; padding: 20px; border-left: 1px solid #ddd; background: #fafafa; }
        @media (max-width: 768px) { .layout { flex-direction: column; } .sidebar { border-left: none; } }
        .opt { padding: 18px; border: 1px solid #ddd; margin: 12px 0; border-radius: 12px; cursor: pointer; background: #fff; }
        .opt.active { border: 2.5px solid var(--pw-blue); background: var(--pw-light); font-weight: bold; }
        .dot { width: 45px; height: 45px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; margin: 2px; }
        .dot.saved { background: var(--green); color: white; border: none; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #ddd; display: flex; justify-content: space-around; }
        .btn { padding: 14px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container dashboard">
        <h2 style="color: var(--pw-blue);">NEET PREP MASTER</h2>
        <div class="grid">
            <div class="card" onclick="openSubject('physics')"><i class="fas fa-atom"></i><h3>Physics</h3></div>
            <div class="card" onclick="openSubject('chemistry')"><i class="fas fa-flask"></i><h3>Chemistry</h3></div>
            <div class="card" onclick="openSubject('botany')"><i class="fas fa-leaf"></i><h3>Botany</h3></div>
            <div class="card" onclick="openSubject('zoology')"><i class="fas fa-dog"></i><h3>Zoology</h3></div>
        </div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="container">
        <button onclick="showPage('page-home')" style="border:none; background:none; color:var(--pw-blue); cursor:pointer; font-weight:bold;">← Back to Home</button>
        <h2 id="sub-title">Subject</h2>
        <div id="chapter-list-content"></div>
    </div>
</div>

<div id="page-dpps" class="page-section">
    <div class="container">
        <button onclick="showPage('page-chapters')" style="border:none; background:none; color:var(--pw-blue); cursor:pointer; font-weight:bold;">← Back to Chapters</button>
        <h2 id="chapter-title-display">Chapter Name</h2>
        <div id="dpp-list-content"></div>
    </div>
</div>

<div id="page-test" class="page-section">
    <div class="header"><h3 id="t-name">Test</h3><div id="timer">00:00</div></div>
    <div class="layout">
        <div class="q-area"><h4 id="q-idx">Q1</h4><div id="q-txt" style="font-size:1.2rem;"></div><div id="opts"></div></div>
        <div class="sidebar"><h4>Palette</h4><div id="palette" style="display:flex; flex-wrap:wrap;"></div></div>
    </div>
    <div class="footer">
        <button class="btn" onclick="submitTest()" style="background:orange; color:white;">SUBMIT</button>
        <button class="btn" onclick="nextQ()" style="background:var(--pw-blue); color:white; flex:0.7;">SAVE & NEXT</button>
    </div>
</div>

<div id="page-res" class="page-section" style="text-align:center; padding:40px;">
    <h2>Analysis</h2><div id="score" style="font-size:2rem; font-weight:bold;"></div>
    <button onclick="location.reload()" class="btn" style="background:var(--pw-blue); color:white; margin-top:20px;">Exit</button>
</div>

<script>
    let config = {}, questions = [], cur = 0, answers = [], status = [], curSub = "";

    window.onload = async () => {
        const res = await fetch('/get_config');
        config = await res.json();
    };

    function showPage(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
    }

    function openSubject(s) {
        curSub = s;
        document.getElementById('sub-title').innerText = s.toUpperCase();
        let html = '';
        for (const chName in config[s]) {
            html += `<div class="item-row" onclick="openDPPs('${chName}')"><span>${chName}</span><i class="fas fa-chevron-right"></i></div>`;
        }
        document.getElementById('chapter-list-content').innerHTML = html;
        showPage('page-chapters');
    }

    function openDPPs(ch) {
        document.getElementById('chapter-title-display').innerText = ch;
        const tests = config[curSub][ch];
        let html = '';
        if (tests.length === 0) {
            html = "<p style='color:gray; padding:20px;'>No any tests available</p>";
        } else {
            tests.forEach(t => {
                html += `<div class="item-row" onclick="startTest('${t.file}', '${t.name}')"><span>${t.name}</span><i class="fas fa-play-circle" style="color:green"></i></div>`;
            });
        }
        document.getElementById('dpp-list-content').innerHTML = html;
        showPage('page-dpps');
    }

    async function startTest(path, name) {
        const res = await fetch(`/get_test/${path}`);
        questions = await res.json();
        answers = new Array(questions.length).fill(null);
        status = new Array(questions.length).fill('unseen');
        document.getElementById('t-name').innerText = name;
        showPage('page-test');
        render(0);
    }

    function render(i) {
        cur = i; const q = questions[i];
        document.getElementById('q-idx').innerText = `Question ${i+1}`;
        document.getElementById('q-txt').innerText = q.q;
        let h = '';
        q.options.forEach((o, idx) => {
            let act = (answers[i] === idx) ? 'active' : '';
            h += `<div class="opt ${act}" onclick="pick(${idx})">${o}</div>`;
        });
        document.getElementById('opts').innerHTML = h;
        let p = '';
        questions.forEach((_, idx) => {
            let cls = (status[idx] === 'saved') ? 'saved' : '';
            let b = (cur === idx) ? 'border:3px solid blue;' : '';
            p += `<div class="dot ${cls}" style="${b}" onclick="render(${idx})">${idx+1}</div>`;
        });
        document.getElementById('palette').innerHTML = p;
    }

    function pick(idx) { answers[cur] = idx; status[cur] = 'saved'; render(cur); }
    function nextQ() { if(cur < questions.length - 1) render(cur + 1); }
    function submitTest() {
        let c = 0, w = 0;
        questions.forEach((q, i) => {
            if(answers[i] === q.correct_ans) c++;
            else if(answers[i] !== null) w++;
        });
        document.getElementById('score').innerText = `Score: ${(c*4)-w}`;
        showPage('page-res');
    }
</script>
</body>
</html>
