<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pw-blue: #1b10b1; --pw-gradient: linear-gradient(135deg, #1b10b1 0%, #4a3aff 100%); --bg: #f8faff; --text: #2d3436; --card: #ffffff; }
        /* Dark Mode sirf 1st page ke liye */
        body.dark-mode-home #page-home { --bg: #121212; --text: #ffffff; --card: #1e1e1e; }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: 0.3s; }
        .page-section { display: none; min-height: 100vh; width: 100%; background-color: var(--bg); }
        .active-page { display: block !important; }
        .container { max-width: 800px; margin: auto; padding: 20px; }

        /* Mode Toggle Button */
        .mode-toggle { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 1.5rem; color: var(--pw-blue); }

        /* Main 4 Subject Squares */
        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .main-card { background: var(--card); padding: 30px 15px; border-radius: 24px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .main-card i { font-size: 2.8rem; margin-bottom: 15px; color: var(--pw-blue); }

        /* DPP Cards */
        .dpp-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.1); display: flex; align-items: center; gap: 15px; }
        .dpp-icon { background: #ffdfba; width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #333; }
        .attempt-btn { background: var(--pw-gradient); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }

        /* Result Analysis */
        .analysis-row { display: flex; justify-content: space-between; padding: 12px; margin: 8px 0; border-radius: 10px; background: white; border-left: 5px solid #ccc; font-weight: bold; }
        .correct-row { border-left-color: #28a745; background: #f0fff4; }
        .wrong-row { border-left-color: #dc3545; background: #fff5f5; }

        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; display: flex; gap: 15px; box-sizing: border-box; border-top: 1px solid #eee; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="">

<div id="page-home" class="page-section active-page">
    <div class="container">
        <div class="mode-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></div>
        <h1 style="text-align: center; color: var(--pw-blue);">Target<span style="color:var(--text)">720</span></h1>
        <div class="main-grid" id="main-subjects"></div>
        <div id="custom-subjects-area" style="display:none; margin-top:30px;">
            <div id="custom-list"></div>
        </div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="container">
        <div onclick="goBack()" style="cursor:pointer; padding:10px 0;"><i class="fas fa-arrow-left"></i> Back</div>
        <h2 id="sub-title"></h2>
        <div id="chapter-list-content"></div>
    </div>
</div>

<div id="page-dpps" class="page-section">
    <div class="container">
        <div onclick="goBack()" style="cursor:pointer; padding:10px 0;"><i class="fas fa-arrow-left"></i> Back</div>
        <h2 id="chapter-title-display"></h2>
        <div id="dpp-list-content"></div>
    </div>
</div>

<div id="page-test" class="page-section">
    <div style="background:var(--pw-gradient); color:white; padding:15px; display:flex; justify-content:space-between;">
        <span id="t-name">Test</span><span id="timer">00:00</span>
    </div>
    <div class="container">
        <h4 id="q-idx" style="color:var(--pw-blue)">Question 1</h4>
        <div id="q-txt" style="font-size:1.2rem; margin:15px 0;"></div>
        <div id="q-img-box"></div>
        <div id="opts"></div>
    </div>
    <div class="footer">
        <button class="btn" onclick="submitTest()" style="background:#eee;">SUBMIT</button>
        <button class="btn" onclick="nextQ()" style="background:var(--pw-gradient); color:white;">NEXT</button>
    </div>
</div>

<div id="page-res" class="page-section">
    <div class="container" style="text-align: center;">
        <h2>Result Analysis</h2>
        <div style="max-width: 200px; margin: auto;"><canvas id="resultChart"></canvas></div>
        <h1 id="score-marks" style="margin:20px 0;">0</h1>
        <div id="analysis-list" style="text-align: left; margin-bottom: 80px;"></div>
        <div class="footer">
            <button class="btn" onclick="reattemptTest()" style="background:#eee;">REATTEMPT</button>
            <button onclick="location.reload()" class="btn" style="background:var(--pw-gradient); color:white;">HOME</button>
        </div>
    </div>
</div>

<script>
    let config = {}, questions = [], cur = 0, answers = [], curSub = "", timeLeft = 0, tInt, pageStack = ['page-home'], lastTestData = {};

    window.onload = async () => {
        const res = await fetch('/get_config?v=' + Date.now());
        config = await res.json();
        renderHome();
    };

    // Dark Mode sirf Home Page par trigger hoga
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode-home');
        const icon = document.querySelector('.mode-toggle i');
        icon.classList.toggle('fa-moon');
        icon.classList.toggle('fa-sun');
    }

    function renderHome() {
        const mainSubs = ['physics', 'chemistry', 'botany', 'zoology'];
        let mH = '', cH = '', hasC = false;
        for (let s in config) {
            if (mainSubs.includes(s)) {
                let icon = s === 'physics' ? 'atom' : s === 'chemistry' ? 'flask' : s === 'botany' ? 'leaf' : 'dna';
                mH += `<div class="main-card" onclick="openSubject('${s}')"><i class="fas fa-${icon}"></i><h3>${s.toUpperCase()}</h3></div>`;
            } else {
                hasC = true;
                cH += `<div class="rect-card" onclick="openSubject('${s}')"><h3>${s.toUpperCase()}</h3><i class="fas fa-arrow-right"></i></div>`;
            }
        }
        document.getElementById('main-subjects').innerHTML = mH;
        if(hasC) { document.getElementById('custom-subjects-area').style.display = 'block'; document.getElementById('custom-list').innerHTML = cH; }
    }

    function openSubject(s) {
        curSub = s;
        document.getElementById('sub-title').innerText = s.toUpperCase();
        const chapters = Object.keys(config[s]);
        if (chapters.length === 1 && chapters[0] === "Direct_Tests") { openDPPs("Direct_Tests"); return; }
        let h = '';
        for (const ch in config[s]) {
            h += `<div class="item-row" onclick="openDPPs('${ch}')"><span>${ch==='Direct_Tests'?'Mixed Tests':ch}</span><i class="fas fa-chevron-right"></i></div>`;
        }
        document.getElementById('chapter-list-content').innerHTML = h;
        showPage('page-chapters');
    }

    // DPP Card with Auto Marks Calculation
    async function openDPPs(ch) {
        document.getElementById('chapter-title-display').innerText = ch === "Direct_Tests" ? "Tests" : ch;
        const tests = config[curSub][ch];
        let h = '';
        for(const t of tests) {
            // Hum questions fetch karke count nikalenge marks dikhane ke liye
            const qRes = await fetch(`/get_test/${t.file}?v=${Date.now()}`);
            const qTemp = await qRes.json();
            const totalMarks = qTemp.length * 4; // Har ques +4 marks

            h += `<div class="dpp-card">
                <div class="dpp-icon">DPP</div>
                <div style="flex:1">
                    <b style="font-size:1rem">${t.name}</b><br>
                    <small style="color:#666">${qTemp.length} Qs • ${totalMarks} Marks</small>
                    <button class="attempt-btn" onclick="startTest('${t.file}', '${t.name}')">Attempt Now</button>
                </div>
            </div>`;
        }
        document.getElementById('dpp-list-content').innerHTML = h;
        showPage('page-dpps');
    }

    async function startTest(path, name) {
        const res = await fetch(`/get_test/${path}?v=${Date.now()}`);
        questions = await res.json();
        lastTestData = {path, name}; // Reattempt ke liye data save kiya
        answers = new Array(questions.length).fill(null);
        document.getElementById('t-name').innerText = name;
        timeLeft = questions.length * 60;
        if(tInt) clearInterval(tInt);
        tInt = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(timeLeft <= 0) submitTest();
        }, 1000);
        showPage('page-test');
        render(0);
    }

    function reattemptTest() {
        startTest(lastTestData.path, lastTestData.name);
    }

    function render(i) {
        cur = i; const q = questions[i];
        document.getElementById('q-idx').innerText = `Question ${i+1}`;
        document.getElementById('q-txt').innerText = q.q;
        document.getElementById('q-img-box').innerHTML = q.img ? `<img src="${q.img}" style="width:100%; border-radius:15px; margin:10px 0;">` : "";
        let h = '';
        q.options.forEach((o, idx) => h += `<div class="opt" style="padding:15px; border:1px solid #ddd; margin:10px 0; border-radius:10px; cursor:pointer; background:${answers[i]===idx?'#f0f2ff':''}" onclick="answers[${i}]=${idx};render(${i})">${o}</div>`);
        document.getElementById('opts').innerHTML = h;
    }

    function nextQ() { if(cur < questions.length - 1) render(cur + 1); }

    function submitTest() {
        clearInterval(tInt);
        let correct = 0, wrong = 0, skipped = 0, aHtml = '';
        questions.forEach((q, i) => {
            let status = '';
            if (answers[i] === null) { skipped++; status = 'skipped-row'; }
            else if (answers[i] === q.correct_ans) { correct++; status = 'correct-row'; }
            else { wrong++; status = 'wrong-row'; }
            aHtml += `<div class="analysis-row ${status}"><span>Q${i+1}: ${status.toUpperCase()}</span><b>${status==='correct-row'?'+4':status==='wrong-row'?'-1':'0'}</b></div>`;
        });
        document.getElementById('score-marks').innerText = `Score: ${(correct*4)-wrong} / ${questions.length*4}`;
        document.getElementById('analysis-list').innerHTML = aHtml;
        showPage('page-res');
        new Chart(document.getElementById('resultChart'), { type:'doughnut', data: { datasets:[{data:[correct, wrong, skipped], backgroundColor:['#28a745','#dc3545','#ffc107']}]}, options:{cutout:'80%'} });
    }

    function showPage(id, push = true) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(push && pageStack[pageStack.length-1] !== id) pageStack.push(id);
    }
    function goBack() { if (pageStack.length > 1) { pageStack.pop(); showPage(pageStack[pageStack.length - 1], false); } }
</script>
</body>
</html>
