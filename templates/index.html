<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720 | Premier NEET Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pw-blue: #1b10b1; --bg: #f4f7fe; --text: #2d3436; --card: #ffffff; --border: rgba(27, 16, 177, 0.08); }
        body.dark-mode { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        .container { width: 100%; max-width: 1200px; margin: auto; padding: 15px; box-sizing: border-box; }
        .page-section { display: none; min-height: 100vh; }
        .active-page { display: block !important; }

        /* Home Design */
        .banner-card { min-width: 100%; height: 130px; color: white; padding: 25px; border-radius: 25px; display: flex; flex-direction: column; justify-content: center; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(27, 16, 177, 0.2); }
        .subject-card { background: var(--card); padding: 30px 15px; border-radius: 30px; text-align: center; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; }
        .item-card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); margin-bottom: 12px; padding: 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; }

        /* Specials Section */
        .specials-title { font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; margin: 30px 0 15px 0; display: block; border-top: 1px dashed #ddd; padding-top: 20px; }

        /* Test Engine */
        #page-test { background: #000 !important; color: white !important; }
        .option-box { background: #1e293b; border: 1px solid #334155; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.2s; }
        .option-box.correct { background: #064e3b !important; border-color: #10b981 !important; }
        .option-box.wrong { background: #7f1d1d !important; border-color: #ef4444 !important; }
        .nav-dot { min-width: 38px; height: 38px; border-radius: 8px; background: #1e293b; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .nav-dot.active { background: #7f1d1d; color: #fca5a5; border: 1px solid #fca5a5; }

        .header-sticky { background: var(--card); padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .footer-nav { position: fixed; bottom: 0; width: 100%; max-width: 1200px; background: #111; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #334155; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div onclick="toggleDarkMode()" style="font-size:1.2rem;"><i class="fas fa-adjust"></i></div>
            <div style="font-weight:900; color:var(--pw-blue);">TARGET 720</div>
        </div>
        <div class="banner-card" style="background: var(--pw-blue);"><h3>Daily Practice</h3><p>Consistent effort beats talent.</p></div>
        <div id="neet-timer" style="background:#ef4444; color:white; padding:8px 15px; border-radius:50px; font-weight:900; font-size:0.75rem; display:inline-block; margin-bottom:20px;">NEET 2026: 00d 00h 00m</div>
        
        <div id="main-subjects" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
        
        <div id="specials-container" style="display:none;">
            <span class="specials-title">Specials</span>
            <div id="custom-list" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
        </div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="header-sticky"><i class="fas fa-arrow-left" onclick="goBack()"></i><h3 id="sub-title" style="margin:0;">Subject</h3></div>
    <div class="container" id="chapter-list"></div>
</div>

<div id="page-dpp" class="page-section">
    <div class="header-sticky"><i class="fas fa-arrow-left" onclick="goBack()"></i><h3 id="ch-title" style="margin:0;">Chapter</h3></div>
    <div class="container" id="dpp-items"></div>
</div>

<div id="page-instructions" class="page-section">
    <div class="header-sticky"><i class="fas fa-arrow-left" onclick="goBack()"></i><h3 style="margin:0;">Instructions</h3></div>
    <div class="container">
        <div style="background:#1e40af; color:white; padding:15px; border-radius:12px; margin-bottom:20px; font-size:0.8rem;"><i class="fas fa-info-circle"></i> Don't worry, missing XP points will be added soon!</div>
        <div style="background:var(--card); padding:25px; border-radius:20px; border:1px solid var(--border);">
            Questions: <b id="ins-qcount">0</b><br>
            Time: <b id="ins-time">0</b> Minutes<br>
            Correct: <span style="color:#10b981;">+4</span> | Wrong: <span style="color:#ef4444;">-1</span>
        </div>
        <button onclick="startActualTest()" style="position:fixed; bottom:25px; left:5%; width:90%; padding:18px; background:#c7d2fe; color:#1e1b4b; border:none; border-radius:15px; font-weight:800; font-size:1.1rem;">Start Test</button>
    </div>
</div>

<div id="page-test" class="page-section">
    <div class="test-header" style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #334155;">
        <h3 id="test-timer" style="margin:0;">00:00</h3>
