<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720 | Premier NEET Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --pw-blue: #1b10b1; --pw-gradient: linear-gradient(135deg, #1b10b1 0%, #4a3aff 100%);
            --bg: #f4f7fe; --text: #2d3436; --card: #ffffff; --border: rgba(27, 16, 177, 0.08);
        }
        body.dark-mode { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        
        .container { width: 100%; max-width: 1200px; margin: auto; padding: 20px; box-sizing: border-box; }
        .page-section { display: none; min-height: 100vh; }
        .active-page { display: block !important; }

        /* Banners */
        .banner-wrapper { width: 100%; overflow: hidden; border-radius: 25px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .banner-container { display: flex; transition: transform 0.5s ease; }
        .banner-card { min-width: 100%; height: 140px; color: white; padding: 30px; display: flex; flex-direction: column; justify-content: center; position: relative; box-sizing: border-box; }

        /* Countdown */
        @keyframes pulse-red { 0%, 100% { background: #ef4444; color: white; } 50% { background: white; color: #ef4444; } }
        .countdown-badge { display: inline-block; padding: 6px 15px; border-radius: 50px; font-weight: 900; font-size: 0.8rem; border: 2px solid #ef4444; animation: pulse-red 2s infinite; margin-top: 10px; }

        /* Grids */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-top: 20px; }
        .subject-card { background: var(--card); padding: 35px 15px; border-radius: 30px; text-align: center; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; position: relative; }
        .subject-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .star-icon { position: absolute; top: 15px; right: 15px; color: #f59e0b; }

        /* Chapter/DPP Cards */
        .item-card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); margin-bottom: 15px; padding: 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .item-card:active { transform: scale(0.98); }
        
        .ch-tag { background: #2d3436; color: white; font-size: 0.65rem; padding: 4px 10px; border-radius: 6px; font-weight: 900; display: inline-block; margin-bottom: 8px; }
        .dpp-thumb { width: 80px; height: 80px; background: #fed7aa; border-radius: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
        .dpp-icon-box { background: white; padding: 5px 8px; border-radius: 8px; font-weight: 900; font-size: 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .attempt-bar { background: #1e293b; color: white; padding: 12px; border-radius: 12px; margin-top: 10px; text-align: center; font-weight: bold; width: 100%; border: none; }

        .header-sticky { background: var(--card); padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .login-alert { font-size: 0.7rem; color: #be123c; font-weight: bold; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div onclick="toggleDarkMode()" style="font-size:1.5rem; color:var(--pw-blue); cursor:pointer;"><i class="fas fa-adjust"></i></div>
            <div id="auth-ui">
                <div id="g_id_onload" data-client_id="614180387554-801p5epi2emvn7mt5tkn3pf3sth0imga.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
                <div id="user-badge" style="display:none; align-items:center; gap:12px; background:var(--card); padding:5px 15px; border-radius:50px; border:1px solid var(--border);">
                    <div style="text-align: right;"><div id="un-name" style="font-weight:800; font-size:0.8rem;">GUEST</div><div style="background:gold; color:#000; font-size:0.6rem; font-weight:900; padding:2px 8px; border-radius:10px;">RANK: #0</div></div>
                    <img id="un-pic" src="" style="width:38px; height:38px; border-radius:50%; border:2px solid var(--pw-blue);">
                </div>
            </div>
        </div>

        <div class="banner-wrapper">
            <div class="banner-container" id="banner-slide">
                <div class="banner-card" style="background: #1b10b1;"><h3>Don't Stress</h3><p>Success is closer than you think!</p></div>
                <div class="banner-card" style="background: #ea580c;"><h3>Daily Practice</h3><p>The only way to master NEET 2026.</p></div>
                <div class="banner-card" style="background: #059669;"><h3>Consistency</h3><p>Every single Apple 🍎 matters!</p></div>
            </div>
        </div>

        <h1 style="margin:0; font-size:2.5rem; font-weight:900; color:var(--pw-blue);">Target720</h1>
        <div id="live-clock" style="font-weight:bold; color:#64748b; font-size:0.9rem;"></div>
        <div id="neet-timer" class="countdown-badge">NEET 2026: 00d 00h 00m</div>

        <div class="stats-bar" style="background: var(--card); padding: 20px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); margin: 30px 0; cursor: pointer; position: relative;">
            <div style="display:flex; align-items:center; gap:15px;"><i class="fas fa-chart-line" style="color:#10b981; font-size:1.5rem;"></i>
                <div><span style="font-weight:800;">Analytics</span><small id="login-msg" class="login-alert">Please log in to unlock Global Ranking</small></div>
            </div>
            <div style="color:#ef4444; font-weight:900; font-size:1.3rem;">0 🍎</div>
            <div id="lock-layer" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.1); backdrop-filter:blur(4px); border-radius:25px; display:flex; align-items:center; justify-content:center;"><i class="fas fa-lock" style="background:white; padding:10px; border-radius:50%; color:var(--pw-blue); box-shadow:0 5px 15px rgba(0,0,0,0.1);"></i></div>
        </div>

        <div class="main-grid" id="main-subjects"></div>

        <div id="custom-subjects-area" style="display:none; margin-top:40px;">
            <span style="font-weight:900; color:#64748b; text-transform:uppercase; letter-spacing:1px;">Specials</span>
            <div class="main-grid" id="custom-list"></div>
        </div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="header-sticky"><i class="fas fa-chevron-left" onclick="goBack()" style="cursor:pointer;"></i><h3 id="sub-title" style="margin:0;">Subject</h3></div>
    <div class="container" id="chapter-list"></div>
</div>

<div id="page-dpp" class="page-section">
    <div class="header-sticky"><i class="fas fa-chevron-left" onclick="goBack()" style="cursor:pointer;"></i><h3 id="ch-title-dpp" style="margin:0; font-size:1rem;">Chapter Name</h3></div>
    <div class="container" id="dpp-items"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    let config = {}, bIdx = 0, pageStack = ['page-home'], curSub = "";

    window.onload = async () => {
        const res = await fetch('/get_config?v='+Date.now()); config = await res.json();
        renderHome(); updateTime(); setInterval(updateTime, 1000);
        setInterval(() => { bIdx = (bIdx + 1) % 3; document.getElementById('banner-slide').style.transform = `translateX(-${bIdx * 100}%)`; }, 4000);
        if(localStorage.getItem('un')) updateUI();
    };

    function updateTime() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleString('en-IN', { weekday:'short', day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }).toUpperCase();
        const diff = new Date("May 3, 2026") - now;
        const d = Math.floor(diff/864e5), h = Math.floor((diff%864e5)/36e5), m = Math.floor((diff%36e5)/6e4);
        document.getElementById('neet-timer').innerText = `NEET 2026: ${d}d ${h}h ${m}m`;
    }

    function renderHome() {
        const mainSubs = ['physics','chemistry','botany','zoology'];
        let mH = '', sH = '', hasSpecial = false;
        for (let s in config) {
            let isMain = mainSubs.includes(s.toLowerCase());
            let icon = s.toLowerCase()==='physics'?'atom':s.toLowerCase()==='chemistry'?'flask':s.toLowerCase()==='botany'?'leaf':'dna';
            let card = `<div class="subject-card" onclick="openSubjectPage('${s}')">
                <i class="fas fa-${isMain ? icon : 'file-alt'}" style="font-size:3.5rem; color:var(--pw-blue); margin-bottom:15px;"></i>
                <h3 style="margin:0;">${s.toUpperCase()}</h3>
                ${!isMain ? '<i class="fas fa-star star-icon"></i>' : ''}
            </div>`;
            if (isMain) mH += card;
            else { sH += card; hasSpecial = true; }
        }
        document.getElementById('main-subjects').innerHTML = mH;
        if(hasSpecial) {
            document.getElementById('custom-subjects-area').style.display = 'block';
            document.getElementById('custom-list').innerHTML = sH;
        }
    }

    // NAVIGATION
    function showPage(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if (pageStack[pageStack.length - 1] !== id) pageStack.push(id);
    }

    function goBack() {
        if (pageStack.length > 1) {
            pageStack.pop();
            const prev = pageStack[pageStack.length - 1];
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
            document.getElementById(prev).classList.add('active-page');
        }
    }

    function openSubjectPage(s) {
        curSub = s;
        document.getElementById('sub-title').innerText = s.toUpperCase();
        let h = '', i = 1;
        for (let ch in config[s]) {
            h += `<div class="item-card" onclick="openDPPList('${ch}')">
                    <div style="flex:1;">
                        <span class="ch-tag">CH - ${i<10?'0'+i:i}</span>
                        <h3 style="margin:5px 0; font-size:1.1rem;">${ch}</h3>
                        <div style="font-size:0.85rem; color:var(--pw-blue); font-weight:800;"><i class="fas fa-check-circle"></i> Completed: 0 / Total: ${config[s][ch].length} DPPs</div>
                    </div>
                    <i class="fas fa-chevron-right" style="color:#cbd5e1;"></i>
                  </div>`;
            i++;
        }
        document.getElementById('chapter-list').innerHTML = h;
        showPage('page-chapters');
    }

    function openDPPList(ch) {
        document.getElementById('ch-title-dpp').innerText = ch;
        let h = '', dpps = config[curSub][ch];
        dpps.forEach((d, i) => {
            h += `<div class="item-card" style="cursor:default;">
                <div class="dpp-thumb"><small style="position:absolute; top:8px; left:10px; font-weight:900; font-size:0.6rem;">OBJ</small><div class="dpp-icon-box">DPP</div></div>
                <div style="flex:1;">
                    <div style="font-size:0.75rem; color:#64748b; font-weight:bold;">DPP • TARGET 720</div>
                    <span style="font-weight:700; display:block; margin:5px 0;">${d.name} MCQ QUIZ</span>
                    <div style="font-size:0.8rem; color:#64748b; font-weight:600;">20 Qs. • 80 Marks • Earn 40 🍎</div>
                    <button class="attempt-bar" onclick="alert('Starting ${d.name}')">Attempt</button>
                </div>
            </div>`;
        });
        document.getElementById('dpp-items').innerHTML = h;
        showPage('page-dpp');
    }

    function handleCredentialResponse(r) {
        const u = JSON.parse(atob(r.credential.split('.')[1]));
        localStorage.setItem('un', u.name); localStorage.setItem('gpic', u.picture); updateUI();
    }

    function updateUI() {
        document.querySelector('.g_id_signin').style.display = 'none';
        document.getElementById('user-badge').style.display = 'flex';
        document.getElementById('lock-layer').style.display = 'none';
        document.getElementById('login-msg').innerText = "Personalized Insights Unlocked";
        document.getElementById('un-pic').src = localStorage.getItem('gpic');
        document.getElementById('un-name').innerText = localStorage.getItem('un').toUpperCase();
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
</script>
</body>
</html>
