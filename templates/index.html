<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Variables for Smooth Transitions */
        :root {
            --pw-blue: #1b10b1;
            --pw-gradient: linear-gradient(135deg, #1b10b1 0%, #4a3aff 100%);
            --bg: #f8faff;
            --text: #2d3436;
            --card: #ffffff;
            --border: rgba(27, 16, 177, 0.1);
            --shadow: rgba(27, 16, 177, 0.05);
        }

        /* POINT 4: Professional Global Dark Mode (Toggle only on Home) */
        body.dark-mode {
            --bg: #121212;
            --text: #ffffff;
            --card: #1e1e1e;
            --border: #333333;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text); 
            transition: background 0.4s ease, color 0.4s ease; /* Soft fading effect */
        }
        
        .page-section { display: none; min-height: 100vh; background-color: var(--bg); }
        .active-page { display: block !important; }
        .container { max-width: 800px; margin: auto; padding: 20px; }

        /* Mode Toggle Button (Front Page Only) */
        .mode-toggle { 
            position: absolute; 
            top: 25px; 
            right: 25px; 
            cursor: pointer; 
            font-size: 1.6rem; 
            color: var(--pw-blue); 
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .mode-toggle:active { transform: scale(0.8); }

        /* POINT 2: Interactive Subject Grid */
        .branding-title { text-align: center; color: var(--pw-blue); margin: 40px 0; font-size: 2rem; letter-spacing: 1px; }
        
        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        
        .main-card { 
            background: var(--card); 
            padding: 35px 15px; 
            border-radius: 24px; 
            text-align: center; 
            box-shadow: 0 10px 20px var(--shadow); 
            cursor: pointer; 
            border: 1px solid var(--border); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Pop effect */
            position: relative;
            overflow: hidden;
        }
        
        /* Hover/Touch Glow Effect */
        .main-card:active, .main-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 30px rgba(27, 16, 177, 0.2); 
            border-color: var(--pw-blue);
        }

        .main-card i { font-size: 3rem; color: var(--pw-blue); margin-bottom: 15px; display: block; }
        .main-card h3 { margin: 0; font-size: 1.1rem; text-transform: uppercase; font-weight: 700; }

        /* Progress Line Placeholder */
        .card-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            width: 40%; /* Example progress */
            background: var(--pw-gradient);
            border-radius: 0 2px 2px 0;
        }

        /* Rest of the pages styles (Chapter, DPP, Test, Result) ... */
        /* (Inhe maine touch nahi kiya hai jaisa aapne bola) */
        .nav-header { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); }
        .item-row { display: flex; justify-content: space-between; padding: 18px; background: var(--card); margin: 12px 0; border-radius: 15px; border: 1px solid var(--border); font-weight: 600; }
        .footer { position: fixed; bottom: 0; width: 100%; background: var(--card); padding: 15px; display: flex; gap: 10px; box-sizing: border-box; border-top: 1px solid var(--border); }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <div class="mode-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></div>
        
        <h1 class="branding-title">TARGET<span style="color:var(--text)">720</span></h1>
        
        <div class="main-grid" id="main-subjects"></div>
        
        <div id="custom-subjects-area" style="display:none; margin-top:30px;">
            <div id="custom-list"></div>
        </div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="nav-header"><i class="fas fa-arrow-left" onclick="goBack()"></i> <h3 id="sub-title" style="margin:0"></h3></div>
    <div class="container" id="chapter-list-content"></div>
</div>

<div id="page-dpps" class="page-section">
    <div class="nav-header"><i class="fas fa-arrow-left" onclick="goBack()"></i> <h3 id="chap-title-display" style="margin:0"></h3></div>
    <div class="container" id="dpp-list-content"></div>
</div>

<script>
    let config = {}, questions = [], cur = 0, answers = [], curSub = "", tInt, pageStack = ['page-home'];

    window.onload = async () => {
        const res = await fetch('/get_config?v=' + Date.now());
        config = await res.json();
        renderHome();
    };

    // POINT 4: Professional Dark Mode Logic
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const icon = document.querySelector('.mode-toggle i');
        if (document.body.classList.contains('dark-mode')) {
            icon.classList.replace('fa-moon', 'fa-sun');
        } else {
            icon.classList.replace('fa-sun', 'fa-moon');
        }
    }

    // POINT 2: Render Subject Grid with Pop Effect
    function renderHome() {
        const mainSubs = ['physics', 'chemistry', 'botany', 'zoology'];
        let mH = '', cH = '', hasC = false;
        for (let s in config) {
            if (mainSubs.includes(s)) {
                let icon = s === 'physics' ? 'atom' : s === 'chemistry' ? 'flask' : s === 'botany' ? 'leaf' : 'dna';
                mH += `
                <div class="main-card" onclick="openSubject('${s}')">
                    <i class="fas fa-${icon}"></i>
                    <h3>${s}</h3>
                    <div class="card-progress"></div>
                </div>`;
            } else {
                hasC = true;
                cH += `<div class="rect-card" onclick="openSubject('${s}')"><h3>${s.toUpperCase()}</h3><i class="fas fa-arrow-right"></i></div>`;
            }
        }
        document.getElementById('main-subjects').innerHTML = mH;
        if(hasC) {
            document.getElementById('custom-subjects-area').style.display = 'block';
            document.getElementById('custom-list').innerHTML = cH;
        }
    }

    // Baaki saare functions (openSubject, openDPPs, submitTest, etc.) wahi rahenge jo pichle code mein the.
    // Maine unhe change nahi kiya hai taaki logic kharab na ho.
    
    function showPage(id, push = true) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(push && pageStack[pageStack.length-1] !== id) pageStack.push(id);
    }
    function goBack() { if (pageStack.length > 1) { pageStack.pop(); showPage(pageStack[pageStack.length - 1], false); } }
    
    // ... (Questions logic wahi rahega)
</script>
</body>
</html>
