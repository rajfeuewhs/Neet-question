<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET Ultimate Test Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --pw-blue: #1b10b1; --pw-light: #f0f2ff; --green: #28a745; --danger: #ff0000; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7fe; overflow-x: hidden; }
        
        /* Dashboard Responsive Grid */
        .dashboard { max-width: 1000px; margin: 20px auto; padding: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        
        .card { background: white; padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .card i { font-size: 2rem; color: var(--pw-blue); margin-bottom: 10px; }
        .card h3 { font-size: 1rem; margin: 5px 0; }

        /* Test Interface */
        #test-container { display: none; min-height: 100vh; flex-direction: column; background: white; }
        .header { padding: 10px 20px; border-bottom: 2px solid #ddd; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; z-index: 100; }
        
        #timer { font-size: 1.2rem; font-weight: bold; padding: 5px 15px; border-radius: 8px; background: #eee; }
        .timer-red { background: var(--danger) !important; color: white !important; animation: flash 0.6s infinite; }

        .body-layout { display: flex; flex-direction: row; flex: 1; }
        
        .q-area { flex: 3; padding: 20px; padding-bottom: 100px; } /* Bottom padding for mobile buttons */
        .sidebar { flex: 1; background: #fff; border-left: 1px solid #ddd; padding: 20px; }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .body-layout { flex-direction: column; }
            .sidebar { border-left: none; border-top: 1px solid #ddd; order: 2; }
            .q-area { order: 1; }
            .header h2 { font-size: 1.1rem; }
        }

        .opt { padding: 15px; border: 1px solid #ddd; margin: 10px 0; border-radius: 10px; cursor: pointer; font-size: 1rem; background: #fff; }
        .opt.active { border: 2px solid var(--pw-blue); background: var(--pw-light); font-weight: bold; }
        
        .palette { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; margin-top: 15px; }
        .dot { width: 40px; height: 40px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; font-size: 0.9rem; }
        .dot.green { background: var(--green); color: white; border: none; }

        /* Fixed Mobile Footer Buttons */
        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 1px solid #ddd; display: flex; justify-content: space-between; gap: 10px; }
        .btn-next { background: var(--pw-blue); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; flex: 1; cursor: pointer; }
        .btn-submit { background: orange; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="dashboard" id="dash">
    <h2 style="color: var(--pw-blue); margin-bottom: 5px;">NEET PREP PORTAL</h2>
    <p style="margin-top: 0; color: #666; font-size: 0.9rem;">Choose Subject & Start Test</p>
    <div class="grid">
        <div class="card" onclick="startTest('physics')"><i class="fas fa-atom"></i><h3>Physics</h3></div>
        <div class="card" onclick="startTest('chemistry')"><i class="fas fa-flask"></i><h3>Chemistry</h3></div>
        <div class="card" onclick="startTest('botany')"><i class="fas fa-leaf"></i><h3>Botany</h3></div>
        <div class="card" onclick="startTest('zoology')"><i class="fas fa-dog"></i><h3>Zoology</h3></div>
    </div>
    <h3 style="margin-top: 30px; text-align: left; padding-left: 10px;">Mega Mock Tests</h3>
    <div class="grid">
        <div class="card" onclick="startTest('test_180')" style="background:#eef0ff"><h3>180 Qs</h3></div>
        <div class="card" onclick="startTest('test_720')" style="background:#eef0ff"><h3>720 Qs</h3></div>
    </div>
</div>

<div id="test-container">
    <div class="header">
        <h2 id="title" style="margin:0;">Test</h2>
        <div id="timer">00:00:00</div>
    </div>
    <div class="body-layout">
        <div class="q-area">
            <h4 id="q-num" style="color: #666; margin-bottom: 10px;">Question 1</h4>
            <div id="q-txt" style="font-size: 1.15rem; margin-bottom: 25px; line-height: 1.5;"></div>
            <div id="opts-grid"></div>
        </div>
        <div class="sidebar">
            <h4 style="margin-top:0;">Question Palette</h4>
            <div class="palette" id="plt"></div>
        </div>
    </div>
    <div class="footer-nav">
        <button class="btn-submit" onclick="submitTest()">SUBMIT</button>
        <button class="btn-next" onclick="next()">SAVE & NEXT</button>
    </div>
</div>

<script>
    let questions = [];
    let current = 0;
    let userAnswers = [];
    let timeLeft = 0;
    let timerId;

    async function startTest(cat) {
        document.getElementById('dash').style.display = 'none';
        document.getElementById('test-container').style.display = 'flex';
        
        const res = await fetch(`/get_test/${cat}`);
        questions = await res.json();
        userAnswers = new Array(questions.length).fill(null);
        
        timeLeft = questions.length * 180;
        runTimer();
        loadQ(0);
    }

    function runTimer() {
        if(timerId) clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--;
            const timerEl = document.getElementById('timer');
            let absTime = Math.abs(timeLeft);
            let h = Math.floor(absTime / 3600).toString().padStart(2,'0');
            let m = Math.floor((absTime % 3600) / 60).toString().padStart(2,'0');
            let s = (absTime % 60).toString().padStart(2,'0');
            
            if(timeLeft < 0) {
                timerEl.innerText = `-${h}:${m}:${s}`;
                timerEl.classList.add('timer-red');
            } else {
                timerEl.innerText = `${h}:${m}:${s}`;
            }
        }, 1000);
    }

    function loadQ(i) {
        current = i;
        const q = questions[i];
        document.getElementById('q-num').innerText = `Question ${i+1} of ${questions.length}`;
        document.getElementById('q-txt').innerText = q.q;
        
        let h = '';
        q.options.forEach((o, idx) => {
            let active = userAnswers[i] === idx ? 'active' : '';
            h += `<div class="opt ${active}" onclick="pick(${idx})">${o}</div>`;
        });
        document.getElementById('opts-grid').innerHTML = h;
        renderPlt();
        window.scrollTo(0,0); // Scroll to top on new question
    }

    function pick(idx) {
        userAnswers[current] = idx;
        loadQ(current);
    }

    function next() {
        if(current < questions.length - 1) loadQ(current + 1);
        else alert("You are on the last question.");
    }

    function renderPlt() {
        let h = '';
        questions.forEach((_, i) => {
            let cls = userAnswers[i] !== null ? 'green' : '';
            let activeBorder = (current === i) ? 'border: 2px solid var(--pw-blue);' : '';
            h += `<div class="dot ${cls}" style="${activeBorder}" onclick="loadQ(${i})">${i+1}</div>`;
        });
        document.getElementById('plt').innerHTML = h;
    }

    function submitTest() {
        if(!confirm("Are you sure you want to submit?")) return;
        let score = 0;
        questions.forEach((q, i) => {
            if(userAnswers[i] === q.correct_ans) score += 4;
            else if(userAnswers[i] !== null) score -= 1;
        });
        alert(`Test Submitted!\nYour Score: ${score}`);
        location.reload();
    }
</script>
</body>
</html>
