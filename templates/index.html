<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #8b5cf6; --card-bg: #1e1e1e; --text: #ffffff; }
        body { font-family: sans-serif; margin: 0; background: #121212; color: var(--text); }
        .page-section { display: none; min-height: 100vh; padding-bottom: 80px; }
        .active-page { display: block !important; }
        .container { max-width: 600px; margin: auto; padding: 15px; }

        /* Centered Header */
        .header { padding: 15px; background: #1e1e1e; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; }
        
        /* Subject/Chapter Cards */
        .item-card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; cursor: pointer; }
        
        /* DPP Card Design (Clean - No Earn XP) */
        .dpp-card { background: #1e1e1e; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; }
        .dpp-info { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 15px; }
        .dpp-icon { background: #ffdfba; width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold; }
        .dpp-meta h3 { margin: 0; font-size: 1rem; color: #fff; }
        .dpp-meta p { margin: 5px 0; font-size: 0.8rem; color: #aaa; }
        
        .attempt-btn { background: #252525; color: #fff; width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* Standard Buttons */
        .footer { position: fixed; bottom: 0; width: 100%; background: #1e1e1e; padding: 15px; display: flex; gap: 10px; box-sizing: border-box; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="header"><h3>Subjects</h3></div>
    <div class="container" id="main-subs"></div>
</div>

<div id="page-chapters" class="page-section">
    <div class="header"><i class="fas fa-arrow-left" onclick="goBack()"></i> <h3 id="sub-t"></h3></div>
    <div class="container" id="chap-list"></div>
</div>

<div id="page-dpps" class="page-section">
    <div class="header"><i class="fas fa-arrow-left" onclick="goBack()"></i> <h3 id="chap-t"></h3></div>
    <div class="container" id="dpp-list"></div>
</div>

<script>
    let config={}, questions=[], curSub="", pageStack=['page-home'];

    window.onload = async () => {
        const res = await fetch('/get_config?v='+Date.now()); config = await res.json();
        renderHome();
    };

    function renderHome() {
        let h=''; for(let s in config) {
            h += `<div class="item-card" onclick="openSub('${s}')"><span>${s.toUpperCase()}</span><i class="fas fa-chevron-right"></i></div>`;
        }
        document.getElementById('main-subs').innerHTML = h;
    }

    function openSub(s) {
        curSub = s; document.getElementById('sub-t').innerText = s.toUpperCase();
        let h=''; for(let c in config[s]) {
            if(c === "Direct_Tests") continue;
            h += `<div class="item-card" onclick="openDPPs('${c}')"><div><b>${c}</b><br><small>DPPs: ${config[s][c].length}</small></div><i class="fas fa-chevron-right"></i></div>`;
        }
        document.getElementById('chap-list').innerHTML = h; showP('page-chapters');
    }

    // Clean DPP Cards
    function openDPPs(c) {
        document.getElementById('chap-t').innerText = c;
        const tests = config[curSub][c]; let h='';
        tests.forEach(t => {
            h += `
            <div class="dpp-card">
                <div class="dpp-info">
                    <div class="dpp-icon">DPP</div>
                    <div class="dpp-meta">
                        <h3>${t.name}</h3>
                        <p>Questions: ${t.qCount || '--'} | Marks: ${t.mCount || '--'}</p>
                    </div>
                </div>
                <button class="attempt-btn" onclick="startT('${t.file}','${t.name}')">
                    <i class="fas fa-arrow-circle-right"></i> Attempt
                </button>
            </div>`;
        });
        document.getElementById('dpp-list').innerHTML = h; showP('page-dpps');
    }

    function showP(id) {
        document.querySelectorAll('.page-section').forEach(p=>p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(pageStack[pageStack.length-1]!==id) pageStack.push(id);
    }
    function goBack() { pageStack.pop(); showP(pageStack[pageStack.length-1], false); }
</script>
</body>
</html>
