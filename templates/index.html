<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Variables for Real Dark Mode */
        :root {
            --pw-blue: #1b10b1;
            --pw-gradient: linear-gradient(135deg, #1b10b1 0%, #4a3aff 100%);
            --bg: #f8faff;
            --text: #2d3436;
            --card: #ffffff;
            --border: rgba(0,0,0,0.1);
            --header-bg: #ffffff;
        }

        /* Dark Mode Colors (Global) */
        body.dark-mode {
            --bg: #121212;
            --text: #ffffff;
            --card: #1e1e1e;
            --border: #333333;
            --header-bg: #1e1e1e;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }
        .page-section { display: none; min-height: 100vh; background-color: var(--bg); }
        .active-page { display: block !important; }
        .container { max-width: 800px; margin: auto; padding: 20px; }

        /* Mode Toggle (Front Page Only) */
        .mode-toggle { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 1.5rem; color: var(--pw-blue); z-index: 100; }

        /* Branding & Subject Squares */
        .branding-title { text-align: center; color: var(--pw-blue); margin: 30px 0; font-size: 1.8rem; }
        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .main-card { background: var(--card); padding: 30px 15px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px var(--border); cursor: pointer; border: 1px solid var(--border); transition: 0.2s; }
        .main-card i { font-size: 2.5rem; color: var(--pw-blue); margin-bottom: 12px; }

        /* Chapter Design (As per Screenshot) */
        .chap-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 18px; margin-bottom: 12px; position: relative; cursor: pointer; }
        .chap-tag { background: #2d3436; color: white; font-size: 0.7rem; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; margin-bottom: 8px; display: inline-block; }
        body.dark-mode .chap-tag { background: #333; }
        .chap-title { font-size: 1rem; font-weight: bold; margin-bottom: 8px; display: block; padding-right: 25px; }
        .chap-meta { font-size: 0.8rem; color: #666; display: flex; gap: 15px; }
        body.dark-mode .chap-meta { color: #aaa; }
        .chap-arrow { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #666; }

        /* DPP Design */
        .dpp-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .dpp-icon { background: #ffdfba; width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #333; flex-shrink: 0; }
        .attempt-btn { background: var(--pw-gradient); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }

        /* Nav & Footer */
        .nav-header { padding: 15px; display: flex; align-items: center; gap: 15px; background: var(--header-bg); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
        .footer { position: fixed; bottom: 0; width: 100%; background: var(--card); padding: 12px; display: flex; gap: 10px; box-sizing: border-box; border-top: 1px solid var(--border); }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <div class="mode-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></div>
        <h1 class="branding-title">Target720 NEET</h1>
        <div class="main-grid" id="main-subjects"></div>
        <div id="custom-subjects-area" style="display:none; margin-top:20px;"><div id="custom-list"></div></div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="nav-header"><i class="fas fa-arrow-left" onclick="goBack()"></i> <h3 id="sub-title" style="margin:0"></h3></div>
    <div class="container" id="chapter-list-content"></div>
</div>

<div id="page-dpps" class="page-section">
    <div class="nav-header"><i class="fas fa-arrow-left" onclick="goBack()"></i> <h3 id="chap-title-display" style="margin:0"></h3></div>
    <div class="container" id="dpp-list-content"></div>
</div>

<div id="page-test" class="page-section">
    <div style="background:var(--pw-gradient); color:white; padding:15px; display:flex; justify-content:space-between;">
        <span id="t-name">Test</span><span id="timer">00:00</span>
    </div>
    <div class="container"><div id="qt" style="font-size:1.2rem; margin-bottom:20px;"></div><div id="qimg"></div><div id="opts"></div></div>
    <div class="footer"><button class="btn" onclick="submitTest()" style="background:#eee; color:#333;">SUBMIT</button><button class="btn" onclick="nextQ()" style="background:var(--pw-gradient); color:white;">NEXT</button></div>
</div>

<div id="page-res" class="page-section">
    <div class="container" style="text-align: center;">
        <h2>Test Result</h2>
        <h1 id="score-marks" style="color:var(--pw-blue)">0</h1>
        <div id="analysis-list" style="text-align: left; margin-bottom: 80px;"></div>
        <div class="footer">
            <button class="btn" onclick="reattemptTest()" style="background:#eee; color:#333;">REATEMPT</button>
            <button onclick="location.reload()" class="btn" style="background:var(--pw-gradient); color:white;">HOME</button>
        </div>
    </div>
</div>

<script>
    let config = {}, questions = [], cur = 0, answers = [], curSub = "", tInt, pageStack = ['page-home'], lastTestPath = "";

    window.onload = async () => {
        const res = await fetch('/get_config?v=' + Date.now());
        config = await res.json();
        renderHome();
    };

    // Professional Global Dark Mode
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const icon = document.querySelector('.mode-toggle i');
        icon.classList.toggle('fa-moon'); icon.classList.toggle('fa-sun');
    }

    function renderHome() {
        const mainSubs = ['physics', 'chemistry', 'botany', 'zoology'];
        let mH = '', cH = '';
        for (let s in config) {
            if (mainSubs.includes(s)) {
                let icon = s === 'physics'?'atom':s==='chemistry'?'flask':s==='botany'?'leaf':'dna';
                mH += `<div class="main-card" onclick="openSubject('${s}')"><i class="fas fa-${icon}"></i><h3>${s.toUpperCase()}</h3></div>`;
            } else {
                cH += `<div class="main-card" style="grid-column: span 2" onclick="openSubject('${s}')"><h3>${s.toUpperCase()}</h3></div>`;
            }
        }
        document.getElementById('main-subjects').innerHTML = mH;
        document.getElementById('custom-list').innerHTML = cH;
        if(cH) document.getElementById('custom-subjects-area').style.display = 'block';
    }

    // Screenshot Style Chapter Design
    function openSubject(s) {
        curSub = s; document.getElementById('sub-title').innerText = s.toUpperCase();
        const chapters = Object.keys(config[s]);
        if (chapters.length === 1 && chapters[0] === "Direct_Tests") { openDPPs("Direct_Tests"); return; }
        let h = '';
        chapters.forEach((ch, i) => {
            if(ch === "Direct_Tests") return;
            const dppCount = config[s][ch].length;
            h += `
            <div class="chap-card" onclick="openDPPs('${ch}')">
                <span class="chap-tag">CH - ${i+1<10?'0':''}${i+1}</span>
                <span class="chap-title">${ch}</span>
                <div class="chap-meta"><span>Lectures: 0/0</span> <span>DPP: ${dppCount}</span></div>
                <i class="fas fa-chevron-right chap-arrow"></i>
            </div>`;
        });
        document.getElementById('chapter-list-content').innerHTML = h;
        showPage('page-chapters');
    }

    // DPP Card with Auto Marks
    async function openDPPs(ch) {
        document.getElementById('chap-title-display').innerText = ch === "Direct_Tests" ? "Tests" : ch;
        const tests = config[curSub][ch];
        let h = '';
        for(let t of tests) {
            const qRes = await fetch(`/get_test/${t.file}?v=${Date.now()}`);
            const qData = await qRes.json();
            h += `
            <div class="dpp-card">
                <div class="dpp-icon">DPP</div>
                <div style="flex:1">
                    <b>${t.name}</b><br>
                    <small style="color:#666">${qData.length} Qs • ${qData.length * 4} Marks</small>
                    <button class="attempt-btn" onclick="startTest('${t.file}', '${t.name}')">Attempt</button>
                </div>
            </div>`;
        }
        document.getElementById('dpp-list-content').innerHTML = h;
        showPage('page-dpps');
    }

    // Test Logic Fix
    async function startTest(path, name) {
        const res = await fetch(`/get_test/${path}?v=${Date.now()}`);
        questions = await res.json();
        lastTestPath = {path, name};
        answers = new Array(questions.length).fill(null);
        document.getElementById('t-name').innerText = name;
        if(tInt) clearInterval(tInt);
        let time = questions.length * 60;
        tInt = setInterval(() => {
            time--; let m=Math.floor(time/60), s=time%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(time<=0) submitTest();
        }, 1000);
        showPage('page-test'); render(0);
    }

    function reattemptTest() { startTest(lastTestPath.path, lastTestPath.name); }

    function render(i) {
        cur = i; const q = questions[i];
        document.getElementById('qt').innerText = q.q;
        document.getElementById('qimg').innerHTML = q.img ? `<img src="${q.img}" style="width:100%; border-radius:15px; margin:10px 0;">` : "";
        let h = '';
        q.options.forEach((o, idx) => h += `<div class="opt" style="padding:15px; border:1px solid var(--border); margin:10px 0; border-radius:10px; cursor:pointer; background:${answers[i]===idx?'var(--pw-light)':''}; color:var(--text)" onclick="answers[${i}]=${idx};render(${i})">${o}</div>`);
        document.getElementById('opts').innerHTML = h;
    }

    function nextQ() { if(cur < questions.length - 1) render(cur + 1); }

    function submitTest() {
        clearInterval(tInt);
        let correct = 0, wrong = 0;
        questions.forEach((q, i) => {
            if (answers[i] === q.correct_ans) correct++;
            else if (answers[i] !== null) wrong++;
        });
        document.getElementById('score-marks').innerText = `Score: ${(correct*4)-wrong} / ${questions.length*4}`;
        showPage('page-res');
    }

    function showPage(id, push = true) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(push && pageStack[pageStack.length-1] !== id) pageStack.push(id);
    }
    function goBack() { if (pageStack.length > 1) { pageStack.pop(); showPage(pageStack[pageStack.length - 1], false); } }
</script>
</body>
</html>
