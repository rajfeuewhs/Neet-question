<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720 | Premier NEET Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --pw-blue: #1b10b1; --pw-gradient: linear-gradient(135deg, #1b10b1 0%, #4a3aff 100%);
            --bg: #f4f7fe; --text: #2d3436; --card: #ffffff; --border: rgba(27, 16, 177, 0.08);
        }
        body.dark-mode { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        
        .container { width: 100%; max-width: 1200px; margin: auto; padding: 15px; box-sizing: border-box; }
        .page-section { display: none; min-height: 100vh; }
        .active-page { display: block !important; }

        /* Banners */
        .banner-wrapper { width: 100%; overflow: hidden; border-radius: 25px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .banner-container { display: flex; transition: transform 0.5s ease; }
        .banner-card { min-width: 100%; height: 140px; color: white; padding: 30px; display: flex; flex-direction: column; justify-content: center; position: relative; box-sizing: border-box; }

        /* Grids & Subject Cards */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; }
        .subject-card { background: var(--card); padding: 35px 15px; border-radius: 30px; text-align: center; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; position: relative; }
        .subject-card:hover { transform: translateY(-10px); }

        /* DPP List Card */
        .dpp-card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); margin-bottom: 15px; padding: 15px; display: flex; gap: 15px; align-items: center; cursor: pointer; }
        .dpp-thumb { width: 80px; height: 80px; background: #fed7aa; border-radius: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }

        /* --- INSTRUCTION PAGE --- */
        .blue-alert { background: #1e40af; color: white; padding: 12px; border-radius: 10px; font-size: 0.75rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .ins-box { background: var(--card); padding: 20px; border-radius: 15px; line-height: 1.8; font-size: 0.9rem; }
        .start-test-fixed { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: #c7d2fe; color: #1e1b4b; padding: 18px; border: none; border-radius: 15px; font-weight: 800; font-size: 1.1rem; cursor: pointer; }

        /* --- TEST ENGINE --- */
        #page-test { background: #000 !important; color: white !important; }
        .test-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #334155; }
        .nav-dot { min-width: 40px; height: 40px; border-radius: 8px; background: #1e293b; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .nav-dot.active { background: #7f1d1d; color: #fca5a5; border: 2px solid #fca5a5; }
        
        .option-box { background: #1e293b; border: 1px solid #334155; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; color: white; }
        .option-box.correct { background: #064e3b !important; border-color: #10b981; }
        .option-box.wrong { background: #7f1d1d !important; border-color: #ef4444; }

        .header-sticky { background: var(--card); padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .footer-nav { position: fixed; bottom: 0; width: 100%; max-width: 1200px; background: #000; padding: 15px; display: flex; gap: 10px; box-sizing: border-box; border-top: 1px solid #334155; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <h1>Target720</h1>
        <div class="banner-wrapper">
            <div class="banner-container" id="banner-slide">
                <div class="banner-card" style="background: #1b10b1;"><h3>Practice Daily</h3><p>Success is a habit.</p></div>
                <div class="banner-card" style="background: #ea580c;"><h3>Believe</h3><p>Until you're proud.</p></div>
            </div>
        </div>
        <div class="main-grid" id="main-subjects"></div>
        <div id="specials-area" style="display:none; margin-top:30px;">
            <span style="font-weight:900; color:#64748b;">SPECIALS</span>
            <div class="main-grid" id="custom-list"></div>
        </div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="header-sticky"><i class="fas fa-arrow-left" onclick="goBack()"></i><h3 id="sub-title">Subject</h3></div>
    <div class="container" id="chapter-list"></div>
</div>

<div id="page-dpp" class="page-section">
    <div class="header-sticky"><i class="fas fa-arrow-left" onclick="goBack()"></i><h3 id="ch-title-dpp">Chapter</h3></div>
    <div class="container" id="dpp-items"></div>
</div>

<div id="page-instructions" class="page-section">
    <div class="header-sticky"><i class="fas fa-arrow-left" onclick="goBack()"></i><h3>Instructions</h3></div>
    <div class="container">
        <div class="blue-alert">
            <i class="fas fa-info-circle"></i> Don't worry, missing points will be added soon!
        </div>
        <div class="ins-box">
            1. Questions: <b id="ins-qcount">0</b><br>
            2. Duration: <b id="ins-time">0</b> Min<br>
            3. Marking: +4 | -1
        </div>
        <button class="start-test-fixed" onclick="startActualTest()">Start Test</button>
    </div>
</div>

<div id="page-test" class="page-section">
    <div class="test-header">
        <div style="font-weight:bold; font-size:1.1rem;"><i class="far fa-clock"></i> <span id="test-timer-val">00:00:00</span></div>
        <button onclick="submitTest()" style="background:#c7d2fe; color:#000; border:none; padding:8px 18px; border-radius:10px; font-weight:900;">Submit</button>
    </div>
    <div style="display:flex; gap:10px; overflow-x:auto; padding:15px;" id="test-nav"></div>
    <div class="container">
        <div id="ques-area" style="font-size:1.1rem; line-height:1.6; margin-bottom:25px;"></div>
        <div id="opts-area"></div>
    </div>
    <div class="footer-nav">
        <button onclick="prevQ()" style="flex:1; background:#1e293b; color:white; border:none; padding:15px; border-radius:12px;">Previous</button>
        <button onclick="nextQ()" style="flex:1; background:#c7d2fe; color:#000; border:none; padding:15px; border-radius:12px;">Save & Next</button>
    </div>
</div>

<script>
    let config = {}, pageStack = ['page-home'], curSub = "", currentTest = [], qIdx = 0;

    // --- FETCH DATA ---
    window.onload = async () => {
        const res = await fetch('/get_config');
        config = await res.json();
        renderHome();
    };

    function renderHome() {
        const main = ['physics','chemistry','botany','zoology'];
        let mH = '', sH = '', hasS = false;
        for(let s in config) {
            let card = `<div class="subject-card" onclick="openSubject('${s}')"><h3>${s.toUpperCase()}</h3></div>`;
            if(main.includes(s.toLowerCase())) mH += card; 
            else { sH += card; hasS = true; }
        }
        document.getElementById('main-subjects').innerHTML = mH;
        if(hasS) { document.getElementById('specials-area').style.display='block'; document.getElementById('custom-list').innerHTML=sH; }
    }

    function openSubject(s) {
        curSub = s; document.getElementById('sub-title').innerText = s.toUpperCase();
        let h = '', i = 1;
        for(let ch in config[s]) {
            h += `<div class="dpp-card" onclick="openDPPList('${ch}')"><div><b>CH-${i}</b><br>${ch}</div></div>`;
            i++;
        }
        document.getElementById('chapter-list').innerHTML = h;
        showPage('page-chapters');
    }

    function openDPPList(ch) {
        document.getElementById('ch-title-dpp').innerText = ch;
        let h = '', dpps = config[curSub][ch];
        dpps.forEach(d => {
            h += `<div class="dpp-card" onclick="loadTest('${d.file}')">
                    <div class="dpp-thumb"><div style="background:white; padding:5px; border-radius:8px; font-weight:900; font-size:0.7rem;">DPP</div></div>
                    <div style="flex:1;"><b>${d.name}</b><br><small>NEET Pattern</small></div>
                  </div>`;
        });
        document.getElementById('dpp-items').innerHTML = h;
        showPage('page-dpp');
    }

    async function loadTest(file) {
        const res = await fetch(`/get_test/${file}`);
        currentTest = await res.json();
        document.getElementById('ins-qcount').innerText = currentTest.length;
        document.getElementById('ins-time').innerText = currentTest.length;
        showPage('page-instructions');
    }

    function startActualTest() { qIdx = 0; renderQ(); showPage('page-test'); }

    function renderQ() {
        const q = currentTest[qIdx];
        document.getElementById('ques-area').innerText = q.question;
        let h = '';
        q.options.forEach((opt, i) => {
            h += `<div class="option-box" onclick="checkAns(this, ${i}, ${q.correct})">
                    <span style="margin-right:15px; font-weight:bold;">${i+1}</span>
                    <span>${opt}</span><i class="far fa-circle" style="margin-left:auto;"></i>
                  </div>`;
        });
        document.getElementById('opts-area').innerHTML = h;
        renderNav();
    }

    function checkAns(el, chosen, correct) {
        const main = ['physics','chemistry','botany','zoology'];
        if (main.includes(curSub.toLowerCase())) {
            const boxes = document.querySelectorAll('.option-box');
            if (chosen === correct) el.classList.add('correct');
            else { el.classList.add('wrong'); boxes[correct].classList.add('correct'); }
            boxes.forEach(b => b.style.pointerEvents = 'none');
        } else { el.style.borderColor = "#c7d2fe"; }
    }

    function renderNav() {
        let h = '';
        currentTest.forEach((_, i) => h += `<div class="nav-dot ${i===qIdx?'active':''}" onclick="qIdx=${i};renderQ();">${i+1}</div>`);
        document.getElementById('test-nav').innerHTML = h;
    }

    function nextQ() { if(qIdx < currentTest.length-1) { qIdx++; renderQ(); } }
    function prevQ() { if(qIdx > 0) { qIdx--; renderQ(); } }

    function showPage(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if (pageStack[pageStack.length - 1] !== id) pageStack.push(id);
    }

    function goBack() {
        if (pageStack.length > 1) {
            pageStack.pop();
            showPage(pageStack[pageStack.length - 1]);
            pageStack.pop();
        }
    }
</script>
</body>
</html>
