<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>NEET Test Portal - PDF Upload</title>
    <style>
        :root { --pw-blue: #5a4bda; --green: #28a745; --red: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        
        /* Layout */
        .header { background: #fff; padding: 15px 30px; border-bottom: 2px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .test-area { flex: 3; padding: 30px; background: #fff; margin: 15px; border-radius: 12px; overflow-y: auto; }
        .sidebar { flex: 1; background: #fff; padding: 20px; border-left: 1px solid #ddd; display: flex; flex-direction: column; }

        /* UI Elements */
        .upload-bar { background: #5a4bda; color: white; padding: 10px; text-align: center; }
        .q-text { font-size: 1.4rem; margin-bottom: 20px; font-weight: 500; }
        .option { padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin: 10px 0; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #f8f9ff; border-color: var(--pw-blue); }
        .option.selected { background: #eef0ff; border-color: var(--pw-blue); font-weight: bold; }
        
        /* Palette Grid */
        .palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .q-circle { width: 40px; height: 40px; border: 1px solid #ccc; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; }
        .q-circle.active { border: 2px solid var(--pw-blue); }
        .q-circle.saved { background: var(--green); color: white; border: none; }
        .q-circle.visited { background: var(--red); color: white; border: none; }

        .footer { padding: 20px; background: #fff; border-top: 1px solid #ddd; display: flex; justify-content: space-between; }
        button { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-next { background: var(--pw-blue); color: white; }
    </style>
</head>
<body>

<div class="upload-bar" id="upload-ui">
    Uplaod NEET PDF: <input type="file" id="pdfInput" accept=".pdf">
    <button onclick="startProcessing()" style="background: white; color: var(--pw-blue); margin-left:10px;">Create Test</button>
</div>

<div class="header">
    <div style="font-size: 1.2rem; font-weight: bold;">PW Style Test Engine</div>
    <div id="timer" style="font-size: 1.4rem; color: var(--pw-blue);">03:00:00</div>
</div>

<div class="main-container">
    <div class="test-area" id="test-area">
        <h3 id="q-no">Question 1</h3>
        <p class="q-text" id="q-display">Pehle PDF upload karein...</p>
        <div id="options-box"></div>
    </div>

    <div class="sidebar">
        <h4>Question Palette</h4>
        <div class="palette" id="palette-grid"></div>
        <button onclick="submitFinal()" style="margin-top: auto; background: #ff9800; color: white;">Final Submit</button>
    </div>
</div>

<div class="footer">
    <button onclick="clearRes()" style="background: #eee;">Clear Response</button>
    <button class="btn-next" onclick="saveAndNext()">Save & Next</button>
</div>

<script>
    let questions = [];
    let currentIdx = 0;
    let userAnswers = [];
    let status = [];

    async function startProcessing() {
        const file = document.getElementById('pdfInput').files[0];
        if(!file) return alert("File select karein!");

        const formData = new FormData();
        formData.append('file', file);

        document.getElementById('q-display').innerText = "Processing PDF... Please wait.";
        
        const res = await fetch('/upload', { method: 'POST', body: formData });
        questions = await res.json();

        if(questions.length > 0) {
            userAnswers = new Array(questions.length).fill(null);
            status = new Array(questions.length).fill('unvisited');
            document.getElementById('upload-ui').style.display = 'none';
            loadQ(0);
        } else {
            alert("No questions found in PDF!");
        }
    }

    function loadQ(idx) {
        currentIdx = idx;
        const qData = questions[idx];
        document.getElementById('q-no').innerText = `Question ${idx + 1}`;
        document.getElementById('q-display').innerText = qData.q;
        
        let html = '';
        qData.options.forEach((opt, i) => {
            let activeClass = userAnswers[idx] === i ? 'selected' : '';
            html += `<div class="option ${activeClass}" onclick="selectOpt(${i})">${opt}</div>`;
        });
        document.getElementById('options-box').innerHTML = html;
        renderPalette();
    }

    function selectOpt(i) {
        userAnswers[currentIdx] = i;
        loadQ(currentIdx);
    }

    function saveAndNext() {
        status[currentIdx] = (userAnswers[currentIdx] !== null) ? 'saved' : 'visited';
        if(currentIdx < questions.length - 1) loadQ(currentIdx + 1);
        else renderPalette();
    }

    function renderPalette() {
        let html = '';
        for(let i=0; i<questions.length; i++) {
            let cls = `q-circle ${status[i]}`;
            if(i === currentIdx) cls += ' active';
            html += `<div class="${cls}" onclick="loadQ(${i})">${i+1}</div>`;
        }
        document.getElementById('palette-grid').innerHTML = html;
    }

    function clearRes() {
        userAnswers[currentIdx] = null;
        status[currentIdx] = 'unvisited';
        loadQ(currentIdx);
    }

    // Timer (3 Hours)
    let time = 10800;
    setInterval(() => {
        let h = Math.floor(time/3600);
        let m = Math.floor((time%3600)/60);
        let s = time%60;
        document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        time--;
    }, 1000);

    function submitFinal() {
        alert("Test successfully submitted!");
    }
</script>
</body>
</html>
