<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pw-blue: #1b10b1; --bg: #f8faff; --text: #2d3436; --card: #ffffff; --border: rgba(27, 16, 177, 0.1); }
        body.dark-mode { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: 0.3s; }
        .page-section { display: none; min-height: 100vh; background-color: var(--bg); }
        .active-page { display: block !important; }
        .container { max-width: 600px; margin: auto; padding: 20px; }

        /* Username Modal */
        .modal { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); }
        .modal-box { background:var(--card); width:85%; max-width:350px; margin:100px auto; padding:25px; border-radius:20px; text-align:center; border:1px solid var(--pw-blue); }
        
        /* Leaderboard Design */
        .lb-row { display:flex; align-items:center; justify-content:space-between; padding:15px; background:var(--card); margin-bottom:10px; border-radius:15px; border:1px solid var(--border); }
        .rank-1 { border:2px solid #fbbf24; background: linear-gradient(to right, var(--card), #fffbeb); }

        /* Special Rectangles */
        .special-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .special-rect { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div onclick="toggleDarkMode()"><i class="fas fa-moon"></i></div>
            <div id="login-area">
                <div id="g_id_onload" data-client_id="614180387554-801p5epi2emvn7mt5tkn3pf3sth0imga.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
                <img id="user-img" src="" style="display:none; width:38px; height:38px; border-radius:50%; border:2px solid var(--pw-blue);">
            </div>
        </div>

        <h1 style="color:var(--pw-blue); margin:0;">Target720</h1>
        <div id="live-clock" style="font-size:0.8rem; color:#64748b; margin-bottom:25px;"></div>

        <div id="lb-btn-box" style="display:none;">
            <div onclick="showLB()" style="background:linear-gradient(135deg, #fbbf24, #f59e0b); color:white; padding:15px; border-radius:15px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-weight:bold;">
                <span><i class="fas fa-apple-alt"></i> Rank List (Apple Based)</span>
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>

        <div class="main-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;" id="main-subjects"></div>

        <div id="custom-subjects-area" style="display:none; margin-top:30px;">
            <small style="font-weight:bold; color:#64748b;">SPECIAL TESTS</small>
            <div class="special-grid" id="custom-list"></div>
        </div>
    </div>
</div>

<div id="un-modal" class="modal">
    <div class="modal-box">
        <h3>Choose Username</h3>
        <p style="font-size:0.8rem; color:#666;">This will be used for ranking.</p>
        <input type="text" id="un-input" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; box-sizing:border-box;">
        <div style="color:red; font-size:0.7rem; margin-top:10px; font-weight:bold;">Warning: Only 1 time change allowed!</div>
        <button onclick="saveUN()" style="width:100%; padding:12px; background:var(--pw-blue); color:white; border:none; border-radius:10px; margin-top:15px; font-weight:bold;">CONFIRM</button>
    </div>
</div>

<div id="page-lb" class="page-section">
    <div class="container">
        <div onclick="goBack()" style="cursor:pointer; margin-bottom:20px;"><i class="fas fa-arrow-left"></i> Back</div>
        <h2 style="text-align:center;"><i class="fas fa-apple-alt" style="color:#ef4444;"></i> Global Apple Ranking</h2>
        <div id="lb-list"></div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    let config = {}, questions = [], curSub = "", pageStack=['page-home'];

    window.onload = async () => {
        const res = await fetch('/get_config?v='+Date.now()); config = await res.json();
        renderHome();
        updateClock(); setInterval(updateClock, 60000);
        // Login check
        if(localStorage.getItem('un')) document.getElementById('lb-btn-box').style.display = 'block';
    };

    function updateClock() {
        const now = new Date();
        const options = { weekday:'short', day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' };
        document.getElementById('live-clock').innerText = now.toLocaleString('en-IN', options).toUpperCase();
    }

    function handleCredentialResponse(response) {
        const user = JSON.parse(atob(response.credential.split('.')[1]));
        localStorage.setItem('gid', user.sub);
        localStorage.setItem('gpic', user.picture);
        document.querySelector('.g_id_signin').style.display = 'none';
        document.getElementById('user-img').src = user.picture;
        document.getElementById('user-img').style.display = 'block';
        
        if(!localStorage.getItem('un')) document.getElementById('un-modal').style.display = 'block';
        else document.getElementById('lb-btn-box').style.display = 'block';
    }

    function saveUN() {
        const un = document.getElementById('un-input').value.trim();
        if(un.length < 3) return alert("Min 3 chars!");
        localStorage.setItem('un', un);
        document.getElementById('un-modal').style.display = 'none';
        document.getElementById('lb-btn-box').style.display = 'block';
        alert("Username set as: " + un);
    }

    async function showLB() {
        const res = await fetch('/get_leaderboard?v='+Date.now());
        const lb = await res.json();
        let h = '';
        lb.forEach((u, i) => {
            h += `
            <div class="lb-row ${i===0?'rank-1':''}">
                <span><b>${i+1}.</b> ${u.username}</span>
                <span style="font-weight:bold; color:#ef4444;">🍎 ${u.apples} Apples</span>
            </div>`;
        });
        document.getElementById('lb-list').innerHTML = h || "No ranking yet.";
        showPage('page-lb');
    }

    function renderHome() {
        const main = ['physics','chemistry','botany','zoology'];
        let mH = '', sH = '';
        for (let s in config) {
            if (main.includes(s)) {
                let icon = s==='physics'?'atom':s==='chemistry'?'flask':s==='botany'?'leaf':'dna';
                mH += `<div style="background:var(--card); padding:30px 10px; border-radius:20px; text-align:center; border:1px solid var(--border);" onclick="openSubject('${s}')"><i class="fas fa-${icon}" style="font-size:2.5rem; color:var(--pw-blue);"></i><h3>${s.toUpperCase()}</h3></div>`;
            } else {
                sH += `<div class="special-rect" onclick="openSubject('${s}')"><i class="fas fa-star" style="color:#f59e0b;"></i><br><b>${s.toUpperCase()}</b></div>`;
            }
        }
        document.getElementById('main-subjects').innerHTML = mH;
        document.getElementById('custom-list').innerHTML = sH;
        if(sH) document.getElementById('custom-subjects-area').style.display = 'block';
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function showPage(id) { document.querySelectorAll('.page-section').forEach(p=>p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); pageStack.push(id); }
    function goBack() { pageStack.pop(); const id = pageStack[pageStack.length-1]; document.querySelectorAll('.page-section').forEach(p=>p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); }
</script>
</body>
</html>
