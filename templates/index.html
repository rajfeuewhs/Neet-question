<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET Prep Master</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pw-blue: #1b10b1; --pw-light: #f0f2ff; --green: #28a745; --danger: #dc3545; --warning: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7fe; overflow-x: hidden; }
        .page-section { display: none; min-height: 100vh; width: 100%; }
        .active-page { display: block !important; }
        .container { max-width: 800px; margin: auto; padding: 20px; box-sizing: border-box; }
        .nav-header { display: flex; align-items: center; padding: 10px 0; gap: 15px; }
        .back-link { color: var(--pw-blue); cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .item-row { display: flex; justify-content: space-between; padding: 15px; background: white; margin: 8px 0; border-radius: 10px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: bold; align-items: center; }
        .info-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 20px; }
        .test-header { padding: 15px 20px; border-bottom: 2px solid #ddd; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; z-index: 100; }
        .layout { display: flex; flex-direction: row; }
        .q-area { flex: 3; padding: 25px; padding-bottom: 120px; }
        .sidebar { flex: 1; padding: 20px; border-left: 1px solid #ddd; background: #fafafa; }
        @media (max-width: 768px) { .layout { flex-direction: column; } .sidebar { border-left: none; } }
        .opt { padding: 18px; border: 1px solid #ddd; margin: 12px 0; border-radius: 12px; cursor: pointer; background: #fff; }
        .opt.active { border: 2.5px solid var(--pw-blue); background: var(--pw-light); font-weight: bold; }
        .dot { width: 40px; height: 40px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; margin: 2px; font-size: 0.8rem; }
        .dot.saved { background: var(--green); color: white; border: none; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #ddd; display: flex; justify-content: space-around; box-sizing: border-box; }
        .btn { padding: 14px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .q-img { max-width: 100%; height: auto; margin: 15px 0; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container" style="text-align: center;">
        <h2 style="color: var(--pw-blue); margin-top: 20px;">NEET PREP MASTER</h2>
        <div class="grid" id="main-grid">
            </div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="container">
        <div class="nav-header"><div class="back-link" onclick="goBack()"><i class="fas fa-arrow-left"></i> Home</div></div>
        <h2 id="sub-title" style="text-transform: uppercase; color: var(--pw-blue);">Subject</h2>
        <div id="chapter-list-content"></div>
    </div>
</div>

<div id="page-dpps" class="page-section">
    <div class="container">
        <div class="nav-header"><div class="back-link" onclick="goBack()"><i class="fas fa-arrow-left"></i> Chapters</div></div>
        <h2 id="chapter-title-display">Chapter Name</h2>
        <div id="dpp-list-content"></div>
    </div>
</div>

<div id="page-instructions" class="page-section">
    <div class="container">
        <div class="info-box">
            <h2 style="color: var(--pw-blue); margin-top: 0;">Test Instructions</h2>
            <hr>
            <div style="margin: 20px 0;">
                <p>• Total Questions: <span id="ins-q-count">0</span></p>
                <p>• Time Limit: <span id="ins-time">0</span> Minutes</p>
                <p>• Correct Answer: +4 Marks | Wrong Answer: -1 Mark</p>
            </div>
            <div style="display: flex; gap: 15px;">
                <button class="btn" onclick="goBack()" style="background:#eee; flex:1;">BACK</button>
                <button class="btn" onclick="actuallyStartTest()" style="background:var(--pw-blue); color:white; flex:2;">START TEST</button>
            </div>
        </div>
    </div>
</div>

<div id="page-test" class="page-section">
    <div class="test-header"><h3 id="t-name" style="margin:0; font-size:0.9rem;">Test</h3><div id="timer" style="font-weight:bold; font-size:1.2rem;">00:00</div></div>
    <div class="layout">
        <div class="q-area">
            <h4 id="q-idx" style="color:#666; margin-top:0;">Question 1</h4>
            <div id="q-container">
                <div id="q-txt" style="font-size:1.2rem; margin-bottom:10px;"></div>
                <div id="q-img-box" style="display:none;"></div>
            </div>
            <div id="opts"></div>
        </div>
        <div class="sidebar"><h4>Palette</h4><div id="palette" style="display:flex; flex-wrap:wrap;"></div></div>
    </div>
    <div class="footer">
        <button class="btn" onclick="submitTest()" style="background:orange; color:white;">SUBMIT</button>
        <button class="btn" onclick="nextQ()" style="background:var(--pw-blue); color:white; flex:0.7;">SAVE & NEXT</button>
    </div>
</div>

<div id="page-res" class="page-section">
    <div class="container" style="text-align: center;">
        <h2>Analysis Report</h2>
        <div style="max-width: 250px; margin: auto;"><canvas id="resultChart"></canvas></div>
        <div id="score-summary" style="font-size: 1.5rem; margin: 20px; font-weight:bold;"></div>
        <div id="review-content" style="text-align: left; margin-top: 20px;"></div>
        <button onclick="location.reload()" class="btn" style="background:var(--pw-blue); color:white; width:100%;">HOME</button>
    </div>
</div>

<script>
    let config = {}, questions = [], cur = 0, answers = [], status = [], curSub = "", timeLeft = 0, tInt, pageStack = ['page-home'];
    let pendingFile = "", pendingName = "";

    window.onload = async () => {
        const res = await fetch('/get_config?t=' + Date.now());
        config = await res.json();
        
        // Dynamic Grid Generation
        let gridHtml = '';
        for (let s in config) {
            let icon = 'atom';
            if(s.includes('chem')) icon = 'flask';
            else if(s.includes('bot')) icon = 'leaf';
            else if(s.includes('zoo')) icon = 'dog';
            else if(s.includes('test') || s.includes('aiit')) icon = 'trophy';

            gridHtml += `
            <div class="card" onclick="openSubject('${s}')">
                <i class="fas fa-${icon}" style="font-size: 2.5rem; color: var(--pw-blue);"></i>
                <h3 style="text-transform: capitalize;">${s.replace('_', ' ')}</h3>
            </div>`;
        }
        document.getElementById('main-grid').innerHTML = gridHtml || "<p>Loading...</p>";
    };

    function showPage(id, push = true) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(push && pageStack[pageStack.length-1] !== id) pageStack.push(id);
        window.scrollTo(0,0);
    }

    function goBack() { if (pageStack.length > 1) { pageStack.pop(); showPage(pageStack[pageStack.length - 1], false); } }

    function openSubject(s) {
        curSub = s; document.getElementById('sub-title').innerText = s.replace('_', ' ').toUpperCase();
        let html = '';
        for (const ch in config[s]) {
            html += `<div class="item-row" onclick="openDPPs('${ch}')"><span>${ch}</span><i class="fas fa-chevron-right"></i></div>`;
        }
        document.getElementById('chapter-list-content').innerHTML = html;
        showPage('page-chapters');
    }

    function openDPPs(ch) {
        document.getElementById('chapter-title-display').innerText = ch;
        const tests = config[curSub][ch];
        let html = '';
        const now = new Date().getTime();

        tests.forEach((t, i) => {
            let unlockTime = t.unlock_at ? new Date(t.unlock_at).getTime() : 0;
            if (unlockTime && unlockTime > now) {
                // Countdown logic
                html += `<div class="item-row" style="opacity:0.6; cursor:not-allowed; background:#f9f9f9;">
                    <span>${t.name} (Locked)</span>
                    <span id="lock-${i}" style="color:red; font-size:0.7rem;">Loading...</span>
                </div>`;
                setInterval(() => {
                    let diff = unlockTime - new Date().getTime();
                    if(diff <= 0) { location.reload(); return; }
                    let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                    let el = document.getElementById(`lock-${i}`);
                    if(el) el.innerText = `Unlocks in: ${h}h ${m}m ${s}s`;
                }, 1000);
            } else {
                html += `<div class="item-row" onclick="loadInstructions('${t.file}', '${t.name}')">
                    <span>${t.name}</span><i class="fas fa-play-circle" style="color:green"></i>
                </div>`;
            }
        });
        document.getElementById('dpp-list-content').innerHTML = html || "<p>No tests</p>";
        showPage('page-dpps');
    }

    async function loadInstructions(path, name) {
        try {
            const res = await fetch(`/get_test/${path}?t=${Date.now()}`);
            questions = await res.json();
            document.getElementById('ins-q-count').innerText = questions.length;
            document.getElementById('ins-time').innerText = questions.length;
            pendingFile = path; pendingName = name;
            showPage('page-instructions');
        } catch(e) { alert("Test load nahi ho raha!"); }
    }

    function actuallyStartTest() {
        answers = new Array(questions.length).fill(null);
        status = new Array(questions.length).fill('unseen');
        document.getElementById('t-name').innerText = pendingName;
        timeLeft = questions.length * 60;
        if(tInt) clearInterval(tInt);
        tInt = setInterval(() => {
            timeLeft--;
            let m = Math.floor(Math.abs(timeLeft)/60), s = Math.abs(timeLeft)%60;
            document.getElementById('timer').innerText = `${timeLeft<0?'-':''}${m}:${s<10?'0':''}${s}`;
        }, 1000);
        showPage('page-test');
        render(0);
    }

    function render(i) {
        cur = i; const q = questions[i];
        document.getElementById('q-idx').innerText = `Question ${i+1}`;
        document.getElementById('q-txt').innerText = q.q;
        const imgBox = document.getElementById('q-img-box');
        if (q.img) {
            imgBox.innerHTML = `<img src="${q.img}" class="q-img">`;
            imgBox.style.display = "block";
        } else { imgBox.style.display = "none"; }

        let h = '';
        q.options.forEach((o, idx) => h += `<div class="opt ${answers[i]===idx?'active':''}" onclick="pick(${idx})">${o}</div>`);
        document.getElementById('opts').innerHTML = h;

        let p = '';
        questions.forEach((_, idx) => p += `<div class="dot ${status[idx]==='saved'?'saved':''}" style="${cur===idx?'border:2px solid blue;':''}" onclick="render(${idx})">${idx+1}</div>`);
        document.getElementById('palette').innerHTML = p;
    }

    function pick(idx) { answers[cur] = idx; status[cur] = 'saved'; render(cur); }
    function nextQ() { if(cur < questions.length - 1) render(cur + 1); }

    function submitTest() {
        if(!confirm("Submit?")) return;
        clearInterval(tInt);
        let correct = 0, wrong = 0, skipped = 0, reviewHtml = '';
        questions.forEach((q, i) => {
            let pick = answers[i], actual = q.correct_ans;
            if (pick === null) skipped++;
            else if (pick === actual) correct++;
            else wrong++;
            reviewHtml += `<div style="padding:10px; margin-bottom:10px; background:#fff; border-radius:10px; border-left:5px solid ${pick===actual?'green':'red'}">
                <b>Q${i+1}:</b> ${q.q}<br>${q.img?`<img src="${q.img}" style="max-width:100px;"><br>`:''}
                <span style="color:green">Ans: ${q.options[actual]}</span> | <span style="color:${pick===actual?'green':'red'}">Your: ${pick!==null?q.options[pick]:'Skipped'}</span>
            </div>`;
        });
        document.getElementById('score-summary').innerText = `Score: ${(correct*4)-wrong} / ${questions.length*4}`;
        document.getElementById('review-content').innerHTML = reviewHtml;
        showPage('page-res');
        new Chart(document.getElementById('resultChart'), { type: 'pie', data: { labels: ['Right', 'Wrong', 'Skipped'], datasets: [{ data: [correct, wrong, skipped], backgroundColor: ['#28a745', '#dc3545', '#ffc107'] }] } });
    }
</script>
</body>
</html>
