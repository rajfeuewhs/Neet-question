<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --pw-blue: #1b10b1;
            --pw-gradient: linear-gradient(135deg, #1b10b1 0%, #4a3aff 100%);
            --bg: #f8faff;
            --text: #2d3436;
            --card: #ffffff;
            --border: rgba(27, 16, 177, 0.1);
        }

        body.dark-mode {
            --bg: #0f172a;
            --text: #f8fafc;
            --card: #1e293b;
            --border: #334155;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        .page-section { display: none; min-height: 100vh; background-color: var(--bg); }
        .active-page { display: block !important; }
        .container { max-width: 500px; margin: auto; padding: 15px; }

        /* Banner System */
        .banner-container { display: flex; gap: 12px; overflow-x: auto; padding: 5px 0 20px 0; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .banner-container::-webkit-scrollbar { display: none; }
        .banner-card { 
            min-width: 85%; height: 110px; border-radius: 20px; 
            background: var(--pw-gradient); color: white; padding: 20px; 
            flex-shrink: 0; scroll-snap-align: start; position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(27, 16, 177, 0.2);
        }
        .banner-card i { position: absolute; right: -10px; bottom: -10px; font-size: 5rem; opacity: 0.15; }

        /* Stats Bar (Graph & Apple) */
        .stats-bar { 
            display: flex; align-items: center; justify-content: space-between; 
            background: var(--card); padding: 18px; border-radius: 22px; 
            margin-bottom: 25px; border: 1px solid var(--border); cursor: pointer; position: relative; 
        }
        .graph-icon { font-size: 1.4rem; color: #10b981; }
        .apple-count { color: #ef4444; font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 6px; }

        /* Lock Layer */
        .locked-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.1); backdrop-filter: blur(3px); 
            border-radius: 22px; display: flex; align-items: center; justify-content: center; z-index: 5; 
        }
        .lock-circle { background: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--pw-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Grid Designs */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .subject-card { background: var(--card); padding: 25px 10px; border-radius: 24px; text-align: center; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        
        .special-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .special-rect { background: var(--card); padding: 15px; border-radius: 18px; border: 1px solid var(--border); text-align: center; font-size: 0.9rem; }

        /* Modal */
        .modal { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); }
        .modal-box { background:var(--card); width:85%; max-width:350px; margin:150px auto; padding:25px; border-radius:25px; text-align:center; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div onclick="toggleDarkMode()" style="font-size:1.4rem; color:var(--pw-blue);"><i class="fas fa-moon"></i></div>
            <div id="login-module">
                <div id="g_id_onload" data-client_id="614180387554-801p5epi2emvn7mt5tkn3pf3sth0imga.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
                <img id="user-img" src="" style="display:none; width:38px; height:38px; border-radius:50%; border:2px solid var(--pw-blue);">
            </div>
        </div>

        <div class="banner-container">
            <div class="banner-card"><h3>Practice Daily</h3><p>Crack NEET 2026</p><i class="fas fa-rocket"></i></div>
            <div class="banner-card" style="background:linear-gradient(135deg, #f59e0b, #ea580c);"><h3>New Biology DPP</h3><p>Cell Unit is Live</p><i class="fas fa-leaf"></i></div>
            <div class="banner-card" style="background:linear-gradient(135deg, #10b981, #059669);"><h3>Earn 🍎</h3><p>Be the Rank 1</p><i class="fas fa-apple-alt"></i></div>
        </div>

        <h1 style="color:var(--pw-blue); margin:0; font-size:2rem; font-weight:800;">Target720</h1>
        <div id="live-clock" style="font-size:0.8rem; color:#64748b; font-weight:600; margin-bottom:20px;"></div>

        <div class="stats-bar" onclick="checkLoginLB()">
            <div style="display:flex; align-items:center; gap:12px;">
                <i class="fas fa-chart-bar graph-icon"></i>
                <span style="font-weight:700; font-size:0.95rem;">Analytics</span>
            </div>
            <div class="apple-count">
                <span id="display-apples">0</span> 🍎
            </div>
            <div id="lock-layer" class="locked-layer">
                <div class="lock-circle"><i class="fas fa-lock"></i></div>
            </div>
        </div>

        <div class="main-grid" id="main-subjects"></div>

        <div id="custom-subjects-area" style="display:none; margin-top:25px;">
            <small style="font-weight:800; color:#64748b; letter-spacing:1px;">SPECIAL TESTS</small>
            <div class="special-grid" id="custom-list"></div>
        </div>
    </div>
</div>

<div id="login-popup" class="modal">
    <div class="modal-box">
        <i class="fas fa-shield-alt" style="font-size:3rem; color:var(--pw-blue); margin-bottom:15px;"></i>
        <h3>Login Required</h3>
        <p style="font-size:0.9rem; color:#666;">Login to see global ranking and save your 🍎 apples.</p>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="document.getElementById('login-popup').style.display='none'" class="btn" style="flex:1; background:#eee; border:none; padding:12px; border-radius:10px;">BACK</button>
            <button onclick="window.scrollTo(0,0); document.getElementById('login-popup').style.display='none';" class="btn" style="flex:1; background:var(--pw-blue); color:white; border:none; padding:12px; border-radius:10px;">CONTINUE</button>
        </div>
    </div>
</div>

<div id="un-modal" class="modal">
    <div class="modal-box">
        <h3>Choose Username</h3>
        <input type="text" id="un-input" placeholder="Unique username..." style="width:100%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid #ddd; box-sizing:border-box;">
        <p style="color:red; font-size:0.7rem; font-weight:bold;">⚠️ WARNING: ONLY 1 TIME SET ALLOWED!</p>
        <button onclick="saveUsername()" style="width:100%; padding:12px; background:var(--pw-blue); color:white; border:none; border-radius:10px; font-weight:bold;">CONFIRM</button>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    let config = {}, pageStack = ['page-home'];

    window.onload = async () => {
        const res = await fetch('/get_config?v='+Date.now());
        config = await res.json();
        renderHome();
        updateClock(); setInterval(updateClock, 60000);
        if(localStorage.getItem('un')) document.getElementById('lock-layer').style.display = 'none';
    };

    function updateClock() {
        const now = new Date();
        const options = { weekday:'short', day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' };
        document.getElementById('live-clock').innerText = now.toLocaleString('en-IN', options).toUpperCase();
    }

    function checkLoginLB() {
        if(!localStorage.getItem('un')) document.getElementById('login-popup').style.display = 'block';
        else showLeaderboard(); // Leaderboard function yahan call hoga
    }

    function handleCredentialResponse(response) {
        const user = JSON.parse(atob(response.credential.split('.')[1]));
        localStorage.setItem('gpic', user.picture);
        document.getElementById('user-img').src = user.picture;
        document.getElementById('user-img').style.display = 'block';
        document.querySelector('.g_id_signin').style.display = 'none';
        if(!localStorage.getItem('un')) document.getElementById('un-modal').style.display = 'block';
        else document.getElementById('lock-layer').style.display = 'none';
    }

    function saveUsername() {
        const un = document.getElementById('un-input').value.trim();
        if(un.length < 3) return alert("Min 3 characters!");
        localStorage.setItem('un', un);
        document.getElementById('un-modal').style.display = 'none';
        document.getElementById('lock-layer').style.display = 'none';
    }

    function renderHome() {
        const main = ['physics','chemistry','botany','zoology'];
        let mH = '', sH = '';
        for (let s in config) {
            if (main.includes(s)) {
                let icon = s==='physics'?'atom':s==='chemistry'?'flask':s==='botany'?'leaf':'dna';
                mH += `<div class="subject-card" onclick="openSubject('${s}')"><i class="fas fa-${icon}" style="font-size:2.5rem; color:var(--pw-blue); margin-bottom:10px;"></i><h3>${s.toUpperCase()}</h3></div>`;
            } else {
                sH += `<div class="special-rect" onclick="openSubject('${s}')"><i class="fas fa-star" style="color:#f59e0b;"></i><br><b>${s.toUpperCase()}</b></div>`;
            }
        }
        document.getElementById('main-subjects').innerHTML = mH;
        document.getElementById('custom-list').innerHTML = sH;
        if(sH) document.getElementById('custom-subjects-area').style.display = 'block';
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    // ... Navigation functions (showPage, goBack) ...
</script>
</body>
</html>
