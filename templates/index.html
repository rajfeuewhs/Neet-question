<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET Prep Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pw-blue: #1b10b1; --pw-light: #f0f2ff; --green: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7fe; padding-bottom: 50px; }
        .dashboard { max-width: 900px; margin: 20px auto; padding: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .card i { font-size: 2rem; color: var(--pw-blue); margin-bottom: 10px; }
        
        #chapter-list { margin-top: 30px; display: none; text-align: left; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .ch-header { background: #f1f1f1; padding: 10px; font-weight: bold; border-radius: 5px; margin-top: 10px; color: #333; }
        .test-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .test-item:hover { color: var(--pw-blue); background: var(--pw-light); }

        #test-ui, #result-ui { display: none; min-height: 100vh; flex-direction: column; background: white; }
        .header { padding: 10px 20px; border-bottom: 2px solid #ddd; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; z-index: 100; }
        #timer { font-size: 1.2rem; font-weight: bold; padding: 5px 15px; background: #eee; border-radius: 8px; }
        .layout { display: flex; flex: 1; flex-direction: row; }
        .q-area { flex: 3; padding: 20px; padding-bottom: 100px; }
        .sidebar { flex: 1; padding: 20px; border-left: 1px solid #ddd; background: #fafafa; }
        @media (max-width: 768px) { .layout { flex-direction: column; } .sidebar { border-left: none; } }
        
        .opt { padding: 15px; border: 1px solid #ddd; margin: 10px 0; border-radius: 10px; cursor: pointer; background: #fff; }
        .opt.active { border: 2px solid var(--pw-blue); background: var(--pw-light); font-weight: bold; }
        .palette { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; }
        .dot { width: 40px; height: 40px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; }
        .dot.saved { background: var(--green); color: white; border: none; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #ddd; display: flex; justify-content: space-around; box-sizing: border-box; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="dash" class="dashboard">
    <h2 style="color: var(--pw-blue);">NEET MASTER PORTAL</h2>
    <div class="grid">
        <div class="card" onclick="openSubject('physics')"><i class="fas fa-atom"></i><h3>Physics</h3></div>
        <div class="card" onclick="openSubject('chemistry')"><i class="fas fa-flask"></i><h3>Chemistry</h3></div>
        <div class="card" onclick="openSubject('botany')"><i class="fas fa-leaf"></i><h3>Botany</h3></div>
        <div class="card" onclick="openSubject('zoology')"><i class="fas fa-dog"></i><h3>Zoology</h3></div>
        <div class="card" onclick="openSubject('mock_180')"><i class="fas fa-file-alt"></i><h3>180 Test</h3></div>
        <div class="card" onclick="openSubject('mock_720')"><i class="fas fa-trophy"></i><h3>720 Test</h3></div>
    </div>

    <div id="chapter-list">
        <h3 id="sub-title">Chapters</h3>
        <div id="list-content"></div>
        <button onclick="document.getElementById('chapter-list').style.display='none'" style="margin-top:20px; color:blue; border:none; background:none; cursor:pointer;">← BACK</button>
    </div>
</div>

<div id="test-ui">
    <div class="header"><h3 id="test-title" style="margin:0;">Test</h3><div id="timer">00:00</div></div>
    <div class="layout">
        <div class="q-area">
            <h4 id="q-num" style="color:#666;">Question 1</h4>
            <div id="q-text" style="font-size:1.2rem; margin-bottom:20px;"></div>
            <div id="options-box"></div>
        </div>
        <div class="sidebar"><h4>Palette</h4><div class="palette" id="palette"></div></div>
    </div>
    <div class="footer">
        <button class="btn" onclick="submitTest()" style="background:orange; color:white;">SUBMIT</button>
        <button class="btn" onclick="nextQ()" style="background:var(--pw-blue); color:white; flex:0.7;">SAVE & NEXT</button>
    </div>
</div>

<div id="result-ui" style="padding:20px; text-align:center;">
    <h2>Report Card</h2>
    <div style="max-width:300px; margin:auto;"><canvas id="myChart"></canvas></div>
    <div id="score-val" style="font-size:1.5rem; margin:20px; font-weight:bold;"></div>
    <div id="review-list" style="text-align:left; max-width:700px; margin:auto;"></div>
    <button onclick="location.reload()" class="btn" style="width:100%; background:var(--pw-blue); color:white; margin-top:20px;">HOME</button>
</div>

<script>
    let configData = {};
    let questions = [], current = 0, userAns = [], status = [], timeLeft = 0, tInt;

    window.onload = async () => {
        const res = await fetch('/get_config');
        configData = await res.json();
    };

    function openSubject(sub) {
        document.getElementById('sub-title').innerText = sub.toUpperCase();
        const content = document.getElementById('list-content');
        const chapters = configData[sub];
        let html = '';

        if (!chapters) {
            html = "<p style='color:red;'>Coming soon!</p>";
        } else {
            for (const [ch, tests] of Object.entries(chapters)) {
                html += `<div class="ch-header">${ch}</div>`;
                if (tests.length === 0) {
                    html += `<div style="padding:10px; color:gray; font-style:italic;">No any tests available</div>`;
                } else {
                    tests.forEach(t => {
                        html += `<div class="test-item" onclick="startTest('${t.file}')">
                                    <span>${t.name}</span><i class="fas fa-play"></i>
                                 </div>`;
                    });
                }
            }
        }
        content.innerHTML = html;
        document.getElementById('chapter-list').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    async function startTest(path) {
        const res = await fetch(`/get_test/${path}`);
        questions = await res.json();
        userAns = new Array(questions.length).fill(null);
        status = new Array(questions.length).fill('unseen');
        document.getElementById('dash').style.display = 'none';
        document.getElementById('test-ui').style.display = 'flex';
        timeLeft = questions.length * 60;
        tInt = setInterval(() => {
            timeLeft--;
            let m = Math.floor(Math.abs(timeLeft)/60), s = Math.abs(timeLeft)%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
        }, 1000);
        renderQ(0);
    }

    function renderQ(idx) {
        current = idx;
        const q = questions[idx];
        document.getElementById('q-num').innerText = `Question ${idx+1}`;
        document.getElementById('q-text').innerText = q.q;
        let h = '';
        q.options.forEach((o, i) => {
            let act = (userAns[idx] === i) ? 'active' : '';
            h += `<div class="opt ${act}" onclick="pick(${i})">${o}</div>`;
        });
        document.getElementById('options-box').innerHTML = h;
        renderPalette();
    }

    function pick(i) { userAns[current] = i; status[current] = 'saved'; renderQ(current); }
    function nextQ() { if(current < questions.length - 1) renderQ(current + 1); }

    function renderPalette() {
        let h = '';
        questions.forEach((_, i) => {
            let cls = (status[i] === 'saved') ? 'saved' : '';
            let b = (current === i) ? 'border:3px solid var(--pw-blue);' : '';
            h += `<div class="dot ${cls}" style="${b}" onclick="renderQ(${i})">${i+1}</div>`;
        });
        document.getElementById('palette').innerHTML = h;
    }

    function submitTest() {
        if(!confirm("Submit?")) return;
        clearInterval(tInt);
        let c = 0, w = 0, s = 0, rev = '';
        questions.forEach((q, i) => {
            let u = userAns[i];
            if(u === q.correct_ans) c++;
            else if(u === null) s++;
            else w++;
            rev += `<div style="padding:10px; margin:5px 0; border-radius:5px; background:#f9f9f9; border-left:5px solid ${u===q.correct_ans?'green':'red'};">
                <p><strong>Q${i+1}:</strong> ${q.q}</p>
                <p style="color:green;">Ans: ${q.options[q.correct_ans]}</p>
            </div>`;
        });
        document.getElementById('test-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';
        document.getElementById('score-val').innerText = `Score: ${(c*4)-w}`;
        document.getElementById('review-list').innerHTML = rev;
        new Chart(document.getElementById('myChart'), { type: 'pie', data: { labels: ['Right', 'Wrong', 'Skip'], datasets: [{ data: [c, w, s], backgroundColor: ['#28a745', '#dc3545', '#ffc107'] }] } });
    }
</script>
</body>
</html>
