<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720 | NEET Exam Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --pw-blue: #1b10b1; --bg: #f4f7fe; --text: #2d3436; --card: #ffffff; --border: rgba(27, 16, 177, 0.08);
        }
        body.dark-mode { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        .container { width: 100%; max-width: 1200px; margin: auto; padding: 15px; box-sizing: border-box; }
        .page-section { display: none; min-height: 100vh; }
        .active-page { display: block !important; }

        /* --- INSTRUCTION PAGE --- */
        .blue-alert { background: #1e40af; color: white; padding: 12px; border-radius: 10px; font-size: 0.75rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .ins-box { background: var(--card); padding: 20px; border-radius: 15px; line-height: 1.8; font-size: 0.9rem; }
        .start-test-fixed { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: #c7d2fe; color: #1e1b4b; padding: 18px; border: none; border-radius: 15px; font-weight: 800; font-size: 1.1rem; cursor: pointer; }

        /* --- TEST ENGINE (BLACK THEME) --- */
        #page-test { background: #000 !important; color: white !important; }
        .test-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #334155; background: #000; }
        .nav-dot { min-width: 40px; height: 40px; border-radius: 8px; background: #1e293b; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .nav-dot.active { background: #7f1d1d; color: #fca5a5; border: 2px solid #fca5a5; }
        
        .option-box { background: #1e293b; border: 1px solid #334155; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; color: white; }
        .option-box.correct { background: #064e3b !important; border-color: #10b981; }
        .option-box.wrong { background: #7f1d1d !important; border-color: #ef4444; }

        .footer-nav { position: fixed; bottom: 0; width: 100%; max-width: 1200px; background: #000; padding: 15px; display: flex; gap: 10px; box-sizing: border-box; border-top: 1px solid #334155; }
    </style>
</head>
<body>

<div id="page-instructions" class="page-section">
    <div class="header-sticky" style="background:var(--card);"><i class="fas fa-chevron-left" onclick="goBack()"></i><h3 style="margin:0;">Practice Test</h3></div>
    <div class="container">
        <div class="blue-alert">
            <i class="fas fa-info-circle"></i>
            <span>Don't worry if there's a small error, missing XP points will be added soon!</span>
        </div>
        <div class="ins-box">
            <h4 style="margin:0 0 10px 0;">General Instructions</h4>
            1. Total Questions: <b id="ins-qcount">0</b><br>
            2. Duration: <b id="ins-time">0</b> Minutes<br>
            3. Correct: +4 | Wrong: -1<br>
            4. Max Marks: <b id="ins-marks">0</b>
        </div>
        <button class="start-test-fixed" onclick="startActualTest()">Start Test</button>
    </div>
</div>

<div id="page-test" class="page-section">
    <div class="test-header">
        <div style="font-weight:bold; font-size:1.1rem;"><i class="far fa-clock"></i> <span id="test-timer-val">02:59:45</span></div>
        <button onclick="submitTest()" style="background:#c7d2fe; color:#000; border:none; padding:8px 18px; border-radius:10px; font-weight:900; cursor:pointer;">Submit</button>
    </div>
    
    <div style="display:flex; gap:10px; overflow-x:auto; padding:15px; scrollbar-width:none;" id="test-nav"></div>
    
    <div class="container">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <span style="background:#1e293b; padding:4px 10px; border-radius:8px; font-size:0.75rem;">Marks: +4 -1</span>
            <span style="background:#1e293b; padding:4px 10px; border-radius:8px; font-size:0.75rem;">Type: Single</span>
        </div>
        <div id="ques-area" style="font-size:1.1rem; line-height:1.6; margin-bottom:25px;"></div>
        <div id="opts-area"></div>
    </div>

    <div class="footer-nav">
        <button onclick="prevQ()" style="flex:1; background:#1e293b; color:white; border:none; padding:15px; border-radius:12px; font-weight:bold; cursor:pointer;">Previous</button>
        <button onclick="nextQ()" style="flex:1; background:#c7d2fe; color:#000; border:none; padding:15px; border-radius:12px; font-weight:bold; cursor:pointer;">Save & Next</button>
    </div>
</div>

<script>
    // --- TEST LOGIC ---
    function renderQ() {
        const q = currentTest[qIdx];
        document.getElementById('ques-area').innerText = q.question;
        let h = '';
        q.options.forEach((opt, i) => {
            h += `<div class="option-box" onclick="checkAns(this, ${i}, ${q.correct})">
                    <span style="margin-right:15px; font-weight:bold; color:#64748b;">${i+1}</span>
                    <span>${opt}</span>
                    <i class="far fa-circle" style="margin-left:auto;"></i>
                  </div>`;
        });
        document.getElementById('opts-area').innerHTML = h;
        renderNav();
    }

    function checkAns(el, chosen, correct) {
        const main = ['physics','chemistry','botany','zoology'];
        if (main.includes(curSub.toLowerCase())) {
            const boxes = document.querySelectorAll('.option-box');
            boxes.forEach(b => b.style.pointerEvents = 'none');
            
            if (chosen === correct) {
                el.classList.add('correct');
                el.querySelector('i').className = "fas fa-check-circle";
            } else {
                el.classList.add('wrong');
                el.querySelector('i').className = "fas fa-times-circle";
                boxes[correct].classList.add('correct');
                boxes[correct].querySelector('i').className = "fas fa-check-circle";
            }
        } else {
            document.querySelectorAll('.option-box').forEach(b => b.style.borderColor = "#334155");
            el.style.borderColor = "#c7d2fe";
        }
    }

    function renderNav() {
        let h = '';
        currentTest.forEach((_, i) => h += `<div class="nav-dot ${i===qIdx?'active':''}" onclick="qIdx=${i};renderQ();">${i+1}</div>`);
        document.getElementById('test-nav').innerHTML = h;
    }
</script>
</body>
</html>
