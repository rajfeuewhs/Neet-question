<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720 | Professional NEET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --pw-blue: #1b10b1; --pw-gradient: linear-gradient(135deg, #1b10b1 0%, #4a3aff 100%);
            --bg: #f4f7fe; --text: #2d3436; --card: #ffffff; --border: rgba(27, 16, 177, 0.08);
        }
        body.dark-mode { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        .container { width: 100%; max-width: 1200px; margin: auto; padding: 15px; box-sizing: border-box; }
        .page-section { display: none; min-height: 100vh; }
        .active-page { display: block !important; }

        /* Banner & Countdown */
        .banner-wrapper { width: 100%; overflow: hidden; border-radius: 25px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .banner-container { display: flex; transition: transform 0.5s ease; }
        .banner-card { min-width: 100%; height: 130px; color: white; padding: 25px; display: flex; flex-direction: column; justify-content: center; position: relative; box-sizing: border-box; }
        
        @keyframes pulse-red { 0%, 100% { background: #ef4444; color: white; } 50% { background: white; color: #ef4444; } }
        .countdown-badge { display: inline-block; padding: 6px 15px; border-radius: 50px; font-weight: 900; font-size: 0.8rem; border: 2px solid #ef4444; animation: pulse-red 2s infinite; margin-top: 10px; }

        /* Chapter Card (Updated as per your request) */
        .chapter-card { background: var(--card); margin: 12px 0; padding: 20px; border-radius: 20px; border: 1px solid var(--border); position: relative; cursor: pointer; }
        .ch-tag { background: #2d3436; color: white; font-size: 0.65rem; padding: 3px 10px; border-radius: 6px; font-weight: 900; display: inline-block; margin-bottom: 10px; }
        .ch-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 5px; display: block; padding-right: 35px; }
        .ch-stats { font-size: 0.85rem; color: var(--pw-blue); font-weight: 600; display: flex; align-items: center; gap: 5px; }

        /* Grid Designs */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .subject-card { background: var(--card); padding: 30px 10px; border-radius: 25px; text-align: center; border: 1px solid var(--border); position: relative; cursor: pointer; transition: 0.3s; }
        .subject-card:active { transform: scale(0.95); }
        .star-icon { position: absolute; top: 12px; right: 12px; color: #f59e0b; font-size: 0.9rem; }

        .header-sticky { background: var(--card); padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div onclick="toggleDarkMode()" style="font-size:1.5rem; color:var(--pw-blue); cursor:pointer;"><i class="fas fa-adjust"></i></div>
            <div id="auth-ui">
                <div id="g_id_onload" data-client_id="614180387554-801p5epi2emvn7mt5tkn3pf3sth0imga.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
                <div id="user-profile" style="display:none; align-items:center; gap:10px;">
                    <div style="text-align: right;"><div id="un-name" style="font-weight:800; font-size:0.8rem;">GUEST</div><div style="background:gold; color:#000; font-size:0.6rem; font-weight:900; padding:2px 6px; border-radius:8px;">RANK: #0</div></div>
                    <img id="un-pic" src="" style="width:35px; height:35px; border-radius:50%; border:2px solid var(--pw-blue);">
                </div>
            </div>
        </div>

        <div class="banner-wrapper">
            <div class="banner-container" id="banner-slide">
                <div class="banner-card" style="background: linear-gradient(135deg, #1b10b1, #4a3aff);"><h3>Believe in Yourself</h3><p>Your hard work will pay off.</p></div>
                <div class="banner-card" style="background: linear-gradient(135deg, #f59e0b, #ea580c);"><h3>Focus on Goals</h3><p>Every DPP counts toward NEET.</p></div>
                <div class="banner-card" style="background: linear-gradient(135deg, #10b981, #059669);"><h3>Consistent Effort</h3><p>Success is the sum of small efforts.</p></div>
            </div>
        </div>

        <h1 style="margin:0; font-size:2.2rem; font-weight:900; color:var(--pw-blue);">Target720</h1>
        <div id="live-clock" style="font-weight:bold; color:#64748b; font-size:0.85rem;"></div>
        <div id="neet-timer" class="countdown-badge">NEET 2026: 00d 00h 00m</div>

        <div style="background: var(--card); padding: 18px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); margin: 25px 0; cursor: pointer; position: relative;" onclick="checkLoginLB()">
            <div style="display:flex; align-items:center; gap:12px;"><i class="fas fa-chart-line" style="color:#10b981; font-size:1.4rem;"></i>
                <div><span style="font-weight:800; font-size:0.9rem;">Analytics</span><small id="login-msg" style="color:#be123c; font-size:0.65rem; display:block;">To unlock this rank log in please</small></div>
            </div>
            <div style="color:#ef4444; font-weight:900; font-size:1.2rem;">0 🍎</div>
            <div id="lock-layer" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.1); backdrop-filter:blur(4px); border-radius:22px; display:flex; align-items:center; justify-content:center;"><i class="fas fa-lock" style="background:white; padding:8px; border-radius:50%; color:var(--pw-blue); box-shadow:0 4px 10px rgba(0,0,0,0.1);"></i></div>
        </div>

        <div class="main-grid" id="main-subjects"></div>
        <div id="custom-subjects-area" style="display:none; margin-top:30px;"><span style="font-weight:800; color:#64748b; text-transform:uppercase; font-size:0.8rem;">Specials (Tests)</span><div class="main-grid" id="custom-list" style="margin-top:10px;"></div></div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="header-sticky"><i class="fas fa-chevron-left" onclick="goBack()"></i><h3 id="sub-title" style="margin:0;">Physics</h3></div>
    <div class="container" id="chapter-list"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    let config = {}, bIdx = 0, pageStack = ['page-home'];

    window.onload = async () => {
        const res = await fetch('/get_config?v='+Date.now()); config = await res.json();
        renderHome();
        updateTime(); setInterval(updateTime, 1000);
        setInterval(() => { bIdx = (bIdx + 1) % 3; document.getElementById('banner-slide').style.transform = `translateX(-${bIdx * 100}%)`; }, 3500);
        if(localStorage.getItem('un')) updateUI();
    };

    function updateTime() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleString('en-IN', { weekday:'short', day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }).toUpperCase();
        const target = new Date("May 3, 2026 10:00:00").getTime();
        const diff = target - now.getTime();
        const d = Math.floor(diff / (1000 * 60 * 60 * 24)), h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)), m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        document.getElementById('neet-timer').innerText = `NEET 2026: ${d}d ${h}h ${m}m`;
    }

    function renderHome() {
        const main = ['physics','chemistry','botany','zoology'];
        let mH = '', sH = '', hasS = false;
        for (let s in config) {
            let icon = s==='physics'?'atom':s==='chemistry'?'flask':s==='botany'?'leaf':'dna';
            let isSpecial = !main.includes(s);
            let card = `<div class="subject-card" onclick="handleSubjectClick('${s}', ${isSpecial})"><i class="fas fa-${icon}" style="font-size:2.5rem; color:var(--pw-blue); margin-bottom:12px;"></i><h3 style="margin:0; font-size:0.9rem;">${s.toUpperCase()}</h3>${isSpecial?'<i class="fas fa-star star-icon"></i>':''}</div>`;
            if (!isSpecial) mH += card; else { sH += card; hasS = true; }
        }
        document.getElementById('main-subjects').innerHTML = mH;
        if(hasS) { document.getElementById('custom-subjects-area').style.display = 'block'; document.getElementById('custom-list').innerHTML = sH; }
    }

    function handleSubjectClick(s, isSpecial) {
        if (isSpecial) {
            // Direct Test Logic: Chapter page skip karke seedha questions
            const firstChapter = Object.keys(config[s])[0];
            const firstTest = config[s][firstChapter][0].file;
            alert("Opening Direct Test for: " + s);
            // Yahan aapka startTest(firstTest) wala function call hoga
        } else {
            openChapterPage(s);
        }
    }

    function openChapterPage(s) {
        document.getElementById('sub-title').innerText = s.toUpperCase();
        let h = '', i = 1;
        for (let ch in config[s]) {
            if(ch === "Direct_Tests") continue;
            // Clean Design: No Lectures, No Study Material
            h += `<div class="chapter-card" onclick="openDPPList('${ch}')">
                    <span class="ch-tag">CH - ${i<10?'0'+i:i}</span>
                    <span class="ch-title">${ch}</span>
                    <div class="ch-stats"><i class="fas fa-check-circle"></i> Completed: 0 / Total: ${config[s][ch].length} DPPs</div>
                    <i class="fas fa-chevron-right" style="position:absolute; right:20px; top:50%; transform:translateY(-50%); color:#64748b;"></i>
                </div>`;
            i++;
        }
        document.getElementById('chapter-list').innerHTML = h;
        showPage('page-chapters');
    }

    function handleCredentialResponse(r) {
        const u = JSON.parse(atob(r.credential.split('.')[1]));
        localStorage.setItem('un', u.name); localStorage.setItem('gpic', u.picture);
        updateUI();
    }

    function updateUI() {
        document.querySelector('.g_id_signin').style.display = 'none';
        document.getElementById('user-profile').style.display = 'flex';
        document.getElementById('lock-layer').style.display = 'none';
        document.getElementById('login-msg').style.display = 'none';
        document.getElementById('un-pic').src = localStorage.getItem('gpic');
        document.getElementById('un-name').innerText = localStorage.getItem('un').toUpperCase();
    }

    function showPage(id) { document.querySelectorAll('.page-section').forEach(p=>p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); if(pageStack[pageStack.length-1]!==id) pageStack.push(id); }
    function goBack() { if(pageStack.length>1) { pageStack.pop(); showPage(pageStack[pageStack.length-1]); } }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
</script>
</body>
</html>
