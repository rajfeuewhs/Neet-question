<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET Prep Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pw-blue: #1b10b1; --pw-light: #f0f2ff; --green: #28a745; --danger: #dc3545; --warning: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7fe; }
        .page-section { display: none; min-height: 100vh; }
        .active-page { display: block !important; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .item-row { display: flex; justify-content: space-between; padding: 15px; background: white; margin: 8px 0; border-radius: 10px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: bold; }
        .header { padding: 15px 20px; border-bottom: 2px solid #ddd; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; z-index: 100; }
        .layout { display: flex; flex-direction: row; }
        .q-area { flex: 3; padding: 25px; padding-bottom: 120px; }
        .sidebar { flex: 1; padding: 20px; border-left: 1px solid #ddd; background: #fafafa; }
        @media (max-width: 768px) { .layout { flex-direction: column; } .sidebar { border-left: none; } }
        .opt { padding: 18px; border: 1px solid #ddd; margin: 12px 0; border-radius: 12px; cursor: pointer; background: #fff; }
        .opt.active { border: 2.5px solid var(--pw-blue); background: var(--pw-light); font-weight: bold; }
        .dot { width: 40px; height: 40px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; margin: 2px; }
        .dot.saved { background: var(--green); color: white; border: none; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #ddd; display: flex; justify-content: space-around; box-sizing: border-box; }
        .btn { padding: 14px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .review-card { padding: 15px; margin: 15px 0; border-radius: 12px; border-left: 6px solid #ccc; background: white; }
        .res-correct { border-color: var(--green); } .res-wrong { border-color: var(--danger); } .res-skipped { border-color: var(--warning); }
        .q-img { max-width: 100%; height: auto; margin: 15px 0; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container" style="text-align: center;">
        <h2 style="color: var(--pw-blue); margin-bottom: 30px;">NEET PREP MASTER</h2>
        <div class="grid">
            <div class="card" onclick="openSubject('physics')"><i class="fas fa-atom" style="font-size: 2.5rem; color: var(--pw-blue);"></i><h3>Physics</h3></div>
            <div class="card" onclick="openSubject('chemistry')"><i class="fas fa-flask" style="font-size: 2.5rem; color: var(--pw-blue);"></i><h3>Chemistry</h3></div>
            <div class="card" onclick="openSubject('botany')"><i class="fas fa-leaf" style="font-size: 2.5rem; color: var(--pw-blue);"></i><h3>Botany</h3></div>
            <div class="card" onclick="openSubject('zoology')"><i class="fas fa-dog" style="font-size: 2.5rem; color: var(--pw-blue);"></i><h3>Zoology</h3></div>
        </div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="container">
        <button onclick="showPage('page-home')" style="border:none; background:none; color:var(--pw-blue); cursor:pointer; font-weight:bold;">← Home</button>
        <h2 id="sub-title">Subject</h2>
        <div id="chapter-list-content"></div>
    </div>
</div>

<div id="page-dpps" class="page-section">
    <div class="container">
        <button onclick="showPage('page-chapters')" style="border:none; background:none; color:var(--pw-blue); cursor:pointer; font-weight:bold;">← Chapters</button>
        <h2 id="chapter-title-display">Chapter Name</h2>
        <div id="dpp-list-content"></div>
    </div>
</div>

<div id="page-test" class="page-section">
    <div class="header">
        <h3 id="t-name" style="margin:0;">Test</h3>
        <div id="timer" style="font-weight: bold; font-size: 1.2rem; color: var(--danger);">00:00</div>
    </div>
    <div class="layout">
        <div class="q-area">
            <h4 id="q-idx" style="color: #666;">Question 1</h4>
            <div id="q-container">
                <div id="q-txt" style="font-size:1.2rem; margin-bottom: 10px;"></div>
                <div id="q-img-box"></div> </div>
            <div id="opts"></div>
        </div>
        <div class="sidebar"><h4>Palette</h4><div id="palette" style="display:flex; flex-wrap:wrap;"></div></div>
    </div>
    <div class="footer">
        <button class="btn" onclick="submitTest()" style="background:orange; color:white;">SUBMIT</button>
        <button class="btn" onclick="nextQ()" style="background:var(--pw-blue); color:white; flex:0.7;">SAVE & NEXT</button>
    </div>
</div>

<div id="page-res" class="page-section">
    <div class="container" style="text-align: center;">
        <h2>Report Card</h2>
        <div style="max-width: 300px; margin: auto;"><canvas id="resultChart"></canvas></div>
        <div id="score-summary" style="margin: 20px 0; font-size: 1.5rem; font-weight: bold;"></div>
        <div id="review-content" style="text-align: left;"></div>
        <button onclick="location.reload()" class="btn" style="background:var(--pw-blue); color:white; width: 100%;">HOME</button>
    </div>
</div>

<script>
    let config = {}, questions = [], cur = 0, answers = [], status = [], curSub = "", timeLeft = 0, tInt;

    window.onload = async () => {
        const res = await fetch('/get_config');
        config = await res.json();
    };

    function showPage(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        window.scrollTo(0,0);
    }

    function openSubject(s) {
        curSub = s;
        document.getElementById('sub-title').innerText = s.toUpperCase();
        let html = '';
        for (const chName in config[s]) {
            html += `<div class="item-row" onclick="openDPPs('${chName}')"><span>${chName}</span><i class="fas fa-chevron-right"></i></div>`;
        }
        document.getElementById('chapter-list-content').innerHTML = html;
        showPage('page-chapters');
    }

    function openDPPs(ch) {
        document.getElementById('chapter-title-display').innerText = ch;
        const tests = config[curSub][ch];
        let html = '';
        if (!tests || tests.length === 0) {
            html = "<p style='color:gray; padding:20px;'>No any tests available</p>";
        } else {
            tests.forEach(t => {
                html += `<div class="item-row" onclick="startTest('${t.file}', '${t.name}')"><span>${t.name}</span><i class="fas fa-play-circle" style="color:green"></i></div>`;
            });
        }
        document.getElementById('dpp-list-content').innerHTML = html;
        showPage('page-dpps');
    }

    async function startTest(path, name) {
        const res = await fetch(`/get_test/${path}`);
        questions = await res.json();
        answers = new Array(questions.length).fill(null);
        status = new Array(questions.length).fill('unseen');
        document.getElementById('t-name').innerText = name;
        timeLeft = questions.length * 3 * 60; // 3 min per Q
        if(tInt) clearInterval(tInt);
        tInt = setInterval(() => {
            if (timeLeft <= 0) { submitTest(); return; }
            timeLeft--;
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }, 1000);
        showPage('page-test');
        render(0);
    }

    function render(i) {
        cur = i; const q = questions[i];
        document.getElementById('q-idx').innerText = `Question ${i+1}`;
        document.getElementById('q-txt').innerText = q.q;
        
        // Image logic: Check if "img" exists in JSON
        const imgBox = document.getElementById('q-img-box');
        if(q.img) {
            imgBox.innerHTML = `<img src="${q.img}" class="q-img">`;
        } else {
            imgBox.innerHTML = '';
        }

        let h = '';
        q.options.forEach((o, idx) => {
            let act = (answers[i] === idx) ? 'active' : '';
            h += `<div class="opt ${act}" onclick="pick(${idx})">${o}</div>`;
        });
        document.getElementById('opts').innerHTML = h;
        
        let p = '';
        questions.forEach((_, idx) => {
            let cls = (status[idx] === 'saved') ? 'saved' : '';
            let b = (cur === idx) ? 'border:3px solid blue;' : '';
            p += `<div class="dot ${cls}" style="${b}" onclick="render(${idx})">${idx+1}</div>`;
        });
        document.getElementById('palette').innerHTML = p;
    }

    function pick(idx) { answers[cur] = idx; status[cur] = 'saved'; render(cur); }
    function nextQ() { if(cur < questions.length - 1) render(cur + 1); }

    function submitTest() {
        if(!confirm("Submit?")) return;
        clearInterval(tInt);
        let correct = 0, wrong = 0, skipped = 0, reviewHtml = '';
        questions.forEach((q, i) => {
            let userPick = answers[i], actual = q.correct_ans, cls = 'res-skipped';
            if (userPick === null) skipped++;
            else if (userPick === actual) { correct++; cls = 'res-correct'; }
            else { wrong++; cls = 'res-wrong'; }

            reviewHtml += `<div class="review-card ${cls}"><p><b>Q${i+1}:</b> ${q.q}</p><p style="color:green">Correct: ${q.options[actual]}</p></div>`;
        });
        document.getElementById('score-summary').innerHTML = `Score: ${(correct*4)-wrong} / ${questions.length*4}`;
        document.getElementById('review-content').innerHTML = reviewHtml;
        showPage('page-res');
        new Chart(document.getElementById('resultChart'), { type: 'pie', data: { labels: ['R', 'W', 'S'], datasets: [{ data: [correct, wrong, skipped], backgroundColor: ['#28a745', '#dc3545', '#ffc107'] }] } });
    }
</script>
</body>
</html>
