<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET Ultimate Test Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --pw-blue: #1b10b1; --pw-light: #f0f2ff; --green: #28a745; --danger: #ff0000; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7fe; transition: 0.3s; }
        
        /* Dashboard */
        .dashboard { max-width: 1000px; margin: 40px auto; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .card:hover { transform: translateY(-5px); border-color: var(--pw-blue); color: var(--pw-blue); }
        .card i { font-size: 2.5rem; margin-bottom: 10px; }

        /* Test Container */
        #test-container { display: none; height: 100vh; flex-direction: column; background: white; }
        .header { padding: 15px 30px; border-bottom: 2px solid #ddd; display: flex; justify-content: space-between; align-items: center; background: white; z-index: 10; }
        
        /* Dangerous Timer */
        #timer { font-size: 1.6rem; font-weight: bold; padding: 8px 20px; border-radius: 10px; background: #eee; min-width: 120px; text-align: center; }
        .timer-red { background: var(--danger) !important; color: white !important; animation: flash 0.6s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .bg-red-flash { background: rgba(255, 0, 0, 0.1) !important; }

        .body { display: flex; flex: 1; overflow: hidden; }
        .q-area { flex: 3; padding: 40px; overflow-y: auto; }
        .sidebar { flex: 1; background: #fff; border-left: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        
        .opt { padding: 15px; border: 1px solid #ddd; margin: 12px 0; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
        .opt.active { border: 2.5px solid var(--pw-blue); background: var(--pw-light); font-weight: bold; }
        
        .palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .dot { width: 40px; height: 40px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; }
        .dot.green { background: var(--green); color: white; border: none; }
    </style>
</head>
<body id="main-body">

<div class="dashboard" id="dash">
    <h1 style="color: var(--pw-blue);">NEET PREP PORTAL</h1>
    <div class="grid">
        <div class="card" onclick="startTest('physics')"><i class="fas fa-atom"></i><h3>Physics</h3></div>
        <div class="card" onclick="startTest('chemistry')"><i class="fas fa-flask"></i><h3>Chemistry</h3></div>
        <div class="card" onclick="startTest('botany')"><i class="fas fa-leaf"></i><h3>Botany</h3></div>
        <div class="card" onclick="startTest('zoology')"><i class="fas fa-dog"></i><h3>Zoology</h3></div>
    </div>
    <h2 style="margin-top: 40px;">Mega Mock Tests</h2>
    <div class="grid">
        <div class="card" onclick="startTest('test_180')" style="background:#eef0ff"><h3>180 Qs Test</h3></div>
        <div class="card" onclick="startTest('test_720')" style="background:#eef0ff"><h3>720 Qs (Full)</h3></div>
    </div>
</div>

<div id="test-container">
    <div class="header">
        <h2 id="title" style="margin:0; color:var(--pw-blue);">Test</h2>
        <div id="timer">00:00:00</div>
    </div>
    <div class="body">
        <div class="q-area">
            <h3 id="q-num">Q1</h3>
            <div id="q-txt" style="font-size: 1.3rem; margin-bottom: 30px;"></div>
            <div id="opts-grid"></div>
            <button onclick="next()" style="margin-top:40px; background:var(--pw-blue); color:white; padding:12px 40px; border:none; border-radius:8px; cursor:pointer; font-size:1rem;">Save & Next</button>
        </div>
        <div class="sidebar">
            <h4>Palette</h4>
            <div class="palette" id="plt"></div>
            <button onclick="submitTest()" style="margin-top:auto; background:orange; color:white; padding:15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SUBMIT TEST</button>
        </div>
    </div>
</div>

<script>
    let questions = [];
    let current = 0;
    let userAnswers = [];
    let timeLeft = 0;
    let timerId;

    async function startTest(cat) {
        document.getElementById('dash').style.display = 'none';
        document.getElementById('test-container').style.display = 'flex';
        
        const res = await fetch(`/get_test/${cat}`);
        questions = await res.json();
        userAnswers = new Array(questions.length).fill(null);
        
        // Timer Logic: 3 min per question
        timeLeft = questions.length * 180;
        runTimer();
        
        loadQ(0);
    }

    function runTimer() {
        timerId = setInterval(() => {
            timeLeft--;
            const timerEl = document.getElementById('timer');
            const body = document.getElementById('main-body');
            
            let absTime = Math.abs(timeLeft);
            let h = Math.floor(absTime / 3600).toString().padStart(2,'0');
            let m = Math.floor((absTime % 3600) / 60).toString().padStart(2,'0');
            let s = (absTime % 60).toString().padStart(2,'0');
            
            if(timeLeft < 0) {
                timerEl.innerText = `-${h}:${m}:${s}`;
                timerEl.classList.add('timer-red');
                body.classList.add('bg-red-flash');
            } else {
                timerEl.innerText = `${h}:${m}:${s}`;
            }
        }, 1000);
    }

    function loadQ(i) {
        current = i;
        const q = questions[i];
        document.getElementById('q-num').innerText = `Question ${i+1}`;
        document.getElementById('q-txt').innerText = q.q;
        
        let h = '';
        q.options.forEach((o, idx) => {
            let active = userAnswers[i] === idx ? 'active' : '';
            h += `<div class="opt ${active}" onclick="pick(${idx})">${o}</div>`;
        });
        document.getElementById('opts-grid').innerHTML = h;
        renderPlt();
    }

    function pick(idx) {
        userAnswers[current] = idx;
        loadQ(current);
    }

    function next() {
        if(current < questions.length - 1) loadQ(current + 1);
        else alert("Final Question!");
    }

    function renderPlt() {
        let h = '';
        questions.forEach((_, i) => {
            let cls = userAnswers[i] !== null ? 'green' : '';
            h += `<div class="dot ${cls}" onclick="loadQ(${i})">${i+1}</div>`;
        });
        document.getElementById('plt').innerHTML = h;
    }

    function submitTest() {
        let score = 0;
        questions.forEach((q, i) => {
            if(userAnswers[i] === q.correct_ans) score += 4;
            else if(userAnswers[i] !== null) score -= 1;
        });
        alert(`Test Submitted!\nYour Score: ${score}`);
        location.reload();
    }
</script>
</body>
</html>
