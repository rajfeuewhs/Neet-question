<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --pw-blue: #1b10b1;
            --pw-gradient: linear-gradient(135deg, #1b10b1 0%, #4a3aff 100%);
            --bg: #f8faff;
            --text: #2d3436;
            --card: #ffffff;
            --border: rgba(27, 16, 177, 0.1);
        }

        /* Full App Dark Mode */
        body.dark-mode {
            --bg: #0f172a;
            --text: #f8fafc;
            --card: #1e293b;
            --border: #334155;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: 0.3s; }
        .page-section { display: none; min-height: 100vh; background-color: var(--bg); }
        .active-page { display: block !important; }
        .container { max-width: 800px; margin: auto; padding: 20px; }

        /* Top Header Design */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .mode-toggle { cursor: pointer; font-size: 1.5rem; color: var(--pw-blue); }

        /* Subject Grid (Interactive) */
        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .main-card { 
            background: var(--card); padding: 30px 10px; border-radius: 24px; text-align: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid var(--border);
            transition: 0.3s;
        }
        .main-card:active { transform: scale(0.95); }
        .main-card i { font-size: 2.5rem; color: var(--pw-blue); margin-bottom: 12px; }

        /* Search Bar */
        .search-box { margin-bottom: 25px; position: relative; }
        .search-box input { width: 100%; padding: 15px 15px 15px 45px; border-radius: 15px; border: 1px solid var(--border); background: var(--card); color: var(--text); outline: none; box-sizing: border-box; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #64748b; }

        /* Special Subject Card */
        .special-card {
            background: var(--card); border: 2px solid var(--pw-blue); padding: 20px; border-radius: 20px; 
            margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer;
        }

        .footer { position: fixed; bottom: 0; width: 100%; background: var(--card); padding: 15px; display: flex; gap: 10px; box-sizing: border-box; border-top: 1px solid var(--border); }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <div class="top-nav">
            <div class="mode-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></div>
            
            <div id="login-module">
                <div id="g_id_onload"
                     data-client_id="614180387554-801p5epi2emvn7mt5tkn3pf3sth0imga.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse">
                </div>
                <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
                
                <div id="user-info" style="display: none;">
                    <img id="user-img" src="" style="width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--pw-blue);">
                </div>
            </div>
        </div>

        <div style="margin-bottom: 30px;">
            <h1 style="margin: 0; color: var(--pw-blue); font-size: 2.2rem; font-weight: 800;">Target720</h1>
            <div id="live-clock" style="font-size: 0.85rem; color: #64748b; font-weight: 600; margin-top: 5px;">LOADING CLOCK...</div>
        </div>

        <div class="search-box">
            <input type="text" id="searchBar" placeholder="Search Chapters or DPPs..." onkeyup="filterContent()">
            <i class="fas fa-search"></i>
        </div>
        
        <div class="main-grid" id="main-subjects"></div>
        <div id="custom-subjects-area" style="display:none; margin-top:30px;">
            <div id="custom-list"></div>
        </div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    let config = {}, pageStack = ['page-home'];

    window.onload = async () => {
        const res = await fetch('/get_config?v=' + Date.now());
        config = await res.json();
        renderHome();
    };

    // Live Clock (Minute Update Only)
    function updateClock() {
        const now = new Date();
        const options = { weekday: 'short', day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' };
        document.getElementById('live-clock').innerText = now.toLocaleString('en-IN', options).toUpperCase();
    }
    setInterval(updateClock, 60000); 
    updateClock();

    // Google Login Handler
    function handleCredentialResponse(response) {
        const user = parseJwt(response.credential);
        document.querySelector('.g_id_signin').style.display = 'none';
        document.getElementById('user-info').style.display = 'block';
        document.getElementById('user-img').src = user.picture;
        localStorage.setItem('user_name', user.name);
    }

    function parseJwt(token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        return JSON.parse(window.atob(base64));
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const icon = document.querySelector('.mode-toggle i');
        icon.classList.toggle('fa-moon'); icon.classList.toggle('fa-sun');
    }

    function renderHome() {
        const mainSubs = ['physics', 'chemistry', 'botany', 'zoology'];
        let mH = '', sH = '';
        for (let s in config) {
            if (mainSubs.includes(s)) {
                let icon = s === 'physics' ? 'atom' : s === 'chemistry' ? 'flask' : s === 'botany' ? 'leaf' : 'dna';
                mH += `<div class="main-card" onclick="openSubject('${s}')"><i class="fas fa-${icon}"></i><h3>${s.toUpperCase()}</h3></div>`;
            } else {
                sH += `<div class="special-card" onclick="openSubject('${s}')"><h3>${s.toUpperCase()}</h3><i class="fas fa-star"></i></div>`;
            }
        }
        document.getElementById('main-subjects').innerHTML = mH;
        document.getElementById('custom-list').innerHTML = sH;
        if(sH) document.getElementById('custom-subjects-area').style.display = 'block';
    }

    function filterContent() {
        let input = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.main-card, .special-card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
        });
    }

    // Navigation Logic
    function showPage(id, push = true) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(push && pageStack[pageStack.length-1] !== id) pageStack.push(id);
    }
    function goBack() { if (pageStack.length > 1) { pageStack.pop(); showPage(pageStack[pageStack.length - 1], false); } }
</script>
</body>
</html>
