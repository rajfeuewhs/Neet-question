<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720 | NEET Exam Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --pw-blue: #1b10b1; --bg: #f4f7fe; --text: #2d3436; --card: #ffffff; --border: rgba(27, 16, 177, 0.08); }
        body.dark-mode { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        .container { width: 100%; max-width: 1200px; margin: auto; padding: 15px; box-sizing: border-box; }
        .page-section { display: none; min-height: 100vh; }
        .active-page { display: block !important; }

        /* Test Engine Styles */
        #page-test { background: #000 !important; color: white !important; }
        .option-box { background: #1e293b; border: 1px solid #334155; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; color: white; }
        .option-box.selected { border-color: #60a5fa !important; background: #1e3a8a !important; }
        
        .nav-dot { min-width: 38px; height: 38px; border-radius: 8px; background: #1e293b; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 1px solid #334155; }
        .nav-dot.active { background: #1e40af; border-color: #60a5fa; }
        .nav-dot.answered { border-color: #10b981; }

        .footer-nav { position: fixed; bottom: 0; width: 100%; max-width: 1200px; background: #111; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #334155; box-sizing: border-box; }
        .header-sticky { background: var(--card); padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .banner-card { min-width: 100%; height: 130px; color: white; padding: 25px; border-radius: 25px; display: flex; flex-direction: column; justify-content: center; margin-bottom: 20px; background: var(--pw-blue); }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <div onclick="toggleDarkMode()" style="cursor:pointer;"><i class="fas fa-adjust"></i></div>
            <div style="font-weight:900;">TARGET 720</div>
        </div>
        <div class="banner-card"><h3>Practice Mode</h3><p>Select subject to start testing.</p></div>
        <div id="main-subjects" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="header-sticky"><i class="fas fa-arrow-left" onclick="goBack()"></i><h3 id="sub-title" style="margin:0;">Subject</h3></div>
    <div class="container" id="chapter-list"></div>
</div>

<div id="page-dpp" class="page-section">
    <div class="header-sticky"><i class="fas fa-arrow-left" onclick="goBack()"></i><h3 id="ch-title" style="margin:0;">DPPs</h3></div>
    <div class="container" id="dpp-items"></div>
</div>

<div id="page-test" class="page-section">
    <div class="header-sticky" style="background:#000; border-bottom:1px solid #334155;">
        <h3 id="test-timer" style="margin:0;">00:00</h3>
        <button onclick="submitTest()" style="margin-left:auto; background:#ef4444; color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">Submit</button>
    </div>
    <div id="test-nav" style="display:flex; gap:10px; overflow-x:auto; padding:15px; scrollbar-width:none;"></div>
    <div class="container">
        <div id="ques-text" style="font-size:1.2rem; margin-bottom:25px; line-height:1.5; font-weight:500;"></div>
        <div id="opts-area"></div>
    </div>
    <div class="footer-nav">
        <button onclick="prevQ()" style="flex:1; background:#1e293b; color:white; border:none; padding:15px; border-radius:12px;">Previous</button>
        <button onclick="nextQ()" style="flex:1; background:#c7d2fe; color:#1e1b4b; border:none; padding:15px; border-radius:12px;">Save & Next</button>
    </div>
</div>

<div id="page-result" class="page-section">
    <div class="container" id="result-content" style="padding-top:40px;"></div>
</div>

<script>
    let config = {}, pageStack = ['page-home'], curTest = [], qIdx = 0, userAns = {};

    window.onload = async () => {
        const res = await fetch('/get_config');
        config = await res.json();
        renderHome();
    };

    function renderHome() {
        let h = '';
        ['physics','chemistry','botany','zoology'].forEach(s => {
            if(config[s]) h += `<div style="background:var(--card); padding:20px; border-radius:20px; text-align:center; border:1px solid var(--border);" onclick="openSub('${s}')"><h3>${s.toUpperCase()}</h3></div>`;
        });
        document.getElementById('main-subjects').innerHTML = h;
    }

    function openSub(s) {
        let h = ''; for(let ch in config[s]) h += `<div style="background:var(--card); padding:15px; margin-bottom:10px; border-radius:15px;" onclick="openDPP('${s}','${ch}')">${ch}</div>`;
        document.getElementById('chapter-list').innerHTML = h; showPage('page-chapters');
    }

    function openDPP(s, ch) {
        let h = ''; config[s][ch].forEach(t => h += `<div style="background:var(--card); padding:15px; margin-bottom:10px; border-radius:15px;" onclick="loadTest('${t.file}')">${t.name}</div>`);
        document.getElementById('dpp-items').innerHTML = h; showPage('page-dpp');
    }

    async function loadTest(file) {
        const res = await fetch(`/get_test/${file}`);
        curTest = await res.json();
        qIdx = 0; userAns = {};
        renderQ(); renderNav(); showPage('page-test');
    }

    function renderQ() {
        const q = curTest[qIdx];
        document.getElementById('ques-text').innerHTML = `<b>Q${qIdx+1}.</b> ${q.question}`;
        let h = '';
        q.options.forEach((opt, i) => {
            const isSelected = userAns[qIdx] === i;
            h += `<div class="option-box ${isSelected ? 'selected' : ''}" onclick="selectAns(${i})">
                    <span>${String.fromCharCode(65+i)}. ${opt}</span>
                    <i class="${isSelected ? 'fas fa-check-circle' : 'far fa-circle'}"></i>
                  </div>`;
        });
        document.getElementById('opts-area').innerHTML = h;
    }

    function selectAns(i) { userAns[qIdx] = i; renderQ(); renderNav(); }

    function renderNav() {
        let h = ''; curTest.forEach((_, i) => {
            let cls = (i === qIdx) ? 'active' : (userAns[i] !== undefined ? 'answered' : '');
            h += `<div class="nav-dot ${cls}" onclick="qIdx=${i};renderQ();renderNav()">${i+1}</div>`;
        });
        document.getElementById('test-nav').innerHTML = h;
    }

    function nextQ() { if(qIdx < curTest.length-1) { qIdx++; renderQ(); renderNav(); } }
    function prevQ() { if(qIdx > 0) { qIdx--; renderQ(); renderNav(); } }

    function submitTest() {
        if(!confirm("Submit Test?")) return;
        let score = 0, c = 0, w = 0, u = 0;
        curTest.forEach((q, i) => {
            if(userAns[i] === undefined) u++;
            else if(parseInt(userAns[i]) === parseInt(q.correct)) { score += 4; c++; }
            else { score -= 1; w++; }
        });
        showFinalResult(score, c, w, u);
    }

    function showFinalResult(score, c, w, u) {
        const total = curTest.length;
        document.getElementById('result-content').innerHTML = `
            <div style="background:white; color:#000; padding:30px; border-radius:30px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
                <h2 style="color:var(--pw-blue);">Result Card</h2>
                <h1 style="font-size:3rem; margin:10px 0;">${score}/${total*4}</h1>
                <div style="width:200px; margin:20px auto;"><canvas id="resChart"></canvas></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                    <div style="background:#f0fdf4; padding:10px; border-radius:12px;">Correct: ${c}</div>
                    <div style="background:#fef2f2; padding:10px; border-radius:12px;">Wrong: ${w}</div>
                </div>
                <button onclick="location.reload()" style="background:var(--pw-blue); color:white; padding:15px; width:100%; border:none; border-radius:15px; font-weight:bold;">Dashboard</button>
            </div>`;
        showPage('page-result');
        new Chart(document.getElementById('resChart'), {
            type: 'doughnut',
            data: { labels:['C','W','S'], datasets:[{data:[c,w,u], backgroundColor:['#10b981','#ef4444','#cbd5e1']}] },
            options: { cutout:'70%', plugins:{legend:{display:false}} }
        });
    }

    function showPage(id) { document.querySelectorAll('.page-section').forEach(p=>p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); if(pageStack[pageStack.length-1]!==id) pageStack.push(id); }
    function goBack() { if(pageStack.length > 1) { pageStack.pop(); showPage(pageStack[pageStack.length-1]); pageStack.pop(); } }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
</script>
</body>
</html>
