<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET Prep Master</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pw-blue: #1b10b1; --pw-gradient: linear-gradient(135deg, #1b10b1 0%, #4a3aff 100%); --pw-light: #f0f2ff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8faff; }
        .page-section { display: none; min-height: 100vh; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .active-page { display: block !important; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        /* Layout Styles */
        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .main-card { background: white; padding: 25px 10px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }
        .main-card i { font-size: 2.5rem; color: var(--pw-blue); margin-bottom: 10px; }
        .main-card:hover { transform: translateY(-5px); }
        
        .rect-card { background: var(--pw-gradient); color: white; padding: 20px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .item-row { display: flex; justify-content: space-between; padding: 18px; background: white; margin: 10px 0; border-radius: 15px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: bold; align-items: center; }
        .nav-header { display: flex; align-items: center; padding: 15px 0; gap: 15px; }
        .back-link { background: white; padding: 8px 15px; border-radius: 50px; color: var(--pw-blue); cursor: pointer; font-weight: bold; }
        .opt { padding: 16px; border: 2px solid #edf2f7; margin: 10px 0; border-radius: 12px; cursor: pointer; background: #fff; font-weight: 500; }
        .opt.active { border-color: var(--pw-blue); background: var(--pw-light); color: var(--pw-blue); }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; box-sizing: border-box; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <h1 style="text-align: center; color: var(--pw-blue); margin: 30px 0;">NEET PREP MASTER</h1>
        <div class="main-grid" id="main-subjects"></div>
        <div id="custom-subjects-area" style="display:none; margin-top:30px;">
            <span style="font-weight:bold; color:#666; text-transform:uppercase; font-size:0.8rem;">Special Exams</span>
            <div id="custom-list" style="margin-top:10px;"></div>
        </div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="container">
        <div class="nav-header"><div class="back-link" onclick="goBack()"><i class="fas fa-arrow-left"></i></div><h3 id="sub-title" style="margin:0"></h3></div>
        <div id="chapter-list-content"></div>
    </div>
</div>

<div id="page-dpps" class="page-section">
    <div class="container">
        <div class="nav-header"><div class="back-link" onclick="goBack()"><i class="fas fa-arrow-left"></i></div><h3 id="chapter-title-display" style="margin:0"></h3></div>
        <div id="dpp-list-content"></div>
    </div>
</div>

<div id="page-instructions" class="page-section">
    <div class="container" style="padding-top:50px;">
        <div style="background:white; padding:30px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.05);">
            <h2 style="color:var(--pw-blue); margin-top:0;">Ready?</h2>
            <p>Total Questions: <span id="ins-q-count">0</span></p>
            <button class="btn" onclick="actuallyStartTest()" style="background:var(--pw-gradient); color:white; width:100%;">START NOW</button>
        </div>
    </div>
</div>

<div id="page-test" class="page-section">
    <div style="background:var(--pw-gradient); color:white; padding:20px; display:flex; justify-content:space-between;">
        <span id="t-name">Test</span><span id="timer">00:00</span>
    </div>
    <div class="container">
        <h4 id="q-idx" style="color:var(--pw-blue);">Question 1</h4>
        <div id="q-txt" style="font-size:1.2rem; margin:15px 0;"></div>
        <div id="q-img-box"></div>
        <div id="opts"></div>
    </div>
    <div class="footer">
        <button class="btn" onclick="submitTest()" style="background:#eee;">SUBMIT</button>
        <button class="btn" onclick="nextQ()" style="background:var(--pw-gradient); color:white;">NEXT</button>
    </div>
</div>

<div id="page-res" class="page-section">
    <div class="container" style="text-align: center; padding-top: 50px;">
        <h2>Completed!</h2>
        <h1 id="score-summary">Score: 0</h1>
        <button onclick="location.reload()" class="btn" style="background:var(--pw-gradient); color:white; width:100%;">HOME</button>
    </div>
</div>

<script>
    let config = {}, questions = [], cur = 0, answers = [], status = [], curSub = "", timeLeft = 0, tInt, pageStack = ['page-home'];
    
    window.onload = async () => {
        const res = await fetch('/get_config?v=' + Date.now());
        config = await res.json();
        const mainSubs = ['physics', 'chemistry', 'botany', 'zoology'];
        let mHtml = '', cHtml = '', hasC = false;

        for (let s in config) {
            if (mainSubs.includes(s)) {
                let icon = s=='physics'?'atom':s=='chemistry'?'flask':s=='botany'?'leaf':'dna';
                mHtml += `<div class="main-card" onclick="openSubject('${s}')"><i class="fas fa-${icon}"></i><h3>${s}</h3></div>`;
            } else {
                hasC = true;
                cHtml += `<div class="rect-card" onclick="openSubject('${s}')"><h3>${s.toUpperCase()}</h3><i class="fas fa-arrow-right"></i></div>`;
            }
        }
        document.getElementById('main-subjects').innerHTML = mHtml;
        if(hasC) { document.getElementById('custom-subjects-area').style.display = 'block'; document.getElementById('custom-list').innerHTML = cHtml; }
    };

    function showPage(id, push = true) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(push && pageStack[pageStack.length-1] !== id) pageStack.push(id);
    }
    function goBack() { if (pageStack.length > 1) { pageStack.pop(); showPage(pageStack[pageStack.length - 1], false); } }

    function openSubject(s) {
        curSub = s;
        const chapters = Object.keys(config[s]);
        // Direct Test Logic: Skip chapter page if only Direct_Tests exists
        if (chapters.length === 1 && chapters[0] === "Direct_Tests") { openDPPs("Direct_Tests"); return; }
        
        document.getElementById('sub-title').innerText = s.toUpperCase();
        let html = '';
        for (const ch in config[s]) {
            let title = (ch === "Direct_Tests") ? "Mixed Tests / AIITS" : ch;
            html += `<div class="item-row" onclick="openDPPs('${ch}')"><span>${title}</span><i class="fas fa-chevron-right"></i></div>`;
        }
        document.getElementById('chapter-list-content').innerHTML = html;
        showPage('page-chapters');
    }

    function openDPPs(ch) {
        document.getElementById('chapter-title-display').innerText = (ch === "Direct_Tests") ? "Tests" : ch;
        const tests = config[curSub][ch];
        let html = '';
        tests.forEach((t, i) => {
            html += `<div class="item-row" onclick="loadInstructions('${t.file}', '${t.name}')"><span>${t.name}</span><i class="fas fa-play-circle" style="color:var(--pw-blue)"></i></div>`;
        });
        document.getElementById('dpp-list-content').innerHTML = html;
        showPage('page-dpps');
    }

    async function loadInstructions(path, name) {
        const res = await fetch(`/get_test/${path}?v=${Date.now()}`);
        questions = await res.json();
        document.getElementById('ins-q-count').innerText = questions.length;
        showPage('page-instructions');
    }

    function actuallyStartTest() {
        answers = new Array(questions.length).fill(null);
        timeLeft = questions.length * 60;
        tInt = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(timeLeft <= 0) submitTest();
        }, 1000);
        showPage('page-test');
        render(0);
    }

    function render(i) {
        cur = i; const q = questions[i];
        document.getElementById('q-idx').innerText = `Question ${i+1}`;
        document.getElementById('q-txt').innerText = q.q;
        const imgBox = document.getElementById('q-img-box');
        imgBox.innerHTML = q.img ? `<img src="${q.img}" style="max-width:100%; border-radius:15px; margin:15px 0;">` : "";
        let h = '';
        q.options.forEach((o, idx) => h += `<div class="opt ${answers[i]===idx?'active':''}" onclick="pick(${idx})">${o}</div>`);
        document.getElementById('opts').innerHTML = h;
    }

    function pick(idx) { answers[cur] = idx; render(cur); }
    function nextQ() { if(cur < questions.length - 1) render(cur + 1); }
    function submitTest() {
        clearInterval(tInt);
        let correct = 0, wrong = 0;
        questions.forEach((q, i) => { if (answers[i] === q.correct_ans) correct++; else if(answers[i]!==null) wrong++; });
        document.getElementById('score-summary').innerText = `Score: ${(correct*4)-wrong}`;
        showPage('page-res');
    }
</script>
</body>
</html>
