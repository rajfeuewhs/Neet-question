<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET DPP Analyzer - PW Style</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --pw-blue: #5a4bda; --ans: #28a745; --skip: #dc3545; --bg: #f4f7fe; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Header & Upload Bar */
        header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .upload-bar { background: var(--pw-blue); color: white; padding: 12px; text-align: center; font-weight: bold; }
        #timer { font-size: 1.4rem; font-weight: bold; color: var(--pw-blue); background: #eef0ff; padding: 5px 15px; border-radius: 8px; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* Question Section */
        .question-box { flex: 3; padding: 40px; background: white; margin: 15px; border-radius: 15px; overflow-y: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .q-header { color: #666; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .q-text { font-size: 1.3rem; line-height: 1.6; margin-bottom: 30px; color: #333; }
        
        /* Options */
        .options-grid { display: flex; flex-direction: column; gap: 15px; }
        .option-card { padding: 15px 25px; border: 1px solid #dee2e6; border-radius: 10px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 15px; font-size: 1.1rem; }
        .option-card:hover { background: #f8f9ff; border-color: var(--pw-blue); }
        .option-card.selected { background: #eef0ff; border: 2px solid var(--pw-blue); font-weight: bold; }

        /* Sidebar Palette */
        .sidebar { flex: 1; background: white; padding: 20px; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; overflow-y: auto; max-height: 300px; padding: 5px; }
        .q-num { width: 40px; height: 40px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 6px; font-size: 0.9rem; background: white; }
        .q-num.active { border: 2px solid var(--pw-blue); transform: scale(1.1); }
        .q-num.green { background: var(--ans) !important; color: white; border: none; }
        .q-num.red { background: var(--skip) !important; color: white; border: none; }

        /* Footer Controls */
        .controls { background: white; padding: 20px 40px; border-top: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-next { background: var(--pw-blue); color: white; }
        .btn-next:hover { background: #4536b3; }
        .btn-clear { background: #f1f1f1; color: #555; }
    </style>
</head>
<body>

<div class="upload-bar" id="upload-panel">
    Step 1: Upload DPP PDF &nbsp; 
    <input type="file" id="pdfInput" accept=".pdf" style="background: white; color: black; border-radius: 4px; padding: 2px;">
    <button onclick="processPDF()" style="background: #28a745; color: white; margin-left:10px; padding: 5px 15px;">Start Test</button>
</div>

<header>
    <div style="font-size: 1.3rem; font-weight: bold; color: #333;">Yakeen NEET Test Engine</div>
    <div id="timer">03:00:00</div>
</header>

<div class="main-layout">
    <div class="question-box" id="content">
        <div id="welcome-msg" style="text-align: center; margin-top: 50px;">
            <h2>Swagat Hai!</h2>
            <p>Upar di gayi bar se NEET DPP PDF upload karein.</p>
        </div>
        
        <div id="test-ui" style="display: none;">
            <div class="q-header" id="q-label">Question 1</div>
            <div class="q-text" id="q-display"></div>
            <div class="options-grid" id="options-display"></div>
        </div>
    </div>

    <div class="sidebar">
        <h4 style="margin: 0;">Question Palette</h4>
        <div class="palette-grid" id="palette"></div>
        
        <div style="margin-top: auto; padding: 10px; background: #fff9e6; border-radius: 8px; font-size: 0.8rem; border: 1px solid #ffeeba;">
            <b>Instructions:</b><br>
            Green: Answered & Saved<br>
            Red: Skipped/Visited
        </div>
        <button onclick="calculateScore()" style="width: 100%; margin-top: 15px; background: #ff9800; color: white;">Final Submit</button>
    </div>
</div>

<div class="controls">
    <button class="btn-clear" onclick="clearAnswer()">Clear Response</button>
    <button class="btn-next" onclick="saveAndNext()">Save & Next</button>
</div>

<script>
    let questions = [];
    let currentIdx = 0;
    let answers = [];
    let status = [];

    async function processPDF() {
        const file = document.getElementById('pdfInput').files[0];
        if(!file) return alert("Pehle PDF file chunein!");

        document.getElementById('welcome-msg').innerHTML = "<h3>Processing PDF... Please Wait</h3><p>Extracting questions and answer key.</p>";
        
        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch('/upload', { method: 'POST', body: formData });
            questions = await response.json();

            if(questions.length > 0) {
                answers = new Array(questions.length).fill(null);
                status = new Array(questions.length).fill('unvisited');
                document.getElementById('upload-panel').style.display = 'none';
                document.getElementById('welcome-msg').style.display = 'none';
                document.getElementById('test-ui').style.display = 'block';
                loadQuestion(0);
                startTimer();
            } else {
                alert("PDF se questions nahi mil paye. Format check karein.");
                location.reload();
            }
        } catch (e) {
            alert("Server Error! Check if Flask is running.");
        }
    }

    function loadQuestion(idx) {
        currentIdx = idx;
        const q = questions[idx];
        document.getElementById('q-label').innerText = `Question ${idx + 1}`;
        document.getElementById('q-display').innerText = q.q;
        
        let html = '';
        const labels = ['(A)', '(B)', '(C)', '(D)'];
        q.options.forEach((opt, i) => {
            let active = (answers[idx] === i) ? 'selected' : '';
            html += `<div class="option-card ${active}" onclick="selectOption(${i})">
                        <span style="font-weight:bold; color:var(--pw-blue)">${labels[i]}</span> ${opt}
                     </div>`;
        });
        document.getElementById('options-display').innerHTML = html;
        
        // Render Math formulas if any
        if (window.MathJax) MathJax.typeset();
        
        renderPalette();
    }

    function selectOption(i) {
        answers[currentIdx] = i;
        loadQuestion(currentIdx);
    }

    function saveAndNext() {
        status[currentIdx] = (answers[currentIdx] !== null) ? 'green' : 'red';
        if(currentIdx < questions.length - 1) {
            loadQuestion(currentIdx + 1);
        } else {
            renderPalette();
            alert("Aap aakhri sawal par hain.");
        }
    }

    function clearAnswer() {
        answers[currentIdx] = null;
        status[currentIdx] = 'unvisited';
        loadQuestion(currentIdx);
    }

    function renderPalette() {
        let html = '';
        for(let i=0; i<questions.length; i++) {
            let cls = `q-num ${status[i]}`;
            if(i === currentIdx) cls += ' active';
            html += `<div class="${cls}" onclick="loadQuestion(${i})">${i+1}</div>`;
        }
        document.getElementById('palette').innerHTML = html;
    }

    function startTimer() {
        let time = 180 * 60; // 3 hours
        const timerEl = document.getElementById('timer');
        setInterval(() => {
            let h = Math.floor(time / 3600);
            let m = Math.floor((time % 3600) / 60);
            let s = time % 60;
            timerEl.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            time--;
        }, 1000);
    }

    function calculateScore() {
        let score = 0, correct = 0, wrong = 0;
        questions.forEach((q, i) => {
            if(answers[i] !== null) {
                if(answers[i] === q.correct_ans) { score += 4; correct++; }
                else { score -= 1; wrong++; }
            }
        });
        alert(`RESULT:\nTotal: ${questions.length}\nCorrect: ${correct}\nWrong: ${wrong}\nMarks: ${score}`);
    }
</script>

</body>
</html>
