<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target720</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --pw-blue: #1b10b1;
            --pw-gradient: linear-gradient(135deg, #1b10b1 0%, #4a3aff 100%);
            --bg: #f8faff;
            --text: #2d3436;
            --card: #ffffff;
            --border: rgba(27, 16, 177, 0.1);
            --special-grad: linear-gradient(90deg, #ff8a00, #e52e71); /* Extra subject ke liye */
        }

        /* Full App Dark Mode */
        body.dark-mode {
            --bg: #0f172a;
            --text: #f8fafc;
            --card: #1e293b;
            --border: #334155;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: 0.3s; }
        .page-section { display: none; min-height: 100vh; background-color: var(--bg); }
        .active-page { display: block !important; }
        .container { max-width: 800px; margin: auto; padding: 20px; }

        /* Mode Toggle (Home Only) */
        .mode-toggle { position: absolute; top: 25px; right: 25px; cursor: pointer; font-size: 1.5rem; color: var(--pw-blue); z-index: 100; }

        /* Main 4 Grid */
        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .main-card { 
            background: var(--card); padding: 30px 10px; border-radius: 24px; text-align: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid var(--border);
            transition: 0.3s;
        }
        .main-card:active { transform: scale(0.95); }
        .main-card i { font-size: 2.5rem; color: var(--pw-blue); margin-bottom: 12px; }

        /* SPECIAL SUBJECT DESIGN (Point: 4 Squares se alag) */
        .special-section { margin-top: 40px; }
        .section-tag { font-size: 0.8rem; font-weight: bold; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        
        .special-card {
            background: var(--card);
            border: 2px solid transparent;
            background-image: linear-gradient(var(--card), var(--card)), var(--special-grad);
            background-origin: border-box;
            background-clip: content-box, border-box;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(229, 46, 113, 0.1);
        }
        .special-card h3 { margin: 0; font-size: 1.1rem; background: var(--special-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .special-card i { color: #e52e71; font-size: 1.2rem; }

        /* Baki pages ke basic styles... */
        .nav-header { padding: 15px; display: flex; align-items: center; gap: 15px; background: var(--card); border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="page-home" class="page-section active-page">
    <div class="container">
        <div class="mode-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></div>
        <h1 style="text-align: center; color: var(--pw-blue);">Target<span style="color:var(--text)">720</span></h1>
        
        <div class="main-grid" id="main-subjects"></div>

        <div class="special-section" id="custom-subjects-area" style="display:none;">
            <span class="section-tag">Special Exams & Mock Tests</span>
            <div id="custom-list"></div>
        </div>
    </div>
</div>

<div id="page-chapters" class="page-section">
    <div class="nav-header"><i class="fas fa-arrow-left" onclick="goBack()"></i> <h3 id="sub-title" style="margin:0"></h3></div>
    <div class="container" id="chapter-list-content"></div>
</div>

<script>
    let config = {}, pageStack = ['page-home'];

    window.onload = async () => {
        const res = await fetch('/get_config?v=' + Date.now());
        config = await res.json();
        renderHome();
    };

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const icon = document.querySelector('.mode-toggle i');
        icon.classList.toggle('fa-moon'); icon.classList.toggle('fa-sun');
    }

    function renderHome() {
        const mainSubs = ['physics', 'chemistry', 'botany', 'zoology'];
        let mH = '', sH = '', hasSpecial = false;
        
        for (let s in config) {
            if (mainSubs.includes(s)) {
                let icon = s === 'physics' ? 'atom' : s === 'chemistry' ? 'flask' : s === 'botany' ? 'leaf' : 'dna';
                mH += `
                <div class="main-card" onclick="openSubject('${s}')">
                    <i class="fas fa-${icon}"></i>
                    <h3>${s.toUpperCase()}</h3>
                </div>`;
            } else {
                hasSpecial = true;
                // Special subjects ke liye alag design card
                sH += `
                <div class="special-card" onclick="openSubject('${s}')">
                    <h3>${s.toUpperCase()}</h3>
                    <i class="fas fa-star"></i>
                </div>`;
            }
        }
        document.getElementById('main-subjects').innerHTML = mH;
        if(hasSpecial) {
            document.getElementById('custom-subjects-area').style.display = 'block';
            document.getElementById('custom-list').innerHTML = sH;
        }
    }

    // openSubject aur baki logic pichle code jaisa hi rahega...
    function showPage(id, push = true) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(push && pageStack[pageStack.length-1] !== id) pageStack.push(id);
    }
    function goBack() { if (pageStack.length > 1) { pageStack.pop(); showPage(pageStack[pageStack.length - 1], false); } }
</script>
</body>
</html>
