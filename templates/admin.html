<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - NEET Master</title>
    <style>
        body { font-family: sans-serif; background: #f4f7fe; padding: 20px; }
        .box { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        select, input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #1b10b1; color: white; padding: 15px; border: none; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🚀 Bulk Test Uploader</h2>
        <label>Subject Select Karein:</label>
        <select id="sub" onchange="loadChapters()">
            <option value="">--Subject--</option>
            <option value="physics">Physics</option>
            <option value="chemistry">Chemistry</option>
            <option value="botany">Botany</option>
            <option value="zoology">Zoology</option>
        </select>
        
        <label>Chapter Select Karein:</label>
        <select id="chap"><option value="">Pehle Subject Chunein</option></select>
        
        <label>DPP Name:</label>
        <input type="text" id="dpp_name" placeholder="e.g. DPP_01">
        
        <label>JSON Code (Paste here):</label>
        <textarea id="jsondata" rows="10" placeholder="[{ 'q': '...', ... }]"></textarea>
        
        <button class="btn" id="upbtn" onclick="upload()">LIVE PE BHEJO</button>
    </div>

    <script>
        let config = {};
        window.onload = async () => {
            const r = await fetch('/get_config');
            config = await r.json();
        };

        function loadChapters() {
            const s = document.getElementById('sub').value;
            const c = document.getElementById('chap');
            c.innerHTML = "";
            if(s && config[s]) {
                Object.keys(config[s]).forEach(name => {
                    let o = document.createElement('option');
                    o.value = name; o.innerText = name;
                    c.appendChild(o);
                });
            }
        }

        async function upload() {
            const btn = document.getElementById('upbtn');
            const data = {
                subject: document.getElementById('sub').value,
                chapter: document.getElementById('chap').value,
                test_name: document.getElementById('dpp_name').value,
                questions: JSON.parse(document.getElementById('jsondata').value)
            };

            if(!data.subject || !data.chapter || !data.test_name) return alert("Sab bhariye!");
            
            btn.innerText = "UPLOADING..."; btn.disabled = true;
            
            const res = await fetch('/save_test', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const resJ = await res.json();
            alert(resJ.message);
            location.reload();
        }
    </script>
</body>
</html>
