<!DOCTYPE html>
<html>
<head>
    <title>NEET Admin Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7fe; }
        .box { background: white; padding: 25px; border-radius: 15px; max-width: 600px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 8px; background: #ddd; font-weight: bold; }
        .tab-btn.active { background: #1b10b1; color: white; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 15px; background: #1b10b1; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .del-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .list-item { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="box">
        <div class="tabs">
            <button class="tab-btn active" id="btn-up" onclick="showTab('upload')">UPLOAD NEW</button>
            <button class="tab-btn" id="btn-mn" onclick="showTab('manage')">MANAGE TESTS</button>
        </div>

        <div id="upload-sec">
            <h2 style="color:#1b10b1">🚀 Upload & Schedule</h2>
            <label>Subject:</label>
            <select id="sub" onchange="toggleCustom(this.value)">
                <option value="physics">Physics</option><option value="chemistry">Chemistry</option>
                <option value="botany">Botany</option><option value="zoology">Zoology</option>
                <option value="custom">-- Add New Subject --</option>
            </select>
            <input type="text" id="custom-sub" placeholder="Enter New Subject Name" style="display:none;">
            <input type="text" id="chap" placeholder="Chapter Name">
            <input type="text" id="tname" placeholder="Test Name (e.g. DPP 01)">
            <label>Unlock Time (Optional):</label>
            <input type="datetime-local" id="unlock">
            <textarea id="jsondata" rows="6" placeholder="Paste Questions JSON here..."></textarea>
            <button class="main-btn" onclick="upload()">PUBLISH TEST</button>
        </div>

        <div id="manage-sec" style="display:none;">
            <h2 style="color:#1b10b1">🛠️ Manage Existing Tests</h2>
            <div id="test-list">Loading...</div>
        </div>
    </div>

    <script>
        function showTab(t) {
            document.getElementById('upload-sec').style.display = t=='upload'?'block':'none';
            document.getElementById('manage-sec').style.display = t=='manage'?'block':'none';
            document.getElementById('btn-up').classList.toggle('active', t=='upload');
            document.getElementById('btn-mn').classList.toggle('active', t=='manage');
            if(t=='manage') loadTests();
        }

        function toggleCustom(v) { document.getElementById('custom-sub').style.display = v=='custom'?'block':'none'; }

        async function upload() {
            const sub = document.getElementById('sub').value;
            const finalSub = sub=='custom' ? document.getElementById('custom-sub').value : sub;
            const data = {
                subject: finalSub, chapter: document.getElementById('chap').value,
                test_name: document.getElementById('tname').value,
                unlock_at: document.getElementById('unlock').value,
                questions: JSON.parse(document.getElementById('jsondata').value)
            };
            const res = await fetch('/save_test', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            const r = await res.json();
            alert(r.success ? "Success!" : "Error: " + r.message);
            if(r.success) location.reload();
        }

        async function loadTests() {
            const res = await fetch('/get_config?t=' + Date.now());
            const config = await res.json();
            let h = '';
            for(let s in config) {
                for(let c in config[s]) {
                    config[s][c].forEach(t => {
                        h += `<div class="list-item">
                            <div><b>${t.name}</b><br><small>${s} > ${c}</small></div>
                            <button class="del-btn" onclick="deleteT('${s}','${c}','${t.name}')">DELETE</button>
                        </div>`;
                    });
                }
            }
            document.getElementById('test-list').innerHTML = h || "No tests found.";
        }

        async function deleteT(s, c, n) {
            if(!confirm(`Delete "${n}"?`)) return;
            const res = await fetch('/delete_test', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({subject:s, chapter:c, test_name:n}) });
            const r = await res.json();
            if(r.success) loadTests(); else alert("Error");
        }
    </script>
</body>
</html>
